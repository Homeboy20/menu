<!-- Admin File Upload & Import (Mobile) -->
<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link rel="icon" href="/favicon.ico" type="image/svg+xml">
<title>Admin File Upload &amp; Import</title>
<!-- Preconnect to Google Fonts for faster icon loading -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/><script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ee9d2b",
                        "background-light": "#f8f7f6",
                        "background-dark": "#221a10",
                    },
                    fontFamily: {
                        "display": ["Work Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
.material-symbols-outlined{font-family:"Material Symbols Outlined",sans-serif;font-weight:normal;font-style:normal;font-size:24px;line-height:1;letter-spacing:normal;text-transform:none;display:inline-block;white-space:nowrap;word-wrap:normal;direction:ltr;font-variation-settings:"FILL" 0,"wght" 400,"GRAD" 0,"opsz" 24;-webkit-font-smoothing:antialiased;vertical-align:middle;}.hidden{display:none!important}

    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen antialiased">
<div class="relative flex h-auto min-h-screen w-full max-w-md mx-auto flex-col overflow-x-hidden">
<!-- Header -->
<header class="flex items-center p-4 justify-between border-b border-slate-200 dark:border-primary/20 sticky top-0 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md z-10">
<button class="flex size-10 shrink-0 items-center justify-center text-slate-900 dark:text-slate-100 hover:text-primary transition-colors rounded-full hover:bg-slate-100 dark:hover:bg-primary/10">
<svg class="material-symbols-outlined text-2xl" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><use href="/icons/sprite.svg#icon-arrow_back"/></svg>
</button>
<h1 class="text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Upload Menu</h1>
</header>
<main class="flex-1 flex flex-col px-4 py-6 gap-6">
<!-- Upload Area -->
<div class="flex flex-col items-center justify-center gap-6 rounded-xl border-2 border-dashed border-primary/40 bg-primary/5 hover:bg-primary/10 transition-colors px-6 py-12 cursor-pointer group">
<div class="flex size-16 items-center justify-center rounded-full bg-primary/20 text-primary group-hover:scale-110 transition-transform">
<svg class="material-symbols-outlined text-3xl" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><use href="/icons/sprite.svg#icon-upload_file"/></svg>
</div>
<div class="flex flex-col items-center gap-2 text-center max-w-xs">
<p class="text-lg font-bold leading-tight tracking-tight">Upload Files</p>
<p class="text-sm font-normal text-slate-500 dark:text-slate-400">Drag and drop your PDF, CSV, or Excel files here, or tap to browse.</p>
</div>
<button class="flex h-10 px-6 items-center justify-center rounded-lg bg-primary hover:bg-primary/90 text-white text-sm font-bold shadow-sm transition-colors">
                    Browse Files
                </button>
</div>
<!-- Import Google Sheets -->
<button class="flex h-12 w-full items-center justify-center rounded-lg bg-slate-100 dark:bg-primary/10 hover:bg-slate-200 dark:hover:bg-primary/20 text-slate-900 dark:text-primary gap-3 text-sm font-bold transition-colors border border-slate-200 dark:border-primary/20">
<svg class="material-symbols-outlined text-xl" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><use href="/icons/sprite.svg#icon-link"/></svg>
<span>Import from Google Sheets</span>
</button>
<!-- Recent Uploads Section -->
<section class="mt-4 flex flex-col gap-3">
<h2 class="text-lg font-bold leading-tight tracking-tight pb-2 border-b border-slate-200 dark:border-primary/20">Recent Uploads</h2>
<!-- Upload Item: Success -->
<div class="flex items-center gap-4 p-3 rounded-xl bg-slate-50 dark:bg-primary/5 border border-slate-100 dark:border-primary/10">
<div class="flex items-center justify-center rounded-lg bg-red-100 dark:bg-red-500/20 text-red-600 dark:text-red-400 shrink-0 size-12">
<svg class="material-symbols-outlined text-2xl" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><use href="/icons/sprite.svg#icon-picture_as_pdf"/></svg>
</div>
<div class="flex flex-col justify-center flex-1 overflow-hidden">
<p class="text-sm font-semibold truncate">menu_summer_2024.pdf</p>
<p class="text-xs text-slate-500 dark:text-slate-400 truncate">Oct 12, 10:30 AM � 2.4 MB</p>
</div>
<div class="shrink-0 flex flex-col items-end gap-1">
<span class="flex items-center gap-1 text-xs font-medium text-emerald-600 dark:text-emerald-400 bg-emerald-100 dark:bg-emerald-500/20 px-2 py-0.5 rounded-full">
<svg class="material-symbols-outlined text-[14px]" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><use href="/icons/sprite.svg#icon-check_circle"/></svg> Processed
                        </span>
</div>
</div>
<!-- Upload Item: Processing -->
<div class="flex items-center gap-4 p-3 rounded-xl bg-slate-50 dark:bg-primary/5 border border-slate-100 dark:border-primary/10">
<div class="flex items-center justify-center rounded-lg bg-green-100 dark:bg-green-500/20 text-green-600 dark:text-green-400 shrink-0 size-12">
<svg class="material-symbols-outlined text-2xl" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><use href="/icons/sprite.svg#icon-table"/></svg>
</div>
<div class="flex flex-col justify-center flex-1 overflow-hidden">
<p class="text-sm font-semibold truncate">drink_specials.csv</p>
<div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-1.5 mt-1.5 mb-0.5">
<div class="bg-primary h-1.5 rounded-full w-[65%]"></div>
</div>
<p class="text-xs text-slate-500 dark:text-slate-400">Processing... 65%</p>
</div>
<div class="shrink-0">
<svg class="material-symbols-outlined text-primary animate-spin" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><use href="/icons/sprite.svg#icon-sync"/></svg>
</div>
</div>
<!-- Upload Item: Error -->
<div class="flex items-center gap-4 p-3 rounded-xl bg-slate-50 dark:bg-primary/5 border border-red-200 dark:border-red-500/30">
<div class="flex items-center justify-center rounded-lg bg-blue-100 dark:bg-blue-500/20 text-blue-600 dark:text-blue-400 shrink-0 size-12">
<svg class="material-symbols-outlined text-2xl" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><use href="/icons/sprite.svg#icon-description"/></svg>
</div>
<div class="flex flex-col justify-center flex-1 overflow-hidden">
<p class="text-sm font-semibold truncate">wine_list.xlsx</p>
<p class="text-xs text-red-600 dark:text-red-400 truncate">Format error: Check columns</p>
</div>
<div class="shrink-0">
<button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 p-1">
<svg class="material-symbols-outlined" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><use href="/icons/sprite.svg#icon-refresh"/></svg>
</button>
</div>
</div>
</section>
</main>
<!-- Bottom padding for mobile safarea -->
<div class="h-8"></div>
</div>
<script src="/js/icons.js"></script>
</body></html>
