version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: menu
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your environment}
      POSTGRES_DB: menu
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U menu"]
      interval: 5s
      timeout: 3s
      retries: 5

  restaurant-menu:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=${HOST:?Set HOST to your public app URL}
      - DATABASE_URL=${DATABASE_URL:?Set DATABASE_URL in your environment}
      - PG_POOL_MAX=20
      - MENU_CACHE_MAX=500
      - MENU_CACHE_TTL_MS=300000
      - SCAN_DEDUPE_TTL_MS=300000
      - SCAN_DEDUPE_MAX=20000
      - ADMIN_SECRET_HASH=${ADMIN_SECRET_HASH:?Set ADMIN_SECRET_HASH in your environment}
      - CSRF_SECRET=${CSRF_SECRET:?Set CSRF_SECRET in your environment}
      - FIELD_ENCRYPTION_KEY=${FIELD_ENCRYPTION_KEY:?Set FIELD_ENCRYPTION_KEY in your environment}
      - PHONE_HASH_SECRET=${PHONE_HASH_SECRET:?Set PHONE_HASH_SECRET in your environment}
      - SESSION_TTL_MS=28800000
      - LOGIN_RATE_LIMIT=10
    volumes:
      - menu_data:/app/data
      - menu_uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  menu_data:
    driver: local
  menu_uploads:
    driver: local
  pgdata:
    driver: local
