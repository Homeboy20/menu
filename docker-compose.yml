version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: menu
      POSTGRES_PASSWORD: menu_dev_pass
      POSTGRES_DB: menu
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U menu"]
      interval: 5s
      timeout: 3s
      retries: 5

  restaurant-menu:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=http://localhost:3000
      - DATABASE_URL=postgres://menu:menu_dev_pass@db:5432/menu
      - PG_POOL_MAX=20
      - MENU_CACHE_MAX=500
      - MENU_CACHE_TTL_MS=300000
      - SCAN_DEDUPE_TTL_MS=300000
      - SCAN_DEDUPE_MAX=20000
      - ADMIN_SECRET_HASH=$2b$12$ogZ6ks85LLo5mFHjUgUAWOwt8U0akxiVavATYeCA5cJc2ZWhym7r.
      - SESSION_TTL_MS=28800000
      - LOGIN_RATE_LIMIT=10
    volumes:
      - menu_data:/app/data
      - menu_uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  menu_data:
    driver: local
  menu_uploads:
    driver: local
  pgdata:
    driver: local
