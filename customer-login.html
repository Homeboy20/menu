<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign In – RestOrder</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#2dd4bf",
          "bg-dark":  "#0d1b2a",
          "surface":  "#132639",
        },
        fontFamily: { display: ["Work Sans", "sans-serif"] },
      },
    },
  };
</script>
<style>
  body { font-family: "Work Sans", sans-serif; }
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  .gradient-bg {
    background: linear-gradient(135deg, #0d1b2a 0%, #132639 50%, #0d1b2a 100%);
  }
</style>
</head>
<body class="gradient-bg text-slate-100 min-h-screen flex items-center justify-center p-6">

<div class="w-full max-w-md">
  <!-- Logo -->
  <div class="text-center mb-8">
    <div class="size-16 rounded-2xl bg-primary flex items-center justify-center text-bg-dark mx-auto mb-4">
      <span class="material-symbols-outlined text-[32px]">restaurant_menu</span>
    </div>
    <h1 class="text-3xl font-bold mb-2">Welcome Back</h1>
    <p class="text-slate-400">Sign in to your RestOrder account</p>
  </div>

  <!-- Login Form -->
  <div class="bg-surface border border-slate-700 rounded-2xl p-8 shadow-2xl">
    <form id="login-form" class="space-y-6">
      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">Email Address</label>
        <input id="email" type="email" required placeholder="you@restaurant.com" autocomplete="email"
          class="w-full px-4 py-3 bg-bg-dark border border-slate-700 rounded-xl text-slate-200 focus:ring-2 focus:ring-primary focus:border-transparent transition" />
      </div>

      <!-- Password -->
      <div>
        <div class="flex items-center justify-between mb-2">
          <label class="block text-sm font-medium text-slate-300">Password</label>
          <a href="#" class="text-xs text-primary hover:underline">Forgot password?</a>
        </div>
        <input id="password" type="password" required placeholder="Enter your password" autocomplete="current-password"
          class="w-full px-4 py-3 bg-bg-dark border border-slate-700 rounded-xl text-slate-200 focus:ring-2 focus:ring-primary focus:border-transparent transition" />
      </div>

      <!-- Remember Me -->
      <div class="flex items-center">
        <input id="remember" type="checkbox"
          class="rounded border-slate-700 bg-bg-dark text-primary focus:ring-2 focus:ring-primary focus:ring-offset-0 focus:ring-offset-bg-dark" />
        <label for="remember" class="ml-2 text-sm text-slate-400">Remember me for 30 days</label>
      </div>

      <!-- Error Message -->
      <div id="error-message" class="hidden p-4 bg-red-500/10 border border-red-500/30 rounded-xl">
        <div class="flex items-start gap-3">
          <span class="material-symbols-outlined text-red-500 text-[20px]">error</span>
          <div class="flex-1">
            <p class="text-sm text-red-400" id="error-text"></p>
          </div>
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" id="submit-btn"
        class="w-full px-6 py-3.5 bg-primary text-bg-dark font-bold rounded-xl hover:bg-primary/90 transition flex items-center justify-center gap-2">
        <span id="submit-text">Sign In</span>
        <span id="submit-spinner" class="hidden material-symbols-outlined spin">progress_activity</span>
      </button>
    </form>

    <!-- Divider -->
    <div class="relative my-8">
      <div class="absolute inset-0 flex items-center">
        <div class="w-full border-t border-slate-700"></div>
      </div>
      <div class="relative flex justify-center text-sm">
        <span class="px-4 bg-surface text-slate-400">Don't have an account?</span>
      </div>
    </div>

    <!-- Register Link -->
    <a href="/register"
      class="block w-full px-6 py-3.5 bg-bg-dark text-primary font-semibold rounded-xl border border-primary/30 hover:bg-primary/10 transition text-center">
      Create Account
    </a>
  </div>

  <!-- Admin Link -->
  <div class="mt-6 text-center">
    <a href="/admin" class="text-sm text-slate-400 hover:text-primary transition">
      Admin Panel
    </a>
  </div>
</div>

<script>
// Handle login form
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const submitBtn = document.getElementById('submit-btn');
  const submitText = document.getElementById('submit-text');
  const submitSpinner = document.getElementById('submit-spinner');
  const errorMessage = document.getElementById('error-message');
  const errorText = document.getElementById('error-text');
  
  // Get form values
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const remember = document.getElementById('remember').checked;
  
  // Hide error
  errorMessage.classList.add('hidden');
  
  // Show loading
  submitBtn.disabled = true;
  submitText.textContent = 'Signing In...';
  submitSpinner.classList.remove('hidden');
  
  try {
    const response = await fetch('/api/customers/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    
    const data = await response.json();
    
    if (!response.ok) {
      throw new Error(data.error || 'Login failed');
    }
    
    // Store token
    const storage = remember ? localStorage : sessionStorage;
    storage.setItem('customerToken', data.token);
    storage.setItem('customerEmail', data.customer.email);
    storage.setItem('customerBusiness', data.customer.businessName);
    
    // Redirect to dashboard
    window.location.href = '/dashboard';
    
  } catch (err) {
    errorText.textContent = err.message;
    errorMessage.classList.remove('hidden');
    
    // Reset button
    submitBtn.disabled = false;
    submitText.textContent = 'Sign In';
    submitSpinner.classList.add('hidden');
  }
});

// Check if already logged in
window.addEventListener('load', async () => {
  const token = localStorage.getItem('customerToken') || sessionStorage.getItem('customerToken');
  if (token) {
    try {
      const response = await fetch('/api/customers/check', {
        headers: { 'x-customer-token': token }
      });
      const data = await response.json();
      
      if (data.authenticated) {
        window.location.href = '/dashboard';
      }
    } catch (err) {
      // Continue with login
    }
  }
});
</script>

</body>
</html>
