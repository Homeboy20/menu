<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign In – RestOrder</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          "primary": "#c2410c",
          "primary-light": "#ea580c",
          "primary-dark": "#9a3412",
          "bg": "#fafaf9",
          "surface": "#ffffff",
        },
        fontFamily: { display: ["Inter", "sans-serif"] },
      },
    },
  };
</script>
<style>
  body { font-family: "Inter", sans-serif; }
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  .gradient-text {
    background: linear-gradient(135deg, #c2410c 0%, #ea580c 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
</style>
</head>
<body class="bg-bg text-stone-900 min-h-screen">

<!-- Header -->
<header class="border-b border-stone-200 bg-white sticky top-0 z-40 shadow-sm">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="/" class="flex items-center gap-3 text-decoration-none">
      <div class="size-10 rounded-xl bg-gradient-to-r from-primary to-primary-light flex items-center justify-center text-white">
        <span class="material-symbols-outlined text-[22px]">restaurant_menu</span>
      </div>
      <div>
        <h1 class="font-bold text-lg text-stone-900">RestOrder</h1>
        <p class="text-xs text-stone-500">Digital Menu Platform</p>
      </div>
    </a>
    <div class="flex items-center gap-4">
      <span class="text-sm text-stone-600">Don't have an account?</span>
      <a href="/register" class="px-4 py-2 text-sm font-semibold text-white bg-gradient-to-r from-primary to-primary-light rounded-xl hover:shadow-lg transition">
        Sign Up Free
      </a>
    </div>
  </div>
</header>

<!-- Main Content -->
<main class="flex items-center justify-center min-h-[calc(100vh-80px)] p-6">
  <div class="w-full max-w-md">
    <!-- Logo & Title -->
    <div class="text-center mb-8">
      <div class="size-16 rounded-2xl bg-gradient-to-r from-primary to-primary-light flex items-center justify-center text-white mx-auto mb-4 shadow-lg">
        <span class="material-symbols-outlined text-[32px]">restaurant_menu</span>
      </div>
      <h2 class="text-3xl font-bold mb-2 text-stone-900">Welcome Back</h2>
      <p class="text-stone-600">Sign in to your RestOrder account</p>
    </div>

    <!-- Login Form -->
    <div class="bg-white border border-stone-200 rounded-2xl p-8 shadow-lg">
      <form id="login-form" class="space-y-6">
        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-stone-700 mb-2">
            <span class="material-symbols-outlined text-[16px] align-middle mr-1 text-primary">email</span>
            Email Address
          </label>
          <input id="email" type="email" required placeholder="you@restaurant.com" autocomplete="email"
            class="w-full px-4 py-3 bg-white border border-stone-300 rounded-xl text-stone-900 focus:ring-2 focus:ring-primary focus:border-transparent transition" />
        </div>

        <!-- Password -->
        <div>
          <div class="flex items-center justify-between mb-2">
            <label class="block text-sm font-medium text-stone-700">
              <span class="material-symbols-outlined text-[16px] align-middle mr-1 text-primary">lock</span>
              Password
            </label>
            <a href="#" class="text-xs text-primary hover:underline">Forgot password?</a>
          </div>
          <input id="password" type="password" required placeholder="Enter your password" autocomplete="current-password"
            class="w-full px-4 py-3 bg-white border border-stone-300 rounded-xl text-stone-900 focus:ring-2 focus:ring-primary focus:border-transparent transition" />
        </div>

        <!-- Remember Me -->
        <div class="flex items-center">
          <input id="remember" type="checkbox"
            class="rounded border-stone-300 bg-white text-primary focus:ring-2 focus:ring-primary focus:ring-offset-0" />
          <label for="remember" class="ml-2 text-sm text-stone-600">Remember me for 30 days</label>
        </div>

        <!-- Error Message -->
        <div id="error-message" class="hidden p-4 bg-red-50 border border-red-200 rounded-xl">
          <div class="flex items-start gap-3">
            <span class="material-symbols-outlined text-red-600 text-[20px]">error</span>
            <div class="flex-1">
              <p class="text-sm text-red-700" id="error-text"></p>
            </div>
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" id="submit-btn"
          class="w-full px-6 py-3.5 bg-gradient-to-r from-primary to-primary-light text-white font-bold rounded-xl hover:shadow-lg transition flex items-center justify-center gap-2">
          <span id="submit-text">Sign In</span>
          <span id="submit-spinner" class="hidden material-symbols-outlined spin">progress_activity</span>
        </button>
      </form>

      <!-- Divider -->
      <div class="relative my-8">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-stone-200"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-4 bg-white text-stone-500">Don't have an account?</span>
        </div>
      </div>

      <!-- Register Link -->
      <a href="/register"
        class="block w-full px-6 py-3.5 bg-white text-primary font-semibold rounded-xl border border-primary/30 hover:bg-primary/5 transition text-center">
        Create Free Account
      </a>
    </div>

    <!-- Admin Link -->
    <div class="mt-6 text-center">
      <a href="/admin" class="text-sm text-stone-500 hover:text-primary transition">
        Admin Panel →
      </a>
    </div>
  </div>
</main>

<script>
// Handle login form
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const submitBtn = document.getElementById('submit-btn');
  const submitText = document.getElementById('submit-text');
  const submitSpinner = document.getElementById('submit-spinner');
  const errorMessage = document.getElementById('error-message');
  const errorText = document.getElementById('error-text');
  
  // Get form values
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const remember = document.getElementById('remember').checked;
  
  // Hide error
  errorMessage.classList.add('hidden');
  
  // Show loading
  submitBtn.disabled = true;
  submitText.textContent = 'Signing In...';
  submitSpinner.classList.remove('hidden');
  
  try {
    // Fetch CSRF token
    const csrfResponse = await fetch('/api/csrf-token');
    const { csrfToken } = await csrfResponse.json();
    
    const response = await fetch('/api/customers/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, csrfToken })
    });
    
    const data = await response.json();
    
    if (!response.ok) {
      throw new Error(data.error || 'Login failed');
    }
    
    // Store token
    const storage = remember ? localStorage : sessionStorage;
    storage.setItem('customerToken', data.token);
    storage.setItem('customerEmail', data.customer.email);
    storage.setItem('customerBusiness', data.customer.businessName);
    
    // Redirect to dashboard
    window.location.href = '/dashboard';
    
  } catch (err) {
    errorText.textContent = err.message;
    errorMessage.classList.remove('hidden');
    
    // Reset button
    submitBtn.disabled = false;
    submitText.textContent = 'Sign In';
    submitSpinner.classList.add('hidden');
  }
});

// Check if already logged in
window.addEventListener('load', async () => {
  const token = localStorage.getItem('customerToken') || sessionStorage.getItem('customerToken');
  if (token) {
    try {
      const response = await fetch('/api/customers/check', {
        headers: { 'x-customer-token': token }
      });
      const data = await response.json();
      
      if (data.authenticated) {
        window.location.href = '/dashboard';
      }
    } catch (err) {
      // Continue with login
    }
  }
});
</script>

</body>
</html>
