<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#ffffff" id="meta-theme"/>
<title>Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet"/>
<style>
.material-symbols-outlined{font-family:"Material Symbols Outlined",sans-serif;font-weight:normal;font-style:normal;font-size:24px;line-height:1;letter-spacing:normal;text-transform:none;display:inline-block;white-space:nowrap;word-wrap:normal;direction:ltr;font-variation-settings:"FILL" 0,"wght" 400,"GRAD" 0,"opsz" 24;-webkit-font-smoothing:antialiased;vertical-align:middle;}

/* ══ RESET ══ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}

/* ══ TOKENS ══ */
:root{
  --brand:        #FF6C44;
  --brand-rgb:    255,108,68;
  --brand-dim:    rgba(255,108,68,.09);
  --brand-mid:    rgba(255,108,68,.2);
  --price:        #FF6C44;
  --bg:           #FFF0EC;
  --surf:         #ffffff;
  --surf2:        #F3F3F3;
  --surf3:        #e8e6e5;
  --text:         #595959;
  --head:         #1E1E1E;
  --border:       #e4e2e0;
  --border2:      rgba(0,0,0,.04);
  --shadow-xs:    0 1px 3px rgba(0,0,0,.06);
  --shadow-sm:    0 2px 8px rgba(0,0,0,.08);
  --shadow-md:    0 6px 24px rgba(0,0,0,.11);
  --shadow-lg:    0 16px 48px rgba(0,0,0,.15);
  --r-sm:         10px;
  --r-md:         16px;
  --r-lg:         22px;
  --r-xl:         28px;
  --safe-t:       env(safe-area-inset-top,    0px);
  --safe-b:       env(safe-area-inset-bottom, 0px);
  --safe-l:       env(safe-area-inset-left,   0px);
  --safe-r:       env(safe-area-inset-right,  0px);
  --topbar-h:     56px;
  --bnav-h:       72px;
  --card-r:       18px;
  --font:         'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --ease-spring:  cubic-bezier(.32,.72,0,1);
  --ease-out:     cubic-bezier(.16,1,.3,1);
}
html[data-theme="dark"]{
  --brand:       #FF6C44;
  --brand-rgb:   255,108,68;
  --brand-dim:   rgba(255,108,68,.14);
  --brand-mid:   rgba(255,108,68,.25);
  --price:       #FF8C68;
  --bg:          #1E1E1E;
  --surf:        #2b2b2b;
  --surf2:       #383838;
  --surf3:       #454545;
  --text:        #959595;
  --head:        #f0f0f0;
  --border:      rgba(255,255,255,.07);
  --border2:     rgba(255,255,255,.05);
  --shadow-xs:   0 1px 4px rgba(0,0,0,.4);
  --shadow-sm:   0 2px 10px rgba(0,0,0,.45);
  --shadow-md:   0 6px 24px rgba(0,0,0,.55);
  --shadow-lg:   0 16px 48px rgba(0,0,0,.7);
}

/* ══ BASE ══ */
html{height:100%;}
body{
  min-height:100%;font-family:var(--font);font-size:15px;
  background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;overscroll-behavior-y:none;
  transition:background .3s,color .2s;
}
#app{width:100%;max-width:480px;margin:0 auto;min-height:100dvh;position:relative;background:var(--bg);}

/* ══ TOPBAR (transparent → frosted on scroll) ══ */
#topbar{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;z-index:50;
  height:calc(var(--topbar-h) + var(--safe-t));
  padding:var(--safe-t) 16px 0;
  display:flex;align-items:center;gap:10px;
  background:transparent;
  transition:background .25s,box-shadow .25s;
}
#topbar.scrolled{
  background:rgba(255,255,255,.93);
  backdrop-filter:blur(20px) saturate(1.8);
  -webkit-backdrop-filter:blur(20px) saturate(1.8);
  box-shadow:0 2px 20px rgba(0,0,0,.08);
  border-bottom:2px solid var(--brand);
}
html[data-theme="dark"] #topbar.scrolled{
  background:rgba(15,14,13,.93);
  box-shadow:0 2px 20px rgba(0,0,0,.5);
  border-bottom:2px solid var(--brand);
}
.icon-btn{
  flex-shrink:0;width:40px;height:40px;border-radius:50%;border:none;
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  color:var(--head);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .18s;box-shadow:var(--shadow-xs);
  -webkit-user-select:none;user-select:none;
}
html[data-theme="dark"] .icon-btn{background:rgba(26,25,23,.85);}
#topbar.scrolled .icon-btn{background:var(--surf2);box-shadow:none;}
.icon-btn:active{transform:scale(.86);}
.icon-btn .material-symbols-outlined{font-size:20px;}
#topbar-spacer{flex:1;}
#topbar-name{
  flex:1;font-size:16px;font-weight:800;color:var(--brand);
  text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  opacity:0;transition:opacity .2s;letter-spacing:-.4px;
}
#topbar.scrolled #topbar-name{opacity:1;}

/* ══ HERO ══ */
#hero{
  position:relative;width:100%;min-height:240px;
  display:flex;flex-direction:column;justify-content:flex-end;
  overflow:hidden;
  background:var(--brand);
}
#hero::before,#hero::after{display:none;}
#hero-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;z-index:2;}
#hero-img.show{display:block;}
#hero-gradient{
  position:absolute;inset:0;z-index:3;
  background:rgba(0,0,0,0.35);
  pointer-events:none;
}
#hero-body{
  position:relative;z-index:4;
  padding:calc(var(--topbar-h) + var(--safe-t) + 16px) 20px 22px;
}
/* Flex row wrapping logo + text */
#hero-row{
  display:flex;align-items:center;gap:14px;
}
#hero-text{flex:1;min-width:0;}
#hero-logo{
  width:56px;height:56px;border-radius:16px;overflow:hidden;flex-shrink:0;
  display:none;background:var(--brand);
  box-shadow:0 4px 20px rgba(0,0,0,.3);border:2px solid rgba(255,255,255,.2);
  align-items:center;justify-content:center;
}
#hero-logo.show{display:flex;}
#hero-logo img{width:100%;height:100%;object-fit:cover;display:none;}
#hero-logo img.show{display:block;}
.hero-initials{font-size:18px;font-weight:900;color:#fff;letter-spacing:-.5px;}
#hero-restaurant-name{
  font-size:26px;font-weight:900;color:#fff;letter-spacing:-.5px;line-height:1.15;
  text-shadow:0 1px 8px rgba(0,0,0,.3);
}
#hero-tagline{font-size:13px;color:rgba(255,255,255,.75);margin-top:4px;font-weight:500;line-height:1.4;}
.hero-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.hero-chip{
  display:inline-flex;align-items:center;gap:4px;
  padding:5px 10px;border-radius:50px;
  background:rgba(255,255,255,.18);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  font-size:11px;font-weight:600;color:#fff;letter-spacing:.02em;
  border:1px solid rgba(255,255,255,.2);
}
.hero-chip .material-symbols-outlined{font-size:14px;}
/* ── Layout variants (applied via data-layout on #hero) ── */
/* logo-left (default): logo left, text right — handled by base #hero-row */
/* logo-right: text left, logo right */
#hero[data-layout="logo-right"] #hero-row{flex-direction:row-reverse;}
/* stacked: logo top, text below, left-aligned */
#hero[data-layout="stacked"] #hero-row{flex-direction:column;align-items:flex-start;gap:10px;}
/* logo-center: everything centered */
#hero[data-layout="logo-center"] #hero-row{flex-direction:column;align-items:center;gap:10px;}
#hero[data-layout="logo-center"] #hero-text{text-align:center;}
#hero[data-layout="logo-center"] .hero-chips{justify-content:center;}
/* logo-only: hide text */
#hero[data-layout="logo-only"] #hero-text{display:none;}
#hero[data-layout="logo-only"] #hero-row{justify-content:center;}
#hero[data-layout="logo-only"] #hero-logo{width:72px;height:72px;border-radius:20px;}
/* name-only: hide logo (JS also hides it) */
#hero[data-layout="name-only"] #hero-logo{display:none!important;}
/* Hidden element helper */
#hero-logo.hero-hidden,#hero-restaurant-name.hero-hidden,#hero-tagline.hero-hidden{display:none!important;}

/* ══ SEARCH BAR ══ */
#search-bar-wrap{padding:12px 16px 0;background:var(--bg);display:none;}
#search-bar{
  display:flex;align-items:center;gap:10px;
  background:var(--surf);border-radius:50px;
  padding:10px 14px;border:1.5px solid var(--border);
  box-shadow:var(--shadow-xs);
  transition:border-color .2s,box-shadow .2s;
}
#search-bar:focus-within{border-color:var(--brand);box-shadow:0 0 0 3px rgba(var(--brand-rgb),.15);}
#search-bar .material-symbols-outlined{font-size:18px;color:var(--text);opacity:.5;flex-shrink:0;}
#search-input{
  flex:1;border:none;outline:none;background:transparent;
  color:var(--head);font-size:14px;font-family:var(--font);font-weight:500;
  -webkit-appearance:none;
}
#search-input::placeholder{color:var(--text);opacity:.5;}
#search-clear{
  flex-shrink:0;width:22px;height:22px;border-radius:50%;
  border:none;background:var(--surf3);color:var(--text);
  cursor:pointer;display:none;
  align-items:center;justify-content:center;font-size:14px;font-family:sans-serif;
}
#search-clear.show{display:flex;}

/* ══ TABLE BANNER ══ */
#table-banner{
  display:none;align-items:center;gap:10px;
  margin:10px 16px 0;padding:10px 16px;
  background:var(--brand);
  color:#fff;border-radius:var(--r-md);
  font-size:13px;font-weight:600;
  box-shadow:0 3px 14px rgba(var(--brand-rgb),.35);
  animation:fadeUp .3s var(--ease-out) both;
}
#table-banner.visible{display:flex;}
#table-banner-label{flex:1;}
#call-waiter-btn{
  background:rgba(255,255,255,.22);border:none;border-radius:50px;
  padding:6px 12px;font-size:11px;font-weight:700;color:#fff;
  cursor:pointer;font-family:var(--font);
  display:flex;align-items:center;gap:4px;
  transition:background .15s;white-space:nowrap;
}
#call-waiter-btn:active{background:rgba(255,255,255,.38);}
#waiter-sent-msg{font-size:11px;color:rgba(255,255,255,.8);display:none;}

/* ══ CONTACT BAR ══ */
#contact-bar{
  display:none;flex-wrap:wrap;
  align-items:center;justify-content:center;gap:8px;
  padding:10px 16px 2px;background:var(--bg);
}
#contact-bar.visible{display:flex;}
#contact-bar a{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 12px;border-radius:50px;
  background:var(--surf);color:var(--text);
  text-decoration:none;font-size:12px;font-weight:600;
  border:1px solid var(--border);transition:all .15s;
}
#contact-bar a:active{transform:scale(.92);}
#contact-bar a svg{width:14px;height:14px;fill:var(--brand);flex-shrink:0;}

/* ══ CATEGORY NAV ══ */
#cat-nav{position:sticky;top:0;z-index:40;background:var(--bg);}
#cat-tabs{
  display:flex;gap:8px;
  overflow-x:auto;padding:14px 16px 8px;
  -ms-overflow-style:none;scrollbar-width:none;
  scroll-snap-type:x proximity;
  justify-content:center;flex-wrap:wrap;
}
#cat-tabs::-webkit-scrollbar{display:none;}
.tab-pill{
  flex-shrink:0;scroll-snap-align:start;
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 16px;border-radius:50px;
  font-size:13px;font-weight:700;letter-spacing:-.1px;
  font-family:var(--font);cursor:pointer;white-space:nowrap;
  border:none;transition:all .2s var(--ease-out),transform .08s;
  -webkit-user-select:none;user-select:none;
}
.tab-pill:active{transform:scale(.91);}
.tab-icon-sm{font-size:17px;line-height:1;}
.tab-active{background:var(--brand);color:#fff;box-shadow:0 4px 16px rgba(var(--brand-rgb),.38);}
.tab-inactive{background:var(--surf);color:var(--text);border:1.5px solid var(--border);}
#subcat-tabs{
  display:flex;gap:6px;overflow-x:auto;padding:0 16px 10px;
  -ms-overflow-style:none;scrollbar-width:none;
  max-height:0;opacity:0;
  transition:max-height .28s var(--ease-spring),opacity .2s,padding .28s;
}
#subcat-tabs::-webkit-scrollbar{display:none;}
#subcat-tabs.visible{max-height:50px;opacity:1;padding:4px 16px 10px;}
.subcat-pill{
  flex-shrink:0;display:inline-flex;align-items:center;
  padding:6px 14px;border-radius:50px;
  font-size:12px;font-weight:600;border:1.5px solid transparent;cursor:pointer;
  font-family:var(--font);white-space:nowrap;
  transition:all .15s,transform .08s;
}
.subcat-pill:active{transform:scale(.92);}
.subcat-active{background:var(--brand-dim);color:var(--brand);border-color:var(--brand);}
.subcat-inactive{background:transparent;color:var(--text);border-color:var(--border);}

/* ══ VIEW BAR ══ */
#view-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:2px 16px 0;
}
#count-label{font-size:12px;font-weight:600;color:var(--text);opacity:.7;letter-spacing:.04em;text-transform:uppercase;}
.view-toggle{display:flex;gap:2px;background:var(--surf2);border-radius:var(--r-sm);padding:3px;}
.view-btn{
  padding:5px 8px;border:none;background:transparent;border-radius:7px;
  color:var(--text);opacity:.5;cursor:pointer;
  display:flex;align-items:center;font-family:var(--font);
  transition:all .15s;-webkit-user-select:none;user-select:none;
}
.view-btn.active{background:var(--surf);color:var(--head);opacity:1;box-shadow:var(--shadow-xs);}
.view-btn:active{transform:scale(.88);}

/* ══ SECTION HEADER ══ */
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 16px 12px;
}
.section-title{font-size:18px;font-weight:800;color:var(--head);letter-spacing:-.4px;border-left:3px solid var(--brand);padding-left:10px;}
.section-count{
  font-size:12px;font-weight:600;color:var(--text);
  background:var(--surf2);padding:3px 9px;border-radius:50px;
}

/* ══ ITEM CARD (list) ══ */
#items-container{padding-bottom:calc(100px + var(--safe-b));}
.item-card{
  display:flex;align-items:center;
  background:var(--surf);border-radius:var(--card-r);margin:0 12px 10px;
  overflow:hidden;box-shadow:var(--shadow-sm);border:none;
  cursor:pointer;position:relative;
  transition:transform .12s var(--ease-spring),box-shadow .12s;
  -webkit-user-select:none;user-select:none;
  animation:fadeUp .3s var(--ease-out) both;
}
.item-card:active{transform:scale(.975);box-shadow:none;}
.item-card-img-wrap{
  width:110px;height:110px;flex-shrink:0;
  background:var(--surf2);overflow:hidden;position:relative;
  margin:8px 0 8px 8px;border-radius:12px;
}
.item-card-img{width:100%;height:100%;object-fit:cover;transition:transform .3s var(--ease-out);}
.item-card:hover .item-card-img{transform:scale(1.04);}
.item-card-no-img{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  background:var(--surf2);
}
.item-card-no-img .material-symbols-outlined{font-size:32px;color:var(--text);opacity:.25;}
.item-card-body{flex:1;min-width:0;padding:14px;display:flex;flex-direction:column;gap:3px;}
.item-card-name{font-size:15px;font-weight:700;color:var(--head);letter-spacing:-.2px;line-height:1.3;}
.item-card-desc{
  font-size:12.5px;color:var(--text);line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.item-card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
.item-card-price{font-size:15px;font-weight:800;color:var(--head);letter-spacing:-.2px;}
.item-card-price.has-price{color:var(--price);}
.item-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.tag-chip{font-size:10px;font-weight:600;padding:3px 8px;border-radius:50px;background:var(--brand-dim);color:var(--brand);}
.item-stars{display:flex;align-items:center;gap:2px;}
.star-icon{font-size:12px;color:var(--surf3);font-variation-settings:'FILL' 0;}
.star-icon.filled{color:#f59e0b;font-variation-settings:'FILL' 1;}
.star-score{font-size:10px;font-weight:600;color:var(--text);margin-left:2px;opacity:.7;}
.card-add-btn{
  width:34px;height:34px;border-radius:50%;border:none;
  background:var(--brand);color:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .15s;box-shadow:0 3px 10px rgba(var(--brand-rgb),.35);
  font-size:20px;line-height:1;
}
.card-add-btn:active{transform:scale(.8);}
.card-add-btn.in-cart{background:var(--head);}

/* ══ CARD INLINE QTY CONTROLS ══ */
.card-qty-row{
  display:flex;align-items:center;gap:8px;
}
.card-qty-btn-sm{
  width:28px;height:28px;border-radius:50%;border:none;
  background:var(--surf2);color:var(--head);
  font-size:16px;line-height:1;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;font-family:var(--font);
  -webkit-user-select:none;user-select:none;
}
.card-qty-btn-sm:active{transform:scale(.8);}
.card-qty-btn-sm.card-qty-plus{
  background:var(--brand);color:#fff;
  box-shadow:0 2px 8px rgba(var(--brand-rgb),.4);
}
.card-qty-num-sm{
  font-size:14px;font-weight:800;color:var(--head);
  min-width:18px;text-align:center;transition:color .15s;
}
.card-qty-num-sm.active{color:var(--brand);}

/* ══ GRID MODE ══ */
.grid-mode .item-card{flex-direction:column;}
.grid-mode #items-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 12px;}
.grid-mode .item-card-img-wrap{width:100%;height:130px;}
.grid-mode .item-card-body{padding:12px;}
.grid-mode .item-card-desc{display:none;}

/* ══ SKELETON ══ */
@keyframes shimmer{from{background-position:-800px 0}to{background-position:800px 0}}
.sk{
  border-radius:8px;
  background:linear-gradient(90deg,var(--surf) 25%,var(--surf2) 50%,var(--surf) 75%);
  background-size:1600px;animation:shimmer 1.5s infinite linear;
}
.skel-card{display:flex;background:var(--surf);border-radius:var(--r-lg);margin:0 12px 10px;overflow:hidden;border:1px solid var(--border2);}
.skel-img{width:106px;height:106px;flex-shrink:0;}
.skel-body{flex:1;padding:14px;display:flex;flex-direction:column;gap:8px;}

/* ══ EMPTY STATE ══ */
.empty-state{padding:60px 24px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px;}
.empty-icon{width:68px;height:68px;border-radius:var(--r-xl);display:flex;align-items:center;justify-content:center;background:var(--surf2);transform:rotate(-6deg);}
.empty-icon .material-symbols-outlined{font-size:32px;color:var(--text);opacity:.35;}
.empty-title{font-size:17px;font-weight:800;color:var(--head);letter-spacing:-.3px;}
.empty-sub{font-size:13px;color:var(--text);line-height:1.6;max-width:220px;}

/* ══ ANIMATIONS ══ */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes scaleIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
@keyframes bounceIn{0%,100%{transform:scale(1)}45%{transform:scale(1.55)}72%{transform:scale(.88)}}
@keyframes slideUpSheet{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* ══ CART FAB ══ */
#cart-fab{
  position:fixed;bottom:calc(var(--bnav-h) + 8px + var(--safe-b));
  left:50%;transform:translateX(-50%) translateY(80px);
  z-index:58;max-width:460px;width:calc(100% - 32px);
  background:var(--head);color:var(--surf);
  border:none;border-radius:50px;padding:14px 22px;
  font-size:15px;font-weight:700;font-family:var(--font);
  cursor:pointer;box-shadow:0 8px 28px rgba(0,0,0,.22);
  display:flex;align-items:center;gap:10px;
  transition:transform .35s var(--ease-spring),box-shadow .2s;
  pointer-events:none;opacity:0;letter-spacing:-.2px;
}
html[data-theme="dark"] #cart-fab{background:var(--brand);box-shadow:0 8px 28px rgba(var(--brand-rgb),.45);}
#cart-fab.visible{transform:translateX(-50%) translateY(0);pointer-events:auto;opacity:1;}
#cart-fab:active{transform:translateX(-50%) scale(.97) translateY(0);box-shadow:0 4px 12px rgba(0,0,0,.15);}
.cart-fab-left{display:flex;align-items:center;gap:8px;flex:1;}
.cart-fab-badge{
  background:rgba(255,255,255,.25);color:inherit;
  font-size:12px;font-weight:800;border-radius:50px;
  min-width:24px;height:24px;padding:0 7px;
  display:flex;align-items:center;justify-content:center;
}
.cart-fab-text{font-size:15px;font-weight:700;}
.cart-fab-total{font-size:15px;font-weight:800;margin-left:auto;}

/* ══ BOTTOM NAV (floating pill) ══ */
@keyframes bnavSlideUp{
  from{opacity:0;transform:translateX(-50%) translateY(32px) scale(.92);}
  to  {opacity:1;transform:translateX(-50%) translateY(0)   scale(1);}
}
@keyframes bnavPop{
  0%  {transform:scale(1)}
  38% {transform:scale(1.32) translateY(-4px)}
  65% {transform:scale(.88) translateY(1px)}
  82% {transform:scale(1.08) translateY(-1px)}
  100%{transform:scale(1)}
}
#bottom-nav{
  position:fixed;
  bottom:calc(12px + var(--safe-b));
  left:50%;transform:translateX(-50%);
  width:calc(100% - 32px);max-width:448px;
  z-index:60;
  display:flex;justify-content:space-around;align-items:center;
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(28px) saturate(1.8);
  -webkit-backdrop-filter:blur(28px) saturate(1.8);
  border-radius:28px;
  border:1px solid rgba(255,255,255,.55);
  padding:6px 8px;
  box-shadow:0 8px 32px rgba(0,0,0,.13),0 2px 8px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.6);
  animation:bnavSlideUp .5s .15s var(--ease-spring) both;
}
html[data-theme="dark"] #bottom-nav{
  background:rgba(22,21,19,.88);
  border-color:rgba(255,255,255,.08);
  box-shadow:0 8px 32px rgba(0,0,0,.45),0 2px 8px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.04);
}
/* sliding active blob */
#bnav-blob{
  position:absolute;z-index:0;
  background:var(--brand-dim);
  border-radius:50px;
  transition:left .3s var(--ease-spring),width .3s var(--ease-spring);
  pointer-events:none;
  top:6px;height:calc(100% - 12px);
}
.bnav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 4px 6px;border:none;background:transparent;
  cursor:pointer;color:var(--text);font-family:var(--font);
  transition:color .22s var(--ease-out);position:relative;z-index:1;
  -webkit-tap-highlight-color:transparent;border-radius:22px;
  min-width:0;
}
.bnav-item .material-symbols-outlined{
  font-size:22px;line-height:1;
  transition:transform .22s var(--ease-spring),font-variation-settings .2s;
}
.bnav-label{
  font-size:10px;font-weight:600;letter-spacing:.01em;
  transition:opacity .2s,transform .2s var(--ease-spring);
}
.bnav-item:active .material-symbols-outlined{transform:scale(.78);}
.bnav-active{color:var(--brand);}
.bnav-active .material-symbols-outlined{font-variation-settings:'FILL' 1;}
.bnav-active .bnav-label{opacity:1;}
.bnav-item.bnav-pop .material-symbols-outlined{animation:bnavPop .45s var(--ease-spring) both;}
.bnav-badge{
  position:absolute;top:5px;right:calc(50% - 17px);
  min-width:16px;height:16px;padding:0 4px;border-radius:8px;
  background:var(--brand);color:#fff;font-size:9px;font-weight:800;
  line-height:16px;text-align:center;display:none;
  box-shadow:0 2px 6px rgba(var(--brand-rgb),.5);
}
.bnav-badge.show{display:block;animation:scaleIn .2s var(--ease-spring);}

/* ══ SHEET SYSTEM ══ */
.sheet-overlay{
  position:fixed;inset:0;z-index:70;background:rgba(0,0,0,.45);
  opacity:0;pointer-events:none;transition:opacity .3s;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
.sheet-overlay.open{opacity:1;pointer-events:auto;}
.sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:71;
  background:var(--surf);border-radius:var(--r-xl) var(--r-xl) 0 0;
  transform:translateY(100%);
  transition:transform .38s var(--ease-spring);
  box-shadow:0 -8px 50px rgba(0,0,0,.16);overflow:hidden;
  touch-action:pan-y;max-width:480px;margin:0 auto;
}
.sheet.open{transform:translateY(0);}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:10px auto 0;flex-shrink:0;}
.sheet-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.sheet-title{font-size:17px;font-weight:800;color:var(--head);letter-spacing:-.3px;}

/* ══ CATEGORY SHEET ══ */
#cat-sheet{max-height:72vh;display:flex;flex-direction:column;}
#cat-sheet-list{overflow-y:auto;padding:6px 12px calc(16px + var(--safe-b));overscroll-behavior:contain;}
.cat-sheet-item{
  display:flex;align-items:center;gap:14px;padding:13px 10px;border-radius:var(--r-md);
  cursor:pointer;transition:background .15s;border:none;background:transparent;
  width:100%;font-family:var(--font);text-align:left;-webkit-user-select:none;user-select:none;
}
.cat-sheet-item:active{background:var(--surf2);}
.cs-icon-wrap{width:42px;height:42px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;background:var(--surf2);flex-shrink:0;}
.cs-active .cs-icon-wrap{background:var(--brand-dim);}
.cs-icon-wrap .material-symbols-outlined{font-size:20px;color:var(--text);}
.cs-active .cs-icon-wrap .material-symbols-outlined{color:var(--brand);}
.cs-name{font-size:15px;font-weight:600;color:var(--head);flex:1;}
.cs-count{font-size:12px;font-weight:600;color:var(--text);background:var(--surf2);padding:3px 10px;border-radius:50px;}
.cs-active .cs-name{color:var(--brand);}
.cs-active .cs-count{background:var(--brand-dim);color:var(--brand);}

/* ══ ITEM DETAIL MODAL ══ */
#item-modal-overlay{z-index:80;}
#item-modal{
  position:fixed;bottom:0;left:0;right:0;z-index:81;
  background:var(--surf);border-radius:var(--r-xl) var(--r-xl) 0 0;
  max-height:92vh;overflow-y:auto;
  transform:translateY(100%);
  transition:transform .38s var(--ease-spring);
  box-shadow:0 -8px 50px rgba(0,0,0,.2);
  padding-bottom:calc(20px + var(--safe-b));
  overscroll-behavior:contain;touch-action:pan-y;
  max-width:480px;margin:0 auto;
}
#item-modal.open{transform:translateY(0);}
#item-modal-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:10px auto 0;}
#item-modal-img{width:100%;height:280px;object-fit:cover;background:var(--surf2);display:none;margin-top:10px;border-radius:var(--r-lg);}
#item-modal-img.has-img{display:block;}
#item-modal-body{padding:20px 20px 0;}
.modal-cat-badge{
  display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:50px;
  background:var(--brand-dim);color:var(--brand);font-size:11px;font-weight:700;
  margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;
}
#item-modal-name{font-size:22px;font-weight:900;color:var(--head);letter-spacing:-.5px;line-height:1.2;}
#item-modal-desc{font-size:14px;line-height:1.7;color:var(--text);margin-top:8px;}
#item-modal-desc:empty{display:none;}
#item-modal-price{font-size:24px;font-weight:900;color:var(--price);letter-spacing:-.5px;margin-top:12px;}
#item-modal-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
#item-modal-meta:empty{display:none;}
.modal-tag{font-size:12px;font-weight:600;padding:5px 12px;border-radius:50px;background:var(--surf2);color:var(--text);}
#item-modal-stars{display:flex;align-items:center;gap:3px;margin-top:10px;}
.modal-star-btn{
  background:none;border:none;cursor:pointer;padding:3px;
  color:var(--surf3);font-size:24px;line-height:1;
  font-variation-settings:'FILL' 0;transition:transform .1s;
  -webkit-user-select:none;user-select:none;
}
.modal-star-btn.selected{color:#f59e0b;font-variation-settings:'FILL' 1;}
.modal-star-btn:active{transform:scale(1.4);}
#rate-feedback{font-size:12px;color:var(--text);opacity:.65;margin-top:4px;min-height:16px;}
.modal-divider{height:1px;background:var(--border);margin:18px 0;}
#modal-action-row{display:flex;align-items:center;gap:16px;}
.qty-wrap{display:flex;align-items:center;background:var(--surf2);border-radius:50px;padding:4px;}
.qty-btn{
  width:36px;height:36px;border-radius:50%;border:none;background:var(--surf);color:var(--head);
  font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-family:var(--font);transition:all .15s;box-shadow:var(--shadow-xs);
}
.qty-btn:active{transform:scale(.86);background:var(--surf2);}
#qty-count{font-size:17px;font-weight:800;color:var(--head);min-width:40px;text-align:center;}
#add-to-cart-btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
  padding:16px 20px;border:none;border-radius:50px;
  background:var(--head);color:var(--surf);
  font-size:15px;font-weight:800;font-family:var(--font);
  cursor:pointer;transition:all .15s;letter-spacing:-.2px;
  box-shadow:0 6px 20px rgba(0,0,0,.18);
}
html[data-theme="dark"] #add-to-cart-btn{background:var(--brand);}
#add-to-cart-btn:active{transform:scale(.97);box-shadow:none;}

/* ══ CART SHEET ══ */
#cart-sheet{max-height:85vh;display:flex;flex-direction:column;z-index:91;}
#cart-overlay{z-index:90;}
#cart-sheet-header{padding:16px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#cart-sheet-title{font-size:18px;font-weight:800;color:var(--head);letter-spacing:-.3px;}
#cart-clear-btn{font-size:13px;font-weight:700;color:var(--brand);background:none;border:none;cursor:pointer;font-family:var(--font);padding:6px 10px;border-radius:var(--r-sm);}
#cart-items-list{flex:1;overflow-y:auto;padding:6px 20px;overscroll-behavior:contain;}
.cart-item{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border2);animation:fadeUp .2s var(--ease-out) both;}
.cart-item:last-child{border-bottom:none;}
.cart-item-img{width:56px;height:56px;border-radius:var(--r-md);object-fit:cover;flex-shrink:0;background:var(--surf2);}
.cart-item-name{font-size:14px;font-weight:700;color:var(--head);}
.cart-item-price{font-size:13px;color:var(--text);margin-top:2px;}
.cart-item-qty{display:flex;align-items:center;gap:10px;}
.cart-qty-btn{
  width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--surf2);
  color:var(--head);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font);transition:all .12s;
}
.cart-qty-btn:active{transform:scale(.84);}
.cart-qty-num{font-size:14px;font-weight:800;color:var(--head);min-width:18px;text-align:center;}
#cart-empty{padding:48px 20px;text-align:center;color:var(--text);font-size:14px;display:none;}
#cart-footer{padding:14px 20px calc(18px + var(--safe-b));border-top:1px solid var(--border);flex-shrink:0;display:none;}
#cart-total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
#cart-total-label{font-size:15px;font-weight:600;color:var(--text);}
#cart-total-value{font-size:22px;font-weight:900;color:var(--head);letter-spacing:-.5px;}
#cart-customer-fields{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
.cust-field{
  width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:var(--r-md);
  background:var(--surf2);color:var(--head);font-size:14px;font-family:var(--font);font-weight:500;
  outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;
}
.cust-field:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(var(--brand-rgb),.15);}
.cust-field.err{border-color:#ef4444;}
.phone-wrap{position:relative;}
#cart-phone-status{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:17px;display:none;font-weight:700;}
#cart-phone-error{display:none;color:#ef4444;font-size:11px;margin-top:-6px;font-weight:500;}
#checkout-order-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:16px;border:none;border-radius:50px;
  background:var(--head);color:var(--surf);
  font-size:16px;font-weight:800;font-family:var(--font);
  cursor:pointer;transition:all .15s;letter-spacing:-.2px;
  box-shadow:0 6px 20px rgba(0,0,0,.18);
}
html[data-theme="dark"] #checkout-order-btn{background:var(--brand);}
#checkout-order-btn:active{transform:scale(.97);}

/* ══ TOAST ══ */
#toast{
  position:fixed;bottom:calc(var(--bnav-h) + 16px + var(--safe-b));
  left:50%;transform:translateX(-50%) translateY(16px);
  background:var(--head);color:var(--surf);
  padding:12px 22px;border-radius:50px;
  font-size:13px;font-weight:700;letter-spacing:-.1px;
  white-space:nowrap;pointer-events:none;
  opacity:0;transition:all .25s var(--ease-spring);
  z-index:200;box-shadow:var(--shadow-md);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ══ ERROR ══ */
#error-state{
  display:none;position:fixed;inset:0;background:var(--bg);z-index:100;
  flex-direction:column;align-items:center;justify-content:center;
  gap:16px;padding:32px;text-align:center;
}

/* ══ FOOTER ══ */
#footer{display:none;align-items:center;justify-content:center;gap:6px;padding:20px 16px;font-size:11px;color:var(--text);opacity:.4;border-top:1px solid var(--border);}

/* ══ RESPONSIVE ══ */
@media(max-width:480px){
  /* ── Category icon boxes ── */
  #cat-section-label{
    display:block;
    padding:16px 16px 0;
    font-size:16px;font-weight:800;color:var(--head);letter-spacing:-.3px;
  }
  #cat-tabs{
    justify-content:flex-start!important;
    flex-wrap:nowrap!important;
    padding:10px 16px 14px!important;
    gap:10px!important;
  }
  .tab-pill{
    flex-direction:column!important;
    width:68px!important;min-width:68px!important;
    height:auto!important;
    border-radius:18px!important;
    padding:12px 4px 9px!important;
    gap:5px!important;
    font-size:11px!important;
    letter-spacing:0!important;
    font-weight:600!important;
  }
  .tab-icon-sm{font-size:28px!important;}
  /* ── Menu section label ── */
  #menu-section-label{
    display:block;
    padding:14px 16px 2px;
    font-size:16px;font-weight:800;color:var(--head);letter-spacing:-.3px;
  }
  /* ── Item cards ── */
  .item-card{border-radius:20px!important;}
  .item-card-img-wrap{
    width:82px!important;height:82px!important;
    border-radius:14px!important;
    margin:10px 0 10px 10px!important;
  }
  .item-card-name{font-size:14.5px!important;}
  .item-card-desc{-webkit-line-clamp:1!important;}
  /* ── Hero ── */
  #hero-restaurant-name{font-size:28px!important;line-height:1.15!important;}
  /* ── Hide view toggle ── */
  #view-bar{display:none!important;}
  /* ── Subcat nav tighter ── */
  #subcat-tabs{padding-left:16px!important;}
}
@media(min-width:481px){
  body{background:var(--surf2);}
  #app{box-shadow:var(--shadow-lg);}
  #bottom-nav,#cart-fab{display:none!important;}
  #footer{display:flex;}
  #items-container{padding-bottom:40px;}
  #cart-fab-desktop{
    display:flex!important;position:fixed;bottom:24px;right:24px;z-index:58;
    background:var(--head);color:var(--surf);
    border:none;border-radius:50px;padding:14px 22px;
    font-size:15px;font-weight:700;font-family:var(--font);
    cursor:pointer;box-shadow:var(--shadow-lg);
    align-items:center;gap:10px;
    transition:transform .15s,box-shadow .15s;
    opacity:0;pointer-events:none;
  }
  #cart-fab-desktop.visible{opacity:1;pointer-events:auto;}
}
</style>
</head>
<body>
<div id="app">

  <!-- Topbar -->
  <header id="topbar">
    <div style="flex:1"></div>
    <div id="topbar-name">Menu</div>
    <div style="flex:1;display:flex;justify-content:flex-end;gap:8px">
      <button class="icon-btn" id="search-toggle-btn" onclick="toggleSearchBar()" aria-label="Search">
        <span class="material-symbols-outlined">search</span>
      </button>
      <button class="icon-btn" id="theme-btn" onclick="toggleTheme()" aria-label="Toggle theme">
        <span class="material-symbols-outlined" id="theme-icon">dark_mode</span>
      </button>
    </div>
  </header>

  <!-- Hero -->
  <div id="hero" data-layout="logo-left">
    <img id="hero-img" src="" alt=""/>

      <div id="hero-row">
        <div id="hero-logo">
          <img id="hero-logo-img" src="" alt=""/>
          <span class="hero-initials" id="hero-initials"></span>
        </div>

          <div id="hero-restaurant-name">Loading&hellip;</div>
          <div id="hero-tagline"></div>
        </div>
      </div>
      <div class="hero-chips" id="hero-chips"></div>
    </div>
  </div>

  <!-- Contact bar -->
  <div id="contact-bar"></div>

  <!-- Table banner -->
  <div id="table-banner">
    <span class="material-symbols-outlined" style="font-size:18px;flex-shrink:0">table_restaurant</span>
    <span id="table-banner-label">Table &mdash;</span>
    <button id="call-waiter-btn" onclick="callWaiter()">
      <span class="material-symbols-outlined" style="font-size:14px">notifications</span>
      Call Waiter
    </button>
    <span id="waiter-sent-msg">&#10003; Notified!</span>

  <!-- Search bar -->
  <div id="search-bar-wrap">

             autocomplete="off" spellcheck="false" oninput="onSearchInput()"/>

  <!-- Items -->

  <div id="items-container"></div>

  <!-- Footer (desktop) -->
  <div id="footer">
    <span class="material-symbols-outlined" style="font-size:14px">qr_code_2</span>
    Powered by RestOrder
  </div>
</div>

<!-- Bottom nav -->
<nav id="bottom-nav">
  <div id="bnav-blob"></div>
  <button class="bnav-item bnav-active" data-nav="menu" onclick="navTo('menu')">
    <span class="material-symbols-outlined">restaurant_menu</span>
    <span class="bnav-label">Menu</span>
  </button>
  <button class="bnav-item" data-nav="categories" onclick="navTo('categories')">
    <span class="material-symbols-outlined">category</span>
    <span class="bnav-label">Browse</span>
  </button>
  <button class="bnav-item" data-nav="search" onclick="navTo('search')">
    <span class="material-symbols-outlined">search</span>
    <span class="bnav-label">Search</span>
  </button>
  <button class="bnav-item" data-nav="cart" onclick="navTo('cart')">
    <span class="material-symbols-outlined">shopping_bag</span>

    <span class="bnav-label">Cart</span>
  </button>
  <button class="bnav-item" data-nav="theme" onclick="navTo('theme')">
    <span class="material-symbols-outlined" id="bnav-theme-icon">dark_mode</span>
    <span class="bnav-label">Theme</span>
  </button>
</nav>

<!-- Cart FAB pill (mobile) -->

  <div class="cart-fab-left">

  </div>
  <span class="cart-fab-total" id="cart-fab-total"></span>
</button>

<!-- Toast -->
<div id="toast"></div>

<!-- Error -->
<div id="error-state">
  <div style="width:76px;height:76px;border-radius:50%;background:var(--surf2);display:flex;align-items:center;justify-content:center">
    <span class="material-symbols-outlined" style="font-size:34px;color:var(--text);opacity:.4">error_outline</span>
  </div>
  <p style="font-size:20px;font-weight:900;color:var(--head);letter-spacing:-.4px">Menu Not Found</p>
  <p id="error-msg" style="font-size:13px;color:var(--text);line-height:1.7;max-width:280px"></p>
</div>

<!-- Category sheet -->
<div id="cat-sheet-overlay" class="sheet-overlay" onclick="closeCatSheet();updateNavActive('menu')"></div>
<div id="cat-sheet" class="sheet" role="dialog" aria-modal="true" aria-label="Categories">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-title">All Categories</span>
    <button class="icon-btn" style="background:var(--surf2);box-shadow:none" onclick="closeCatSheet();updateNavActive('menu')" aria-label="Close">
      <span class="material-symbols-outlined">close</span>
    </button>
  </div>
  <div id="cat-sheet-list"></div>
</div>

<!-- Item detail modal -->
<div id="item-modal-overlay" class="sheet-overlay" onclick="closeItemDetail()"></div>
<div id="item-modal" role="dialog" aria-modal="true">
  <div id="item-modal-handle"></div>
  <img id="item-modal-img" src="" alt=""/>
  <div id="item-modal-body">
    <div class="modal-cat-badge" id="item-modal-cat" style="display:none"></div>
    <div id="item-modal-name"></div>
    <div id="item-modal-stars"></div>
    <div id="rate-feedback"></div>
    <div id="item-modal-desc"></div>
    <div id="item-modal-meta"></div>
    <div id="item-modal-price"></div>
    <div class="modal-divider"></div>
    <div id="modal-action-row">
      <div class="qty-wrap">
        <button class="qty-btn" onclick="adjustQty(-1)">&#8722;</button>
        <span id="qty-count">1</span>
        <button class="qty-btn" onclick="adjustQty(1)">+</button>
      </div>
      <button id="add-to-cart-btn" onclick="addToCart()">
        <span class="material-symbols-outlined" style="font-size:20px">add_shopping_cart</span>
        Add to Order
      </button>
    </div>
  </div>
</div>

<!-- Cart sheet -->
<div id="cart-overlay" class="sheet-overlay" onclick="closeCart()"></div>
<div id="cart-sheet" class="sheet" role="dialog" aria-modal="true" aria-label="Your order">
  <div class="sheet-handle"></div>
  <div id="cart-sheet-header">
    <span id="cart-sheet-title">Your Order</span>
    <button id="cart-clear-btn" onclick="clearCart()">Clear All</button>
  </div>
  <div id="cart-items-list"></div>
  <div id="cart-empty">
    <span class="material-symbols-outlined" style="font-size:48px;color:var(--text);opacity:.2;display:block;margin-bottom:10px">shopping_bag</span>
    <p style="font-size:14px;font-weight:600">Your order is empty</p>
    <p style="font-size:12px;margin-top:4px;opacity:.6">Add items from the menu to get started</p>
  </div>
  <div id="cart-footer">
    <div id="cart-total-row">
      <span id="cart-total-label">Total</span>
      <span id="cart-total-value"></span>
    </div>
    <div id="cart-customer-fields">
      <input id="cart-cust-name" class="cust-field" type="text" placeholder="Your name *" autocomplete="name"/>
      <div class="phone-wrap">
        <input id="cart-cust-phone" class="cust-field" type="tel" placeholder="Phone number *" autocomplete="tel"/>
        <span id="cart-phone-status"></span>
      </div>
      <span id="cart-phone-error"></span>
    </div>
    <button id="checkout-order-btn" onclick="placeOrder()">
      <span class="material-symbols-outlined" style="font-size:20px">receipt_long</span>
      Place Order
    </button>
  </div>
</div>

<script>
/* ── CURRENCIES ── */
const CURRENCIES={USD:'$',EUR:'&#8364;',GBP:'&#163;',BRL:'R$',CAD:'CA$',AUD:'A$',AED:'AED ',SAR:'SAR ',QAR:'QR ',KWD:'KD ',BHD:'BD ',OMR:'OMR ',INR:'&#8377;',PKR:'&#8360;',BDT:'&#2547;',JPY:'&#165;',CNY:'&#165;',KRW:'&#8361;',MYR:'RM',SGD:'S$',THB:'&#3647;',PHP:'&#8369;',IDR:'Rp',TRY:'&#8378;',NGN:'&#8358;',GHS:'&#8373;',KES:'KSh',TZS:'TSh',ZAR:'R'};

const CAT_ICONS={food:'lunch_dining',drinks:'local_bar',beverages:'local_bar',dessert:'cake',desserts:'cake',appetizer:'tapas',appetizers:'tapas',snacks:'fastfood',pizza:'local_pizza',burgers:'lunch_dining',bakery:'bakery_dining',seafood:'set_meal',salads:'eco',soups:'soup_kitchen',breakfast:'egg_alt',coffee:'coffee',cocktails:'nightlife',wine:'wine_bar',beer:'sports_bar',starters:'tapas',mains:'restaurant',sides:'rice_bowl',pasta:'dinner_dining',sushi:'set_meal',grill:'outdoor_grill'};
function getCatIcon(c){return CAT_ICONS[(c||'').toLowerCase()]||'restaurant_menu';}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function haptic(ms){if(navigator.vibrate)navigator.vibrate(ms||10);}
let _tt;
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2200);}

let allItems=[],activeCategory='',activeSubcategory='All';
let menuCurrency='$',searchBarOpen=false;
let menuData=null,userTheme=null;
let viewMode=localStorage.getItem('menuViewMode')||'list';
let cart=[],modalItem=null,modalQty=1;
let currentTableLabel='';

/* ── THEME ── */
(function(){
  const s=localStorage.getItem('menuTheme');
  userTheme=(s==='dark'||s==='light')?s:'light';
  document.documentElement.dataset.theme=userTheme;
  syncThemeIcons();
})();
function syncThemeIcons(){
  const d=document.documentElement.dataset.theme==='dark';
  const i=d?'light_mode':'dark_mode';
  const ti=document.getElementById('theme-icon');if(ti)ti.textContent=i;
  const bi=document.getElementById('bnav-theme-icon');if(bi)bi.textContent=i;
}
function toggleTheme(){
  const d=document.documentElement.dataset.theme==='dark';
  userTheme=d?'light':'dark';
  localStorage.setItem('menuTheme',userTheme);
  haptic(12);
  if(menuData)applyBranding(menuData);
  else{document.documentElement.dataset.theme=userTheme;syncThemeIcons();}
}

/* ── SCROLL: topbar ── */
window.addEventListener('scroll',()=>{
  const h=document.getElementById('hero')?.offsetHeight||140;
  document.getElementById('topbar').classList.toggle('scrolled',window.scrollY>h-80);
},{passive:true});

/* ── SEARCH ── */
function toggleSearchBar(){
  searchBarOpen=!searchBarOpen;
  const w=document.getElementById('search-bar-wrap');
  w.style.display=searchBarOpen?'block':'none';
  if(searchBarOpen)requestAnimationFrame(()=>document.getElementById('search-input').focus());
  else{document.getElementById('search-input').value='';document.getElementById('search-clear').classList.remove('show');renderItems();}
}
function onSearchInput(){
  const v=document.getElementById('search-input').value;
  document.getElementById('search-clear').classList.toggle('show',v.length>0);
  renderItems();
}
function clearSearch(){
  document.getElementById('search-input').value='';
  document.getElementById('search-clear').classList.remove('show');
  renderItems();
  document.getElementById('search-input').focus();
}

/* ── BOOT ── */
(async()=>{
  const p=new URLSearchParams(location.search);
  const id=p.get('id');
  currentTableLabel=p.get('table')||'';
  if(!id){showError('No menu ID provided in the URL.');return;}
  showSkeleton();
  try{
    const r=await fetch('/api/menus/'+encodeURIComponent(id));
    if(!r.ok)throw new Error('Menu not found (HTTP '+r.status+')');
    const d=await r.json();
    menuData=d;
    document.title=(d.restaurantName||'Menu')+' \u2014 Menu';
    applyBranding(d);
    allItems=d.items||[];
    buildTabs();renderItems();setView(viewMode);
    if(currentTableLabel&&d.tablesEnabled){
      document.getElementById('table-banner-label').textContent='\uD83D\uDCCD '+currentTableLabel;
      document.getElementById('table-banner').classList.add('visible');
    }
  }catch(e){showError(e.message);}
})();

const FONT_URLS={modern:'Inter:wght@400;500;600;700;800;900',elegant:'Playfair+Display:wght@400;600;700',casual:'Poppins:wght@400;600;700;800',bold:'Oswald:wght@400;500;600;700',minimal:'Inter:wght@400;500;600;700;800'};
const FONT_FAM={modern:"'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",elegant:"'Playfair Display',serif",casual:"'Poppins',sans-serif",bold:"'Oswald',sans-serif",minimal:"'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"};
const BG_PAL={light:{bg:'#fafaf9',surf:'#ffffff',dark:false},pale:{bg:'#f2f2f2',surf:'#fafafa',dark:false},dark:{bg:'#0f0e0d',surf:'#1a1917',dark:true},ocean:{bg:'#0d1b2a',surf:'#132639',dark:true},darker:{bg:'#0e0e0e',surf:'#161616',dark:true},cafe:{bg:'#1c1108',surf:'#2a1a0e',dark:true},warm:{bg:'#1a1008',surf:'#241808',dark:true}};
function lighten(h,a){if(!h||h.length<7)return h;const r=Math.min(255,parseInt(h.slice(1,3),16)+Math.round(255*a));const g=Math.min(255,parseInt(h.slice(3,5),16)+Math.round(255*a));const b=Math.min(255,parseInt(h.slice(5,7),16)+Math.round(255*a));return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');}

function applyBranding(data){
  if(!data)return;
  let bk=data.bgStyle||'light';
  const sp=BG_PAL[bk]||BG_PAL.light;
  if(userTheme==='dark'&&!sp.dark)bk='dark';
  else if(userTheme==='light'&&sp.dark)bk='light';
  const pal=BG_PAL[bk]||BG_PAL.light;
  const dark=pal.dark;
  document.documentElement.dataset.theme=dark?'dark':'light';
  syncThemeIcons();
  const col=data.brandColor||'#c2410c';
  const rgb=hexToRgb(col);
  const bg=data.bgColor||pal.bg;
  const surf=data.cardBg||pal.surf;
  const surf2=lighten(surf,dark?.06:-.02);
  const surf3=lighten(surf,dark?.10:-.08);
  const head=data.headingColor||(dark?'#f2ede8':'#1c1917');
  const text=data.textColor||(dark?'#9b9590':'#78716c');
  menuCurrency=CURRENCIES[data.currency]||'$';
  const dv=dark?'rgba(255,255,255,.07)':'rgba(0,0,0,.07)';
  const dv2=dark?'rgba(255,255,255,.04)':'rgba(0,0,0,.04)';
  let s=document.getElementById('branding-overrides');
  if(!s){s=document.createElement('style');s.id='branding-overrides';document.head.appendChild(s);}
  s.textContent=`
    :root{--brand:${col};--brand-rgb:${rgb};--brand-dim:${col}1a;--brand-mid:${col}30;--bg:${bg};--surf:${surf};--surf2:${surf2};--surf3:${surf3};--text:${text};--head:${head};--border:${dv};--border2:${dv2};}
    body,#app{background:${bg}!important;}
    #topbar.scrolled{background:${dark?'rgba(15,14,13,.93)':'rgba(255,255,255,.93)'}!important;border-bottom:2px solid ${col}!important;}
    #topbar-name{color:${col}!important;}
    #hero{background:${col}!important;}
    #search-bar{background:${surf}!important;border-color:${dv}!important;}
    #search-input{color:${head}!important;}
    #cat-nav{background:${bg}!important;}
    .tab-active{background:${col}!important;color:#fff!important;box-shadow:0 4px 16px ${col}60!important;}
    .tab-inactive{background:${surf}!important;color:${text}!important;border-color:${dv}!important;}
    .subcat-active{background:${col}1a!important;color:${col}!important;border-color:${col}!important;}
    .subcat-inactive{color:${text}!important;border-color:${dv}!important;}
    .item-card{background:${surf}!important;border-color:${dv2}!important;}
    .item-card-img-wrap,.item-card-no-img{background:${surf2}!important;}
    .sk{background:linear-gradient(90deg,${surf} 25%,${surf2} 50%,${surf} 75%)!important;background-size:1600px!important;}
    .skel-img{background:${surf2}!important;}
    .tag-chip{background:${col}18!important;color:${col}!important;}
    .modal-cat-badge{background:${col}18!important;color:${col}!important;}
    #bottom-nav{background:${dark?'rgba(22,21,19,.88)':'rgba(255,255,255,.88)'}!important;border-color:${dark?'rgba(255,255,255,.08)':'rgba(255,255,255,.55)'}!important;}
    #bnav-blob{background:${col}18!important;}
    .bnav-active{color:${col}!important;}
    .bnav-badge{background:${col}!important;}
    #cart-fab{background:${col}!important;box-shadow:0 8px 28px ${col}66!important;}
    #add-to-cart-btn,#checkout-order-btn{background:${dark?col:head}!important;}
    .card-qty-btn-sm.card-qty-plus{background:${col}!important;box-shadow:0 2px 8px ${col}55!important;color:#fff!important;}
    .icon-btn{color:${head}!important;}
    #topbar.scrolled .icon-btn{background:${surf2}!important;}
    .sheet,#item-modal,#cat-sheet,#cart-sheet{background:${surf}!important;}
    .cust-field{background:${surf2}!important;color:${head}!important;border-color:${dv}!important;}
    .cust-field:focus{border-color:${col}!important;box-shadow:0 0 0 3px ${col}25!important;}
    .cart-qty-btn{background:${surf2}!important;border-color:${dv}!important;}
    .qty-wrap{background:${surf2}!important;}
    .qty-btn{background:${surf}!important;}
    .view-toggle{background:${surf2}!important;}
    .view-btn.active{background:${surf}!important;}
    .cat-sheet-item:active{background:${surf2}!important;}
    .cs-icon-wrap{background:${surf2}!important;}
    .cs-active .cs-icon-wrap{background:${col}18!important;}
    .cs-active .cs-icon-wrap .material-symbols-outlined{color:${col}!important;}
    .cs-active .cs-name{color:${col}!important;}
    .cs-active .cs-count{background:${col}18!important;color:${col}!important;}
    #table-banner{background:${col}!important;}
    #cart-clear-btn{color:${col}!important;}
    #contact-bar a svg{fill:${col}!important;}
    #cat-section-label,#menu-section-label{color:${head}!important;}
    @media(min-width:481px){body{background:${lighten(bg,dark?-.025:.015)}!important;}}
  `;
  document.querySelector('#meta-theme').content=bg;
  /* ── Header layout + visibility ── */
  const layout=data.headerLayout||'logo-left';
  const showLogo=data.showLogo!==0;
  const showName=data.showName!==0;
  document.getElementById('hero').dataset.layout=layout;
  document.getElementById('hero-restaurant-name').textContent=data.restaurantName||'';
  const ht=document.getElementById('hero-tagline');if(ht)ht.textContent=data.tagline||'';
  document.getElementById('topbar-name').textContent=data.restaurantName||'';
  /* Toggle visibility based on showLogo / showName */
  const hl=document.getElementById('hero-logo');
  const hn=document.getElementById('hero-restaurant-name');
  const htl=document.getElementById('hero-tagline');
  hn.classList.toggle('hero-hidden',!showName);
  if(htl)htl.classList.toggle('hero-hidden',!showName);
  const hi=document.getElementById('hero-img');
  if(data.coverImage||data.heroImage){hi.src=data.coverImage||data.heroImage;hi.alt=data.restaurantName||'';hi.classList.add('show');}
  const chips=document.getElementById('hero-chips');
  const cd=[];
  if(data.cuisine)cd.push({icon:'restaurant',label:data.cuisine});
  if(data.hours)cd.push({icon:'schedule',label:data.hours});
  if(data.location)cd.push({icon:'location_on',label:data.location});
  chips.innerHTML=cd.map(c=>`<span class="hero-chip"><span class="material-symbols-outlined">${c.icon}</span>${esc(c.label)}</span>`).join('');
  const hli=document.getElementById('hero-logo-img');
  const hli2=document.getElementById('hero-initials');
  if(showLogo){
    if(data.logoUrl){hli.src=data.logoUrl;hli.alt=data.restaurantName||'';hli.classList.add('show');hli2.style.display='none';}
    else{const w=(data.restaurantName||'').trim().split(/\s+/);if(w.length&&w[0])hli2.textContent=w.length>=2?(w[0][0]+w[1][0]).toUpperCase():(data.restaurantName||'').substring(0,2).toUpperCase();hli.style.display='none';}
    hl.style.background=col;hl.classList.add('show');hl.classList.remove('hero-hidden');
  }else{hl.classList.remove('show');hl.classList.add('hero-hidden');}
  if(data.fontStyle&&data.fontStyle!=='modern'&&data.fontStyle!=='minimal'){let lk=document.getElementById('brand-font');if(!lk){lk=document.createElement('link');lk.id='brand-font';lk.rel='stylesheet';document.head.appendChild(lk);}lk.href='https://fonts.googleapis.com/css2?family='+FONT_URLS[data.fontStyle]+'&display=swap';}
  document.body.style.fontFamily=FONT_FAM[data.fontStyle||'modern']||FONT_FAM.modern;
  buildContactBar(data);
  if(allItems.length){buildTabs();renderItems();}
}
function hexToRgb(h){if(!h||h.length<7)return'194,65,12';return`${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`;}

/* ── CONTACT BAR ── */
function buildContactBar(data){
  const bar=document.getElementById('contact-bar');if(!bar)return;
  const lks=[];
  if(data.phone)lks.push({href:'tel:'+data.phone.replace(/\s/g,''),label:data.phone,icon:'<svg viewBox="0 0 24 24"><path d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.01-.24c1.12.37 2.33.57 3.58.57a1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1c0 1.25.2 2.46.57 3.58a1 1 0 0 1-.25 1.01l-2.2 2.2z"/></svg>'});
  if(data.email)lks.push({href:'mailto:'+data.email,label:data.email,icon:'<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/></svg>'});
  if(data.website){let u=data.website;if(!/^https?:\/\//i.test(u))u='https://'+u;lks.push({href:u,label:'Website',icon:'<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>'});}
  if(data.socialInstagram)lks.push({href:data.socialInstagram,label:'Instagram',icon:'<svg viewBox="0 0 24 24"><path d="M7.8 2h8.4C19.4 2 22 4.6 22 7.8v8.4a5.8 5.8 0 0 1-5.8 5.8H7.8C4.6 22 2 19.4 2 16.2V7.8A5.8 5.8 0 0 1 7.8 2zm-.2 2A3.6 3.6 0 0 0 4 7.6v8.8C4 18.39 5.61 20 7.6 20h8.8a3.6 3.6 0 0 0 3.6-3.6V7.6C20 5.61 18.39 4 16.4 4H7.6zm9.65 1.5a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5zM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/></svg>'});
  if(data.socialWhatsapp)lks.push({href:data.socialWhatsapp,label:'WhatsApp',icon:'<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347zM12.05 21.785a9.74 9.74 0 0 1-4.968-1.358l-.356-.212-3.691.969.985-3.599-.232-.37A9.726 9.726 0 0 1 2.3 12.01C2.3 6.636 6.66 2.27 12.05 2.27S21.79 6.636 21.79 12.01c0 5.374-4.36 9.775-9.74 9.775zM12.05.22C5.556.22.25 5.528.25 12.01c0 2.084.544 4.108 1.58 5.897L.1 24l6.253-1.64a11.77 11.77 0 0 0 5.697 1.457C18.544 23.817 23.85 18.51 23.85 12.01S18.544.22 12.05.22z"/></svg>'});
  if(!lks.length){bar.classList.remove('visible');bar.innerHTML='';return;}
  bar.innerHTML=lks.map(l=>`<a href="${esc(l.href)}" target="_blank" rel="noopener">${l.icon}${esc(l.label)}</a>`).join('');
  bar.classList.add('visible');
}

/* ── TABS ── */
function buildTabs(){
  const cats=[...new Set(allItems.map(it=>it.category||'Other'))];
  if(!cats.length)return;
  if(!activeCategory||activeCategory==='All'||!cats.includes(activeCategory)){activeCategory=cats[0];activeSubcategory='All';}
  document.getElementById('cat-tabs').innerHTML=cats.map(c=>{
    const on=c===activeCategory;
    return`<button onclick="setCategory('${esc(c)}')" data-cat="${esc(c)}" class="tab-pill ${on?'tab-active':'tab-inactive'}"><span class="material-symbols-outlined tab-icon-sm">${getCatIcon(c)}</span>${esc(c)}</button>`;
  }).join('');
  buildSubcatPills();
}
function setCategory(cat){
  activeCategory=cat;activeSubcategory='All';haptic(8);
  document.querySelectorAll('.tab-pill').forEach(b=>{const on=b.dataset.cat===cat;b.classList.toggle('tab-active',on);b.classList.toggle('tab-inactive',!on);});
  const btn=document.querySelector(`.tab-pill[data-cat="${CSS.escape(cat)}"]`);
  if(btn)btn.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  buildSubcatPills();renderItems();
}
function buildSubcatPills(){
  const sd=document.getElementById('subcat-tabs');
  const ci=allItems.filter(it=>(it.category||'Other')===activeCategory);
  const subs=[...new Set(ci.map(it=>it.subcategory||'').filter(Boolean))];
  if(!subs.length){sd.classList.remove('visible');return;}
  let h=`<button onclick="setSubcategory('All')" data-sub="All" class="subcat-pill ${activeSubcategory==='All'?'subcat-active':'subcat-inactive'}">All</button>`;
  h+=subs.map(s=>`<button onclick="setSubcategory('${esc(s)}')" data-sub="${esc(s)}" class="subcat-pill ${s===activeSubcategory?'subcat-active':'subcat-inactive'}">${esc(s)}</button>`).join('');
  sd.innerHTML=h;sd.classList.add('visible');
}
function setSubcategory(sub){
  activeSubcategory=sub;haptic(6);
  document.querySelectorAll('.subcat-pill').forEach(b=>{const on=b.dataset.sub===sub;b.classList.toggle('subcat-active',on);b.classList.toggle('subcat-inactive',!on);});
  renderItems();
}

/* ── RENDER ── */
function renderItems(){
  const q=(document.getElementById('search-input').value||'').toLowerCase().trim();
  const filtered=[];
  allItems.forEach((it,i)=>{
    const cat=it.category||'Other',sub=it.subcategory||'';
    const inCat=cat===activeCategory;
    const inSub=activeSubcategory==='All'||sub===activeSubcategory;
    const inQ=!q||(it.name||'').toLowerCase().includes(q)||(it.description||'').toLowerCase().includes(q)||cat.toLowerCase().includes(q)||sub.toLowerCase().includes(q);
    if(inCat&&inSub&&inQ)filtered.push({...it,_idx:i});
  });
  const n=filtered.length;
  document.getElementById('count-label').textContent=n+(n===1?' item':' items');
  const container=document.getElementById('items-container');
  if(!n){container.innerHTML=`<div class="empty-state"><div class="empty-icon"><span class="material-symbols-outlined">search_off</span></div><p class="empty-title">Nothing here</p><p class="empty-sub">Try a different keyword or browse another category.</p></div>`;return;}
  const sg={};for(const it of filtered){const s=it.subcategory||'';(sg[s]=sg[s]||[]).push(it);}
  if(viewMode==='grid')container.innerHTML=Object.entries(sg).map(([s,items],i)=>buildGridSection(s,items,i)).join('');
  else container.innerHTML=Object.entries(sg).map(([s,items],i)=>buildListSection(s,items,i)).join('');
}
function buildListSection(sub,items,idx){
  const h=sub?`<div class="section-header"><span class="section-title">${esc(sub)}</span><span class="section-count">${items.length}</span></div>`:'<div style="height:12px"></div>';
  return`<div class="cat-section" style="animation-delay:${idx*40}ms">${h}${items.map(it=>buildListCard(it)).join('')}</div>`;
}
function buildGridSection(sub,items,idx){
  const h=sub?`<div class="section-header"><span class="section-title">${esc(sub)}</span><span class="section-count">${items.length}</span></div>`:'<div style="height:12px"></div>';
  return`<div class="cat-section grid-mode" style="animation-delay:${idx*40}ms">${h}<div id="items-grid">${items.map(it=>buildGridCard(it)).join('')}</div></div>`;
}
function buildListCard(item){
  const idx=item._idx??0;
  const px=parseFloat(item.price);const hasPx=!isNaN(px)&&px>0;
  const pxStr=hasPx?menuCurrency+px.toFixed(2).replace('.00',''):'';
  const desc=(item.description||'').trim();
  const tags=Array.isArray(item.tags)?item.tags:[];
  const img=(item.imageUrl||'').trim();
  const rating=parseFloat(item.rating)||0;
  const cartItem=cart.find(c=>c._idx===idx);
  const qty=cartItem?cartItem.qty:0;
  let stars='';
  if(rating>0){let s='';for(let i=1;i<=5;i++)s+=`<span class="material-symbols-outlined star-icon${i<=Math.round(rating)?' filled':''}">star</span>`;stars=`<div class="item-stars" style="margin-top:4px">${s}<span class="star-score">${rating.toFixed(1)}</span></div>`;}
  return`<div class="item-card" onclick="openItemDetail(${idx})" style="animation-delay:${(item._idx||0)%8*30}ms">
  ${img?`<div class="item-card-img-wrap"><img class="item-card-img" src="${esc(img)}" alt="${esc(item.name)}" loading="lazy"/></div>`:''}
  <div class="item-card-body" style="${img?'':'padding:16px 14px'}">
    <div class="item-card-name">${esc(item.name)}</div>
    ${desc?`<div class="item-card-desc">${esc(desc)}</div>`:''}
    ${tags.length?`<div class="item-tags">${tags.map(t=>`<span class="tag-chip">${esc(t)}</span>`).join('')}</div>`:''}
    ${stars}
    <div class="item-card-footer">
      <div class="card-qty-row" onclick="event.stopPropagation()">
        <button class="card-qty-btn-sm" onclick="cardDecrement(${idx},event)" aria-label="Remove">&#8722;</button>
        <span class="card-qty-num-sm${qty>0?' active':''}" id="card-qty-${idx}">${qty}</span>
        <button class="card-qty-btn-sm card-qty-plus" onclick="quickAdd(${idx},event)" aria-label="Add">+</button>
      </div>
      <span class="item-card-price${hasPx?' has-price':''}">${hasPx?esc(pxStr):''}</span>
    </div>
  </div>
</div>`;
}
function buildGridCard(item){
  const idx=item._idx??0;
  const px=parseFloat(item.price);const hasPx=!isNaN(px)&&px>0;
  const pxStr=hasPx?menuCurrency+px.toFixed(2).replace('.00',''):'';
  const img=(item.imageUrl||'').trim();
  const cartItem=cart.find(c=>c._idx===idx);
  const qty=cartItem?cartItem.qty:0;
  return`<div class="item-card" onclick="openItemDetail(${idx})">
  ${img?`<div class="item-card-img-wrap" style="width:100%;height:130px"><img class="item-card-img" src="${esc(img)}" alt="${esc(item.name)}" loading="lazy"/></div>`:`<div style="width:100%;height:0"></div>`}
  <div class="item-card-body" style="padding:10px 12px 12px">
    <div class="item-card-name" style="font-size:13px;-webkit-line-clamp:2;display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden">${esc(item.name)}</div>
    <div class="item-card-footer" style="margin-top:8px">
      <span class="item-card-price${hasPx?' has-price':''}" style="font-size:14px">${hasPx?esc(pxStr):''}</span>
      <div class="card-qty-row" onclick="event.stopPropagation()" style="gap:5px"><button class="card-qty-btn-sm" style="width:22px;height:22px;font-size:13px" onclick="cardDecrement(${idx},event)">&#8722;</button><span class="card-qty-num-sm${qty>0?' active':''}" id="card-qty-g${idx}" style="font-size:11px">${qty}</span><button class="card-qty-btn-sm card-qty-plus" style="width:22px;height:22px;font-size:13px" onclick="quickAdd(${idx},event)">+</button></div>
    </div>
  </div>
</div>`;
}

/* ── SKELETON ── */
function showSkeleton(){
  document.getElementById('items-container').innerHTML=[0,1,2,3].map(i=>`<div class="skel-card" style="animation-delay:${i*60}ms"><div class="sk skel-img"></div><div class="skel-body"><div class="sk" style="height:14px;width:65%;border-radius:6px"></div><div class="sk" style="height:12px;width:80%;border-radius:6px"></div><div class="sk" style="height:12px;width:45%;border-radius:6px"></div><div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px"><div class="sk" style="height:14px;width:50px;border-radius:6px"></div><div class="sk" style="width:34px;height:34px;border-radius:50%"></div></div></div></div>`).join('');
}

/* ── ERROR ── */
function showError(msg){
  document.getElementById('app').style.display='none';
  const bn=document.getElementById('bottom-nav');if(bn)bn.style.display='none';
  const fb=document.getElementById('cart-fab');if(fb)fb.style.display='none';
  document.getElementById('error-msg').textContent=msg;
  document.getElementById('error-state').style.display='flex';
}

/* ── VIEW ── */
function setView(mode){
  viewMode=mode;
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.toggle('active',b.dataset.view===mode));
  localStorage.setItem('menuViewMode',mode);
  renderItems();
}

/* ── BOTTOM NAV ── */
function moveNavBlob(activeBtn){
  const nav=document.getElementById('bottom-nav');
  const blob=document.getElementById('bnav-blob');
  if(!blob||!activeBtn||!nav)return;
  const nr=nav.getBoundingClientRect();
  const br=activeBtn.getBoundingClientRect();
  blob.style.left=(br.left-nr.left)+'px';
  blob.style.width=br.width+'px';
}
function navTo(tab){
  if(tab==='menu'){closeCatSheet();if(searchBarOpen)toggleSearchBar();window.scrollTo({top:0,behavior:'smooth'});}
  else if(tab==='categories'){if(searchBarOpen)toggleSearchBar();openCatSheet();}
  else if(tab==='search'){closeCatSheet();if(!searchBarOpen)toggleSearchBar();}
  else if(tab==='cart'){openCart();}
  else if(tab==='theme'){toggleTheme();return;}
  updateNavActive(tab);
}
function updateNavActive(tab){
  document.querySelectorAll('.bnav-item').forEach(b=>{
    const on=b.dataset.nav===tab;
    b.classList.toggle('bnav-active',on);
    if(on){
      // pop animation — re-trigger by removing + adding class
      b.classList.remove('bnav-pop');
      void b.offsetWidth; // reflow
      b.classList.add('bnav-pop');
      moveNavBlob(b);
    }
  });
}
// Init blob position on first render
requestAnimationFrame(()=>{
  const active=document.querySelector('.bnav-item.bnav-active');
  if(active)moveNavBlob(active);
});
window.addEventListener('resize',()=>{
  const active=document.querySelector('.bnav-item.bnav-active');
  if(active)moveNavBlob(active);
},{passive:true});

/* ── CAT SHEET ── */
function openCatSheet(){
  const cats=[...new Set(allItems.map(it=>it.category||'Other'))];
  document.getElementById('cat-sheet-list').innerHTML=cats.map(c=>{
    const cnt=allItems.filter(it=>(it.category||'Other')===c).length;
    const act=c===activeCategory;
    return`<button class="cat-sheet-item${act?' cs-active':''}" onclick="selectSheetCat('${esc(c)}')"><div class="cs-icon-wrap"><span class="material-symbols-outlined">${getCatIcon(c)}</span></div><span class="cs-name">${esc(c)}</span><span class="cs-count">${cnt}</span></button>`;
  }).join('');
  document.getElementById('cat-sheet-overlay').classList.add('open');
  document.getElementById('cat-sheet').classList.add('open');
  haptic(10);
}
function closeCatSheet(){document.getElementById('cat-sheet-overlay').classList.remove('open');document.getElementById('cat-sheet').classList.remove('open');}
function selectSheetCat(cat){setCategory(cat);closeCatSheet();updateNavActive('menu');}

/* ── ITEM DETAIL ── */
function openItemDetail(idx){
  const item=allItems[idx];if(!item)return;
  modalItem={...item,_idx:idx};modalQty=1;haptic(8);
  document.getElementById('item-modal-overlay').classList.add('open');
  document.getElementById('item-modal').classList.add('open');
  const img=document.getElementById('item-modal-img');
  if(item.imageUrl){img.src=item.imageUrl;img.alt=item.name;img.classList.add('has-img');}else img.classList.remove('has-img');
  const cb=document.getElementById('item-modal-cat');
  if(item.category){cb.innerHTML=`<span class="material-symbols-outlined" style="font-size:13px">${getCatIcon(item.category)}</span>${esc(item.category)}`;cb.style.display='inline-flex';}else cb.style.display='none';
  document.getElementById('item-modal-name').textContent=item.name||'';
  document.getElementById('item-modal-desc').textContent=item.description||'';
  const px=parseFloat(item.price);
  document.getElementById('item-modal-price').textContent=(!isNaN(px)&&px>0)?menuCurrency+px.toFixed(2).replace('.00',''):'';
  let meta='';
  if(item.size)meta+=`<span class="modal-tag">${esc(item.size)}</span>`;
  (Array.isArray(item.tags)?item.tags:[]).forEach(t=>{meta+=`<span class="modal-tag">${esc(t)}</span>`;});
  document.getElementById('item-modal-meta').innerHTML=meta;
  document.getElementById('qty-count').textContent='1';
  const se=document.getElementById('item-modal-stars');se.innerHTML='';
  const fe=document.getElementById('rate-feedback');
  const cr=parseFloat(item.rating)||0;
  for(let s=1;s<=5;s++){const btn=document.createElement('button');btn.className='modal-star-btn material-symbols-outlined'+(s<=Math.round(cr)?' selected':'');btn.dataset.star=s;btn.textContent='star';btn.addEventListener('click',(star=>e=>{e.stopPropagation();haptic(12);submitRating(star);})(s));se.appendChild(btn);}
  if(fe)fe.textContent=cr>0?`${cr.toFixed(1)} \u2605 avg`:'Tap stars to rate';
}
async function submitRating(stars){
  if(!modalItem)return;
  const fe=document.getElementById('rate-feedback');
  try{
    const r=await fetch('/api/items/'+encodeURIComponent(modalItem.id)+'/rate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({rating:stars})});
    const d=await r.json();if(!r.ok)throw new Error(d.error||'Failed');
    allItems[modalItem._idx].rating=d.avgRating;modalItem.rating=d.avgRating;
    document.querySelectorAll('#item-modal-stars .modal-star-btn').forEach(b=>b.classList.toggle('selected',parseInt(b.dataset.star)<=stars));
    if(fe)fe.textContent=`${d.avgRating.toFixed(1)} \u2605 (${d.ratingCount} votes)`;
  }catch(_){if(fe)fe.textContent='Could not submit rating.';}
}
function closeItemDetail(){document.getElementById('item-modal-overlay').classList.remove('open');document.getElementById('item-modal').classList.remove('open');modalItem=null;}
function adjustQty(d){modalQty=Math.max(1,modalQty+d);document.getElementById('qty-count').textContent=modalQty;haptic(6);}

/* ── CART ── */
function quickAdd(idx,e){
  e.stopPropagation();haptic(15);
  const item=allItems[idx];if(!item)return;
  const ex=cart.find(c=>c._idx===idx);
  if(ex){ex.qty++;showToast('Quantity updated');}
  else{cart.push({...item,_idx:idx,qty:1});showToast('Added to order \u2713');}
  updateCartUI();
  const el=document.getElementById('card-qty-'+idx);
  if(el){const ci=cart.find(c=>c._idx===idx);const q=ci?ci.qty:0;el.textContent=q;el.classList.toggle('active',q>0);}
}
function cardDecrement(idx,e){
  e.stopPropagation();haptic(10);
  const ex=cart.find(c=>c._idx===idx);if(!ex)return;
  ex.qty--;if(ex.qty<=0)cart=cart.filter(c=>c._idx!==idx);
  updateCartUI();
  const el=document.getElementById('card-qty-'+idx);
  if(el){const ci=cart.find(c=>c._idx===idx);const q=ci?ci.qty:0;el.textContent=q;el.classList.toggle('active',q>0);}
}
function addToCart(){
  if(!modalItem)return;haptic(20);
  const ex=cart.find(c=>c._idx===modalItem._idx);
  if(ex)ex.qty+=modalQty;else cart.push({...modalItem,qty:modalQty});
  updateCartUI();closeItemDetail();
  showToast(`${modalQty>1?modalQty+'\u00d7 ':''}${modalItem.name} added \u2713`);
}
function removeFromCart(idx){cart=cart.filter(c=>c._idx!==idx);updateCartUI();renderCartSheet();if(!cart.length)closeCart();}
function updateCartQty(idx,d){for(let i=0;i<cart.length;i++){if(cart[i]._idx===idx){cart[i].qty+=d;if(cart[i].qty<=0){removeFromCart(idx);return;}break;}}updateCartUI();renderCartSheet();}
function updateCartUI(){
  let ti=0,tp=0;cart.forEach(c=>{ti+=c.qty;tp+=(parseFloat(c.price)||0)*c.qty;});
  const fab=document.getElementById('cart-fab');
  const badge=document.getElementById('bnav-cart-badge');
  if(ti>0){fab.classList.add('visible');document.getElementById('cart-fab-count').textContent=ti;document.getElementById('cart-fab-total').textContent=menuCurrency+tp.toFixed(2).replace('.00','');badge.textContent=ti>9?'9+':ti;badge.classList.add('show');}
  else{fab.classList.remove('visible');badge.classList.remove('show');}
  document.querySelectorAll('[id^="card-qty-"]').forEach(el=>{
    const idx=parseInt(el.id.replace('card-qty-',''));
    const ci=cart.find(c=>c._idx===idx);const q=ci?ci.qty:0;
    el.textContent=q;el.classList.toggle('active',q>0);
  });
}
function renderCartSheet(){
  const list=document.getElementById('cart-items-list');
  const footer=document.getElementById('cart-footer');
  const empty=document.getElementById('cart-empty');
  if(!cart.length){list.innerHTML='';footer.style.display='none';empty.style.display='block';return;}
  empty.style.display='none';footer.style.display='block';
  list.innerHTML=cart.map(c=>{
    const p=(parseFloat(c.price)||0)*c.qty;
    return`<div class="cart-item">${c.imageUrl?`<img class="cart-item-img" src="${esc(c.imageUrl)}" alt=""/>`:`<div class="cart-item-img"></div>`}<div style="flex:1;min-width:0"><div class="cart-item-name">${esc(c.name)}</div><div class="cart-item-price">${menuCurrency}${p.toFixed(2).replace('.00','')}</div></div><div class="cart-item-qty"><button class="cart-qty-btn" onclick="updateCartQty(${c._idx},-1)">\u2212</button><span class="cart-qty-num">${c.qty}</span><button class="cart-qty-btn" onclick="updateCartQty(${c._idx},1)">+</button></div></div>`;
  }).join('');
  let total=0;cart.forEach(c=>{total+=(parseFloat(c.price)||0)*c.qty;});
  document.getElementById('cart-total-value').textContent=menuCurrency+total.toFixed(2).replace('.00','');
}
function openCart(){renderCartSheet();document.getElementById('cart-overlay').classList.add('open');document.getElementById('cart-sheet').classList.add('open');updateNavActive('cart');haptic(10);}
function closeCart(){document.getElementById('cart-overlay').classList.remove('open');document.getElementById('cart-sheet').classList.remove('open');updateNavActive('menu');}
function clearCart(){cart=[];updateCartUI();closeCart();haptic(15);}

function placeOrder(){
  if(!cart.length)return;
  const cn=(document.getElementById('cart-cust-name').value||'').trim();
  const cp=(document.getElementById('cart-cust-phone').value||'').trim();
  const pe=document.getElementById('cart-phone-error');
  const ps=document.getElementById('cart-phone-status');
  const nf=document.getElementById('cart-cust-name');
  if(!cn){nf.classList.add('err');nf.focus();return;}nf.classList.remove('err');
  const pd=cp.replace(/[\s\-().]/g,'');
  const ok=/^\+?\d{7,15}$/.test(pd);
  if(!cp||!ok){document.getElementById('cart-cust-phone').classList.add('err');pe.textContent=!cp?'Phone number is required':'Enter a valid phone number';pe.style.display='block';ps.textContent='\u2717';ps.style.color='#ef4444';ps.style.display='inline';document.getElementById('cart-cust-phone').focus();return;}
  document.getElementById('cart-cust-phone').classList.remove('err');pe.style.display='none';ps.textContent='\u2713';ps.style.color='#22c55e';ps.style.display='inline';
  const lines=cart.map(c=>`${c.name} \u00d7${c.qty} \u2014 ${menuCurrency}${((parseFloat(c.price)||0)*c.qty).toFixed(2)}`);
  let total=0;cart.forEach(c=>{total+=(parseFloat(c.price)||0)*c.qty;});
  const rn=menuData?.restaurantName||'';
  const tn=currentTableLabel?`\nTable: ${currentTableLabel}`:'';
  const msg=`${rn?'Order from '+rn+':\n':'Order:\n'}Customer: ${cn} (${pd})\n${lines.join('\n')}${tn}\n\nTotal: ${menuCurrency}${total.toFixed(2)}`;
  const items=cart.map(c=>({name:c.name,qty:c.qty,price:parseFloat(c.price)||0}));
  fetch('/api/menus/'+encodeURIComponent(menuData.id)+'/orders',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({items,table:currentTableLabel,currency:menuData.currency||'USD',customer_name:cn,customer_phone:pd})}).catch(()=>{});
  const ph=menuData?.phone?.replace(/[^\d+]/g,'');
  if(ph)window.open('https://wa.me/'+ph+'?text='+encodeURIComponent(msg),'_blank');
  else alert(msg);
}

/* ── SWIPE DISMISS ── */
function makeSwipeable(sheetId,closeFn){
  const sheet=document.getElementById(sheetId);if(!sheet)return;
  let sy=0,dr=false;
  sheet.addEventListener('touchstart',e=>{const sc=sheet.querySelector('[style*="overflow-y"]')||sheet;if(sc.scrollTop>0)return;sy=e.touches[0].clientY;dr=true;},{passive:true});
  sheet.addEventListener('touchmove',e=>{if(!dr)return;const dy=e.touches[0].clientY-sy;if(dy<0)return;sheet.style.transform=`translateY(${dy}px)`;sheet.style.transition='none';},{passive:true});
  sheet.addEventListener('touchend',e=>{if(!dr)return;dr=false;const dy=e.changedTouches[0].clientY-sy;sheet.style.transition='';if(dy>100){closeFn();sheet.style.transform='';}else sheet.style.transform='translateY(0)';},{passive:true});
}

/* ── CALL WAITER ── */
async function callWaiter(){
  if(!menuData||!currentTableLabel)return;
  const btn=document.getElementById('call-waiter-btn');
  const sm=document.getElementById('waiter-sent-msg');
  btn.disabled=true;haptic([40,30,40]);
  try{
    const r=await fetch('/api/menus/'+encodeURIComponent(menuData.id)+'/alerts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({table:currentTableLabel,message:'Service requested at '+currentTableLabel})});
    if(!r.ok)throw new Error();
    btn.style.display='none';sm.style.display='block';showToast('Waiter has been notified \u2713');
    setTimeout(()=>{btn.style.display='';sm.style.display='none';btn.disabled=false;},8000);
  }catch(_){btn.disabled=false;}
}

/* ── DOMContentLoaded ── */
document.addEventListener('DOMContentLoaded',()=>{
  makeSwipeable('item-modal',closeItemDetail);
  makeSwipeable('cat-sheet',()=>{closeCatSheet();updateNavActive('menu');});
  makeSwipeable('cart-sheet',closeCart);
  const pi=document.getElementById('cart-cust-phone');
  if(pi)pi.addEventListener('input',function(){
    const v=this.value.replace(/[\s\-().]/g,'');
    const ps=document.getElementById('cart-phone-status');
    const pe=document.getElementById('cart-phone-error');
    if(!v){ps.style.display='none';pe.style.display='none';this.classList.remove('err');return;}
    const ok=/^\+?\d{7,15}$/.test(v);
    ps.textContent=ok?'\u2713':'\u2717';ps.style.color=ok?'#22c55e':'#ef4444';ps.style.display='inline';
    this.classList.toggle('err',!ok);
    pe.style.display=ok?'none':'block';
    pe.textContent=ok?'':'Enter a valid phone number (7\u201315 digits)';
  });
});
</script>
</body>
</html>
