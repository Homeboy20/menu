<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#ffffff" id="meta-theme"/>
<title>Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;1,500&display=swap" rel="stylesheet"/>
<style>
/* ─── RESET ─── */
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}
/* ─── TOKENS ─── */
:root {
  /* Brand (primary CTAs, active pills, key icons only) */
  --brand:        #c2410c;
  --brand-rgb:    194,65,12;
  --brand-light:  #fff0e8;

  /* Price (warm amber — distinct from brand) */
  --price:        #92400e;

  /* Secondary accent (warm sage green) */
  --accent2:      #4d7c5f;
  --accent2-rgb:  77,124,95;
  --accent2-light:#eaf3ed;

  /* Semantic: Destructive */
  --danger:       #b91c1c;
  --danger-light: #fef2f2;

  /* Surfaces */
  --bg:           #f5f3ef;
  --surf:         #ffffff;
  --surf2:        #ede9e3;

  /* Text */
  --text:         #57534e;
  --head:         #1c1917;

  /* Borders */
  --border:       rgba(0,0,0,.09);
  --border2:      rgba(0,0,0,.05);

  /* Stars */
  --star-empty:   #d1b96a;
  --star-fill:    #b45309;

  --shadow-sm:    0 1px 4px rgba(0,0,0,.06);
  --shadow-md:    0 4px 20px rgba(0,0,0,.1);
  --shadow-lg:    0 12px 40px rgba(0,0,0,.14);
  --r-sm:         10px;
  --r-md:         14px;
  --r-lg:         20px;
  --r-xl:         28px;
  --safe-t:       env(safe-area-inset-top,    0px);
  --safe-b:       env(safe-area-inset-bottom, 0px);
  --safe-l:       env(safe-area-inset-left,   0px);
  --safe-r:       env(safe-area-inset-right,  0px);
  --nav-h:        64px;
  --topbar-h:     60px;
  --font:         'Sora', system-ui, sans-serif;
  --font-display: 'Playfair Display', Georgia, serif;
  --ease-spring:  cubic-bezier(.32,.72,0,1);
  --ease-out:     cubic-bezier(.16,1,.3,1);
}
html[data-theme="dark"] {
  --brand:       #ea8c52;
  --brand-rgb:   234,140,82;
  --brand-light: rgba(234,140,82,.12);
  --price:       #f59e0b;
  --accent2:     #6aaa82;
  --accent2-rgb: 106,170,130;
  --accent2-light:rgba(106,170,130,.12);
  --danger:      #f87171;
  --danger-light:rgba(248,113,113,.1);
  --bg:          #141210;
  --surf:        #1e1c1a;
  --surf2:       #28261f;
  --text:        #a09890;
  --head:        #f5f0e8;
  --border:      rgba(255,255,255,.07);
  --border2:     rgba(255,255,255,.04);
  --star-empty:  #7c6a2e;
  --star-fill:   #d97706;
  --shadow-sm:   0 1px 4px rgba(0,0,0,.35);
  --shadow-md:   0 4px 20px rgba(0,0,0,.45);
  --shadow-lg:   0 12px 40px rgba(0,0,0,.55);
}

/* ─── BASE ─── */
html { height: 100%; scroll-behavior: smooth; }
body {
  min-height: 100%;
  font-family: var(--font);
  font-size: 15px;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: none;
  transition: background .3s, color .2s;
}
#app {
  width: 100%;
  max-width: 520px;
  margin: 0 auto;
  min-height: 100dvh;
  position: relative;
  background: var(--bg);
}

/* ─── TOPBAR ─── */
#topbar {
  position: sticky; top: 0; z-index: 50;
  height: calc(var(--topbar-h) + var(--safe-t));
  padding: var(--safe-t) 20px 0;
  display: flex; align-items: center; gap: 16px;
  background: var(--surf);
  backdrop-filter: blur(24px) saturate(1.8);
  -webkit-backdrop-filter: blur(24px) saturate(1.8);
  border-bottom: 2px solid var(--border);
  box-shadow: 0 1px 12px rgba(0,0,0,.04);
}
html[data-theme="dark"] #topbar {
  background: rgba(17,17,16,.98);
  box-shadow: 0 1px 12px rgba(0,0,0,.2);
}

/* Animated logo */
#topbar-logo {
  width: 48px; height: 48px;
  border-radius: 12px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--brand) 0%, rgba(var(--brand-rgb),.8) 100%);
  overflow: hidden;
  animation: popIn .5s var(--ease-spring) both;
  box-shadow: 0 4px 16px rgba(var(--brand-rgb),.35), inset 0 1px 0 rgba(255,255,255,.15);
  border: 1.5px solid rgba(var(--brand-rgb),.2);
}
@keyframes popIn {
  from { opacity:0; transform: scale(.5) rotate(-10deg); }
  to   { opacity:1; transform: scale(1) rotate(0); }
}
#topbar-logo img { width:100%; height:100%; object-fit:cover; }
.topbar-initials { font-size:16px; font-weight:900; color:#fff; letter-spacing:-.6px; }

#topbar-info { flex:1; min-width:0; }
#topbar-name {
  font-size: 19px; font-weight: 900;
  color: var(--head); letter-spacing: -.6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.1;
}
#topbar-tagline {
  font-size: 12px; color: var(--text); opacity: .65;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.3; margin-top: 3px;
  font-weight: 500; letter-spacing: -.1px;
}

/* Icon buttons */
.icon-btn {
  flex-shrink: 0; width: 40px; height: 40px;
  border-radius: 12px; border: none;
  background: var(--surf2); color: var(--text);
  font-family: inherit; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .18s; position: relative;
  border: 1px solid var(--border);
}
.icon-btn:active { transform: scale(.88); background: rgba(var(--brand-rgb),.12); border-color: var(--brand); }
.icon-btn.lit { background: var(--brand); color: #fff; border-color: var(--brand); box-shadow: 0 2px 10px rgba(var(--brand-rgb),.3); }
.icon-btn .material-symbols-outlined { font-size: 21px; }

/* ─── CONTACT BAR ─── */
#contact-bar {
  display: none;
  align-items: center; justify-content: center;
  gap: 6px; flex-wrap: wrap;
  padding: 8px 16px;
  background: var(--surf);
  border-bottom: 1px solid var(--border);
}
#contact-bar.visible { display: flex; }
#contact-bar a {
  width: 32px; height: 32px; border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  background: rgba(var(--brand-rgb),.08); color: var(--brand);
  text-decoration: none; transition: all .15s;
}
#contact-bar a:active { transform: scale(.88); }
#contact-bar a svg { width: 16px; height: 16px; fill: currentColor; }
.cb-divider { width:1px; height:16px; background:var(--border); margin: 0 2px; }

/* ─── SEARCH DRAWER ─── */
#search-drawer {
  overflow: hidden; max-height: 0;
  background: var(--surf);
  border-bottom: 1px solid transparent;
  transition: max-height .28s var(--ease-spring), border-color .2s;
}
#search-drawer.open { max-height: 68px; border-bottom-color: var(--border); }
#search-inner { position: relative; padding: 9px 16px; }
#search-icon-el {
  position: absolute; left: 28px; top: 50%; transform: translateY(-50%);
  font-size: 18px; color: #aaa; pointer-events: none;
}
#search-input {
  width: 100%; padding: 10px 14px 10px 42px;
  border-radius: 50px; border: 1.5px solid var(--border);
  background: var(--surf2); color: var(--head);
  font-size: 14px; font-family: var(--font);
  outline: none; -webkit-appearance: none;
  transition: border-color .2s, box-shadow .2s;
}
#search-input:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(var(--brand-rgb),.18);
}
#search-input::placeholder { color: #bbb; }

/* ─── HERO BANNER (restaurant header) ─── */
#hero-banner {
  display: none;
  flex-direction: column; align-items: center;
  padding: 24px 16px 20px;
  background: var(--surf);
  border-bottom: 1px solid var(--border);
  text-align: center;
  animation: fadeUp .4s var(--ease-out) both;
}
#hero-banner.visible { display: flex; }
#hero-name {
  font-family: var(--font-display);
  font-size: 26px; font-style: italic;
  color: var(--head); line-height: 1.2;
  margin-bottom: 4px;
}
#hero-tagline { font-size: 13px; color: var(--text); opacity: .7; }
.hero-stats {
  display: flex; gap: 20px; margin-top: 14px;
  padding-top: 14px; border-top: 1px solid var(--border);
  width: 100%;  justify-content: center;
}
.hero-stat { text-align: center; }
.hero-stat-val { font-size: 15px; font-weight: 700; color: var(--head); }
.hero-stat-lbl { font-size: 11px; color: var(--text); opacity: .6; margin-top: 1px; }

/* ─── TABLE BANNER ─── */
#table-banner {
  display: none;
  align-items: center; gap: 8px;
  margin: 10px 12px 0;
  padding: 10px 14px;
  background: linear-gradient(135deg, var(--brand) 0%, #9a3412 100%); color: #fff;
  border-radius: var(--r-md);
  font-size: 13px; font-weight: 600;
  box-shadow: 0 2px 12px rgba(var(--brand-rgb),.35);
  animation: fadeUp .3s var(--ease-out) both;
}
#table-banner.visible { display: flex; }
#table-banner-label { flex: 1; }
#call-waiter-btn {
  background: rgba(255,255,255,.25); border: none;
  border-radius: var(--r-sm); padding: 6px 10px;
  font-size: 12px; font-weight: 700; color: #fff;
  cursor: pointer; font-family: var(--font);
  display: flex; align-items: center; gap: 4px;
  transition: background .15s; white-space: nowrap;
}
#call-waiter-btn:active { background: rgba(255,255,255,.4); }
#waiter-sent-msg { font-size: 11px; color: rgba(255,255,255,.8); display: none; }

/* ─── CATEGORY NAV ─── */
#cat-nav {
  position: sticky; top: calc(var(--topbar-h) + var(--safe-t));
  z-index: 40; background: var(--bg);
  border-bottom: 1px solid var(--border);
  transition: top .26s var(--ease-spring);
}
#cat-nav.s-open { top: calc(var(--topbar-h) + var(--safe-t) + 68px); }

/* Main tab strip — large card-style tabs */
#cat-tabs {
  display: flex; gap: 8px;
  justify-content: center;
  overflow-x: auto; padding: 12px 14px 6px;
  -ms-overflow-style: none; scrollbar-width: none;
  scroll-snap-type: x proximity;
}
#cat-tabs::-webkit-scrollbar { display: none; }

.tab-pill {
  flex-shrink: 0; scroll-snap-align: start;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px;
  min-width: 72px; padding: 10px 14px 8px;
  border-radius: var(--r-md); border: 1.5px solid transparent;
  font-size: 11px; font-weight: 700; letter-spacing: .02em;
  font-family: var(--font); cursor: pointer; white-space: nowrap;
  transition: all .2s var(--ease-out), transform .08s;
  position: relative; overflow: hidden;
  text-transform: uppercase;
}
.tab-pill::after {
  content: ''; position: absolute; inset: 0;
  background: currentColor; opacity: 0;
  transition: opacity .15s; border-radius: inherit;
}
.tab-pill:active::after { opacity: .08; }
.tab-pill:active { transform: scale(.94); }
.tab-active {
  background: var(--brand); color: #fff;
  border-color: var(--brand);
  box-shadow: 0 3px 12px rgba(var(--brand-rgb),.35);
}
.tab-inactive {
  background: var(--surf); color: var(--text);
  border-color: var(--border);
}
.tab-inactive:hover { border-color: rgba(var(--brand-rgb),.25); }
.tab-icon { font-size: 22px; line-height: 1; }
.tab-count {
  font-size: 9px; font-weight: 600; opacity: .6;
  letter-spacing: 0; text-transform: none;
}

/* Subcategory row — slides in below main tabs */
#subcat-tabs {
  display: flex; gap: 6px;
  overflow-x: auto; padding: 0 14px 10px;
  -ms-overflow-style: none; scrollbar-width: none;
  scroll-snap-type: x proximity;
  max-height: 0; opacity: 0;
  transition: max-height .28s var(--ease-spring), opacity .2s, padding .28s;
}
#subcat-tabs::-webkit-scrollbar { display: none; }
#subcat-tabs.visible {
  max-height: 50px; opacity: 1;
  padding: 6px 14px 10px;
}

.subcat-pill {
  flex-shrink: 0; scroll-snap-align: start;
  display: inline-flex; align-items: center;
  padding: 6px 14px; border-radius: 50px;
  font-size: 12px; font-weight: 600;
  border: 1.5px solid transparent; cursor: pointer;
  font-family: var(--font); white-space: nowrap;
  transition: all .15s, transform .08s;
}
.subcat-pill:active { transform: scale(.92); }
.subcat-active {
  background: rgba(var(--brand-rgb),.12); color: var(--brand);
  border-color: var(--brand);
}
.subcat-inactive {
  background: transparent; color: var(--text);
  border-color: var(--border);
}
.subcat-inactive:hover { border-color: rgba(var(--brand-rgb),.2); }

/* ─── COUNT BAR ─── */
#count-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px 4px;
  font-size: 11px; font-weight: 600;
  color: var(--text); letter-spacing: .06em; text-transform: uppercase;
  opacity: .6;
}
.view-toggle {
  display: flex; gap: 2px; background: var(--surf2);
  border-radius: var(--r-sm); padding: 2px; opacity: 1;
}
.view-btn {
  padding: 5px 7px; border: none; background: transparent;
  border-radius: 8px; color: var(--text); opacity: .5;
  cursor: pointer; display: flex; align-items: center;
  font-family: var(--font); transition: all .15s;
}
.view-btn.active { background: var(--surf); color: var(--head); opacity: 1; box-shadow: var(--shadow-sm); }
.view-btn:active { transform: scale(.9); }

/* ─── ITEMS ─── */
#items-container { padding-bottom: calc(110px + var(--safe-b)); }

/* Section */
.cat-section { animation: fadeUp .3s var(--ease-out) both; }

.cat-header {
  display: flex; align-items: center; gap: 10px;
  padding: 20px 16px 8px;
}
.cat-label {
  font-size: 11px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--brand);
}
.cat-line { flex: 1; height: 1px; background: var(--border); }

/* Card group */
.items-group {
  margin: 0 12px;
  border-radius: var(--r-lg); background: var(--surf);
  overflow: hidden; border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}

/* ─── LIST MODE ITEM ─── */
.item-row {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border2);
  cursor: pointer; position: relative;
  transition: background .15s, transform .08s;
  -webkit-user-select: none; user-select: none;
}
.item-row:last-child { border-bottom: none; }
.item-row:active { background: rgba(var(--brand-rgb),.04); transform: scale(.995); }

/* Ripple on tap */
.item-row::before {
  content: ''; position: absolute; inset: 0; border-radius: inherit;
  background: rgba(var(--brand-rgb),.06); opacity: 0;
  transform: scale(.96); transition: opacity .2s, transform .2s;
  pointer-events: none;
}
.item-row.tapped::before { opacity: 1; transform: scale(1); }

.item-image {
  width: 72px; height: 72px; border-radius: var(--r-md);
  object-fit: cover; flex-shrink: 0;
  background: var(--surf2); border: 1px solid var(--border);
}
.item-no-img {
  width: 72px; height: 72px; border-radius: var(--r-md);
  flex-shrink: 0; display: none;
  align-items: center; justify-content: center;
  background: rgba(var(--brand-rgb),.06); border: 1px solid var(--border);
}
.item-no-img .material-symbols-outlined { font-size: 28px; color: var(--brand); opacity: .35; }

.item-body { flex: 1; min-width: 0; }
.item-name {
  font-size: 15px; font-weight: 600;
  color: var(--head); line-height: 1.3;
}
.item-desc {
  font-size: 12.5px; line-height: 1.5; color: var(--text);
  margin-top: 2px; opacity: .85;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.item-price {
  font-size: 15px; font-weight: 700; color: var(--price);
  white-space: nowrap; flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}
.item-footer-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 6px; gap: 6px;
}
.item-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.tag-chip {
  font-size: 10px; font-weight: 500; padding: 2px 8px;
  border-radius: 4px; background: var(--accent2-light); color: var(--accent2);
}
.item-stars { display: flex; align-items: center; gap: 2px; margin-top: 4px; }
.star-icon { font-size: 13px; color: var(--star-empty); font-variation-settings:'FILL' 0; }
.star-icon.filled { color: var(--star-fill); font-variation-settings:'FILL' 1; }
.star-score { font-size: 10px; font-weight: 600; color: var(--text); margin-left: 2px; opacity:.7; }

/* Cart quick-add button on item row */
.row-add-btn {
  width: 32px; height: 32px; border-radius: 50%;
  border: 1.5px solid var(--border); background: transparent;
  color: var(--text); font-size: 20px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  transition: all .15s;
}
.row-add-btn:active { transform: scale(.82); }
.row-add-btn.in-cart { background: var(--brand); border-color: var(--brand); color: #fff; }

/* ─── GRID MODE ─── */
.grid-mode .items-group {
  display: grid; grid-template-columns: repeat(2, 1fr);
}
.grid-mode .item-row {
  flex-direction: column; align-items: stretch; gap: 0;
  padding: 0; border-bottom: 1px solid var(--border);
}
.grid-mode .item-row:nth-child(odd) { border-right: 1px solid var(--border2); }
.grid-mode .item-row:last-child,
.grid-mode .item-row:nth-last-child(2):nth-child(odd) { border-bottom: none; }
.grid-mode .item-image { width:100%; height:120px; border-radius:0; border:none; }
.grid-mode .item-no-img { display:flex; width:100%; height:120px; border-radius:0; border:none; }
.grid-mode .item-body { padding: 10px 12px 12px; }
.grid-mode .item-name { font-size: 13px; -webkit-line-clamp:2; }
.grid-mode .item-desc { display: none; }
.grid-mode .row-add-btn { display: none; }
.grid-mode .item-footer-row { justify-content: space-between; }

/* ─── SKELETON ─── */
@keyframes shimmer {
  from { background-position: -800px 0; }
  to   { background-position: 800px 0; }
}
.sk {
  border-radius: 6px;
  background: linear-gradient(90deg, var(--surf) 25%, var(--surf2) 50%, var(--surf) 75%);
  background-size: 1600px; animation: shimmer 1.5s infinite linear;
}

/* ─── EMPTY / NO RESULTS ─── */
.empty-state {
  padding: 60px 24px; text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
}
.empty-icon-wrap {
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--surf2); display: flex; align-items: center; justify-content: center;
}
.empty-title { font-size: 16px; font-weight: 700; color: var(--head); }
.empty-sub { font-size: 13px; color: var(--text); line-height: 1.5; max-width: 220px; }

/* ─── ANIMATIONS ─── */
@keyframes fadeUp {
  from { opacity:0; transform: translateY(10px); }
  to   { opacity:1; transform: none; }
}
@keyframes scaleIn {
  from { opacity:0; transform: scale(.9); }
  to   { opacity:1; transform: scale(1); }
}
@keyframes cartBounce {
  0%,100% { transform: scale(1); }
  40%     { transform: scale(1.45); }
  70%     { transform: scale(.9); }
}
@keyframes slideUpSheet {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}

/* ─── BOTTOM NAV BAR ─── */
#bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 60;
  display: flex;
  justify-content: space-around;
  max-width: 520px;
  margin: 0 auto;
  background: var(--surf);
  backdrop-filter: blur(24px) saturate(1.5);
  -webkit-backdrop-filter: blur(24px) saturate(1.5);
  border-radius: 0;
  border-top: 1px solid var(--border);
  padding: 4px 2px calc(4px + var(--safe-b));
  gap: 0;
  box-shadow: 0 -2px 16px rgba(0,0,0,.06);
  animation: fadeUp .35s var(--ease-spring) .3s both;
}
html[data-theme="dark"] #bottom-nav {
  background: rgba(20,19,17,.97);
  box-shadow: 0 -2px 16px rgba(0,0,0,.3);
}
.bnav-item {
  display: flex; flex-direction: column; align-items: center; gap: 1px;
  flex: 1;
  padding: 6px 0 3px;
  border: none; background: transparent;
  border-radius: 0;
  cursor: pointer; color: var(--text);
  font-family: var(--font); transition: color .18s var(--ease-out);
  -webkit-tap-highlight-color: transparent;
  position: relative;
}

const PALETTE_DARK = [
  {hex:'#C9A227'},{hex:'#D4B84A'},{hex:'#E0C97A'},{hex:'#D9B840'},
  {hex:'#C4A040'},{hex:'#DDBE5A'},{hex:'#B89830'},{hex:'#E8D080'},
];
const catMap = {}; let catIdx = 0;
function catColor(c) {
  if (!(c in catMap)) catMap[c] = catIdx++;
  const PAL = document.documentElement.dataset.theme === 'dark' ? PALETTE_DARK : PALETTE_LIGHT;
  return PAL[catMap[c] % PAL.length];
}

const CAT_ICONS = {
  food:'lunch_dining',drinks:'local_bar',beverages:'local_bar',
  dessert:'cake',desserts:'cake',appetizer:'tapas',appetizers:'tapas',
  snacks:'fastfood',pizza:'local_pizza',burgers:'lunch_dining',
  bakery:'bakery_dining',seafood:'set_meal',salads:'eco',
  soups:'soup_kitchen',breakfast:'egg_alt',coffee:'coffee',
  cocktails:'nightlife',wine:'wine_bar',beer:'sports_bar',
  starters:'tapas',mains:'restaurant',sides:'rice_bowl',
  pasta:'dinner_dining',sushi:'set_meal',grill:'outdoor_grill',
};
function getCatIcon(cat) { return CAT_ICONS[(cat||'').toLowerCase()] || 'restaurant_menu'; }

/* ─── UTILITIES ─── */
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function haptic(ms) { if (navigator.vibrate) navigator.vibrate(ms||10); }
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

/* ─── STATE ─── */
let allItems = [], activeCategory = '', activeSubcategory = 'All';
let menuCurrency = '$', searchOpen = false;
let menuData = null, userTheme = null, viewMode = localStorage.getItem('menuViewMode') || 'list';
let cart = [], modalItem = null, modalQty = 1;
let currentTableLabel = '';

/* ─── THEME ─── */
(function initTheme() {
  const saved = localStorage.getItem('menuTheme');
  userTheme = (saved === 'dark' || saved === 'light') ? saved : 'light';
  document.documentElement.dataset.theme = userTheme;
  syncThemeIcons();
})();

function syncThemeIcons() {
  const isDark = document.documentElement.dataset.theme === 'dark';
  const ico = isDark ? 'light_mode' : 'dark_mode';
  const ti = document.getElementById('theme-icon'); if (ti) ti.textContent = ico;
  const bi = document.getElementById('bnav-theme-icon'); if (bi) bi.textContent = ico;
}

function toggleTheme() {
  const isDark = document.documentElement.dataset.theme === 'dark';
  userTheme = isDark ? 'light' : 'dark';
  localStorage.setItem('menuTheme', userTheme);
  haptic(12);
  if (menuData) applyBranding(menuData);
  else { document.documentElement.dataset.theme = userTheme; syncThemeIcons(); }
}

/* ─── SEARCH ─── */
function toggleSearch() {
  searchOpen = !searchOpen;
  document.getElementById('search-drawer').classList.toggle('open', searchOpen);
  document.getElementById('cat-nav').classList.toggle('s-open', searchOpen);
  document.getElementById('search-btn').classList.toggle('lit', searchOpen);
  if (searchOpen) { setTimeout(() => document.getElementById('search-input').focus(), 280); }
  else { document.getElementById('search-input').value = ''; renderItems(); }
}

/* ─── BOOT ─── */
(async () => {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  currentTableLabel = params.get('table') || '';
  if (!id) { showError('No menu ID provided in the URL.'); return; }
  showSkeleton();
  try {
    const res = await fetch('/api/menus/' + encodeURIComponent(id));
    if (!res.ok) throw new Error('Menu not found (HTTP ' + res.status + ')');
    const data = await res.json();
    menuData = data;
    document.title = (data.restaurantName || 'Menu') + ' — Menu';
    applyBranding(data);
    allItems = data.items || [];
    buildTabs();
    renderItems();
    setView(viewMode);
    if (currentTableLabel && data.tablesEnabled) {
      document.getElementById('table-banner-label').textContent = '📍 ' + currentTableLabel;
      document.getElementById('table-banner').classList.add('visible');
    }
  } catch (err) { showError(err.message); }
})();

  modern: 'Sora:wght@400;500;600;700;800',
  elegant:'Playfair+Display:wght@400;600;700',
  casual: 'Poppins:wght@400;600;700;800',
  bold:   'Oswald:wght@400;500;600;700',
  minimal:'Inter:wght@400;500;600;700;800',

const FONT_FAMILY = {
  modern:'\'Sora\',system-ui,sans-serif',
  elegant:'\'Playfair Display\',serif',
  casual:'\'Poppins\',sans-serif',
  bold:'\'Oswald\',sans-serif',
  minimal:'\'Inter\',system-ui,sans-serif',
};
const BG_PAL = {
  light:  {bg:'#f7f6f4',surf:'#ffffff',dark:false},
  pale:   {bg:'#f2f2f2',surf:'#fafafa',dark:false},
  dark:   {bg:'#111110',surf:'#1c1b19',dark:true},
  ocean:  {bg:'#0d1b2a',surf:'#132639',dark:true},
  darker: {bg:'#0e0e0e',surf:'#161616',dark:true},
  cafe:   {bg:'#1c1108',surf:'#2a1a0e',dark:true},
  warm:   {bg:'#1a1008',surf:'#241808',dark:true},
};
function lighten(hex, amt) {
  if (!hex || hex.length < 7) return hex;
  const r=Math.min(255,parseInt(hex.slice(1,3),16)+Math.round(255*amt));
  const g=Math.min(255,parseInt(hex.slice(3,5),16)+Math.round(255*amt));
  const b=Math.min(255,parseInt(hex.slice(5,7),16)+Math.round(255*amt));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function applyBranding(data) {
  if (!data) return;
  let bgKey = data.bgStyle || 'light';
  const sp = BG_PAL[bgKey] || BG_PAL.light;
  if (userTheme === 'dark' && !sp.dark) bgKey = 'dark';
  else if (userTheme === 'light' && sp.dark) bgKey = 'light';
  const pal = BG_PAL[bgKey] || BG_PAL.light;
  const isDark = pal.dark;
  document.documentElement.dataset.theme = isDark ? 'dark' : 'light';
  syncThemeIcons();
  const color = data.brandColor || '#ea580c';
  const rgb   = hexToRgb(color);
  const bgCol = data.bgColor || pal.bg;
  const surfCol = data.cardBg || pal.surf;

    :root{--brand:${color};--brand-rgb:${rgb};--bg:${bgCol};--surf:${surfCol};--surf2:${surf2};
          --text:${textCol};--head:${headCol};--price:${priceCol};--border:${dv};--border2:${dv2};}
    body,#app{background:${bgCol}!important;}
    #topbar{background:${surfCol}!important;border-bottom-color:${dv}!important;}
    html[data-theme="dark"] #topbar{background:${isDark?'rgba(17,17,16,.98)':'rgba(255,255,255,.98)'}!important;}
    #search-drawer{background:${surfCol}!important;}
    #search-input{background:${surf2}!important;color:${headCol}!important;border-color:${dv}!important;}
    #cat-nav{background:${bgCol}!important;}
    .tab-active{background:${color}!important;color:#fff!important;border-color:${color}!important;box-shadow:0 3px 12px ${color}55!important;}
    .tab-inactive{background:${surfCol}!important;color:${textCol}!important;border-color:${dv}!important;}
    .subcat-active{background:${color}1a!important;color:${color}!important;border-color:${color}!important;}
    .subcat-inactive{background:transparent!important;color:${textCol}!important;border-color:${dv}!important;}
    .items-group{background:${surfCol}!important;}

    .sheet{background:${surfCol}!important;}

    .bnav-active{color:${color}!important;background:${color}18!important;}

    .icon-btn.lit{background:${color}!important;border-color:${color}!important;}

function hexToRgb(hex) {
  if (!hex || hex.length < 7) return '234,88,12';
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

/* ─── TABS ─── */
function buildTabs() {
  const cats = [...new Set(allItems.map(it => it.category || 'Other'))];
  if (!cats.length) return;
  // Set first category as default if not set or was 'All'
  if (!activeCategory || activeCategory === 'All' || !cats.includes(activeCategory)) {
    activeCategory = cats[0];
    activeSubcategory = 'All';
  }
  const html = cats.map(c => {
    const on = c === activeCategory;
    const cnt = allItems.filter(it => (it.category||'Other') === c).length;
    return `<button onclick="setCategory('${esc(c)}')" data-cat="${esc(c)}" class="tab-pill ${on?'tab-active':'tab-inactive'}">
      <span class="material-symbols-outlined tab-icon">${getCatIcon(c)}</span>${esc(c)}
      <span class="tab-count">${cnt}</span></button>`;
  }).join('');
  document.getElementById('cat-tabs').innerHTML = html;
  buildSubcatPills();
}

function setCategory(cat) {
  activeCategory = cat; activeSubcategory = 'All';
  haptic(8);
  document.querySelectorAll('.tab-pill').forEach(b => {
    const on = b.dataset.cat === cat;
    b.classList.toggle('tab-active', on);
    b.classList.toggle('tab-inactive', !on);
  });
  const btn = document.querySelector(`.tab-pill[data-cat="${CSS.escape(cat)}"]`);
  if (btn) btn.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  buildSubcatPills();
  renderItems();
}

function buildSubcatPills() {
  const sd = document.getElementById('subcat-tabs');
  const catItems = allItems.filter(it => (it.category||'Other') === activeCategory);
  const subs = [...new Set(catItems.map(it => it.subcategory||'').filter(Boolean))];
  if (!subs.length) { sd.classList.remove('visible'); return; }
  let html = `<button onclick="setSubcategory('All')" data-sub="All" class="subcat-pill ${activeSubcategory==='All'?'subcat-active':'subcat-inactive'}">All ${esc(activeCategory)}</button>`;
  html += subs.map(s => `<button onclick="setSubcategory('${esc(s)}')" data-sub="${esc(s)}" class="subcat-pill ${s===activeSubcategory?'subcat-active':'subcat-inactive'}">${esc(s)}</button>`).join('');
  sd.innerHTML = html; sd.classList.add('visible');
}

function setSubcategory(sub) {
  activeSubcategory = sub; haptic(6);
  document.querySelectorAll('.subcat-pill').forEach(b => {
    const on = b.dataset.sub === sub;
    b.classList.toggle('subcat-active', on); b.classList.toggle('subcat-inactive', !on);
  });
  renderItems();
}

/* ─── RENDER ─── */
function renderItems() {
  const q = (document.getElementById('search-input').value||'').toLowerCase().trim();
  const filtered = [];
  allItems.forEach((it, i) => {
    const cat = it.category||'Other', sub = it.subcategory||'';
    const inCat = cat===activeCategory;
    const inSub = activeSubcategory==='All' || sub===activeSubcategory;
    const inQ = !q || (it.name||'').toLowerCase().includes(q)
              || (it.description||'').toLowerCase().includes(q)
              || cat.toLowerCase().includes(q) || sub.toLowerCase().includes(q);
    if (inCat && inSub && inQ) filtered.push({...it, _idx:i});
  });
  const n = filtered.length;
  document.getElementById('count-label').textContent = n + (n===1?' item':' items');
  const container = document.getElementById('items-container');
  if (!n) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-icon-wrap"><span class="material-symbols-outlined" style="font-size:28px;color:var(--text);opacity:.4">search_off</span></div>
      <p class="empty-title">No items found</p>
      <p class="empty-sub">Try a different keyword or browse another category.</p>
    </div>`; return;
  }
  const subGroups = {};
  for (const it of filtered) { const s=it.subcategory||''; (subGroups[s]=subGroups[s]||[]).push(it); }
  container.innerHTML = Object.entries(subGroups).map(([sub,items],i) => buildSection(sub,items,i)).join('');
  // Attach tap ripple
  container.querySelectorAll('.item-row').forEach(row => {
    row.addEventListener('touchstart', () => { row.classList.add('tapped'); }, {passive:true});
    row.addEventListener('touchend', () => { setTimeout(() => row.classList.remove('tapped'), 300); }, {passive:true});
  });
}

function buildSection(sub, items, idx) {
  const header = sub
    ? `<div class="cat-header"><span class="cat-label">${esc(sub)}</span><span class="cat-line"></span></div>`
    : '';
  return `<div class="cat-section" style="animation-delay:${idx*40}ms">
    ${header}<div class="items-group">${items.map(it => buildItem(it)).join('')}</div></div>`;
}

function buildItem(item) {
  const idx = item._idx ?? 0;
  const price = parseFloat(item.price);
  const hasPx = !isNaN(price) && price > 0;
  const pxStr = hasPx ? menuCurrency + price.toFixed(2).replace('.00','') : '';
  const desc = (item.description||'').trim();
  const tags = Array.isArray(item.tags) ? item.tags : [];
  const img = (item.imageUrl||'').trim();
  const rating = parseFloat(item.rating)||0;
  const inCart = cart.some(c => c._idx === idx);
  let stars = '';
  if (rating > 0) {
    let s = '';
    for (let i=1;i<=5;i++) s += `<span class="material-symbols-outlined star-icon${i<=Math.round(rating)?' filled':''}">star</span>`;
    stars = `<div class="item-stars">${s}<span class="star-score">${rating.toFixed(1)}</span></div>`;
  }
  return `<div class="item-row" onclick="openItemDetail(${idx})">
    ${img ? `<img class="item-image" src="${esc(img)}" alt="${esc(item.name)}" loading="lazy"/>`
          : `<div class="item-no-img"><span class="material-symbols-outlined">restaurant</span></div>`}
    <div class="item-body">
      <div style="display:flex;align-items:baseline;justify-content:space-between;gap:8px">
        <div class="item-name">${esc(item.name)}</div>
        ${hasPx?`<div class="item-price">${esc(pxStr)}</div>`:''}
      </div>
      ${desc?`<div class="item-desc">${esc(desc)}</div>`:''}
      ${tags.length?`<div class="item-tags">${tags.map(t=>`<span class="tag-chip">${esc(t)}</span>`).join('')}</div>`:''}
      ${stars}
    </div>
    <button class="row-add-btn${inCart?' in-cart':''}" onclick="quickAddToCart(${idx},event)" aria-label="Add to cart">
      ${inCart?'<span class="material-symbols-outlined" style="font-size:16px">check</span>':'<span style="font-size:20px;line-height:1">+</span>'}
    </button>
  </div>`;
}

/* ─── SKELETON ─── */
function showSkeleton() {
  document.getElementById('items-container').innerHTML = [0,1,2].map(i => `
    <div class="cat-section" style="animation-delay:${i*80}ms">
      <div class="cat-header"><div class="sk" style="height:11px;width:80px"></div><span class="cat-line"></span></div>
      <div class="items-group">
        ${[0,1,2].map(()=>`<div class="item-row">
          <div class="sk" style="width:72px;height:72px;border-radius:14px;flex-shrink:0"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:7px">
            <div style="display:flex;justify-content:space-between;gap:16px">
              <div class="sk" style="height:14px;width:55%;border-radius:4px"></div>
              <div class="sk" style="height:14px;width:50px;border-radius:4px"></div>
            </div>
            <div class="sk" style="height:12px;width:75%;border-radius:4px"></div>
            <div class="sk" style="height:12px;width:50%;border-radius:4px"></div>
          </div></div>`).join('')}
      </div>
    </div>`).join('');
}

/* ─── ERROR ─── */
function showError(msg) {
  document.getElementById('app').style.display = 'none';
  const bn = document.getElementById('bottom-nav'); if (bn) bn.style.display='none';
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error-state').style.display = 'flex';
}

/* ─── VIEW MODE ─── */
function setView(mode) {
  viewMode = mode;
  document.getElementById('items-container').classList.toggle('grid-mode', mode==='grid');
  document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view===mode));
  localStorage.setItem('menuViewMode', mode);
}

/* ─── BOTTOM NAV ─── */
function navTo(tab) {
  if (tab==='menu') { closeCatSheet(); if(searchOpen)toggleSearch(); window.scrollTo({top:0,behavior:'smooth'}); }
  else if (tab==='categories') { if(searchOpen)toggleSearch(); openCatSheet(); }
  else if (tab==='search') { closeCatSheet(); toggleSearch(); }
  else if (tab==='cart') { openCart(); }
  else if (tab==='theme') { toggleTheme(); return; }
  updateNavActive(tab);
}
function updateNavActive(tab) {
  document.querySelectorAll('.bnav-item').forEach(b => b.classList.toggle('bnav-active', b.dataset.nav===tab));
}

/* ─── CAT SHEET ─── */
function openCatSheet() {
  const cats = [...new Set(allItems.map(it => it.category||'Other'))];
  const list = document.getElementById('cat-sheet-list');
  const html = cats.map(c => {
    const col = catColor(c); const cnt = allItems.filter(it=>(it.category||'Other')===c).length;
    return `<button class="cat-sheet-item${c===activeCategory?' cs-active':''}" onclick="selectSheetCat('${esc(c)}')">
      <span class="cs-dot" style="background:${col?col.hex:'var(--brand)'}"></span>
      <span class="cs-name">${esc(c)}</span><span class="cs-count">${cnt}</span></button>`;
  }).join('');
  list.innerHTML = html;
  document.getElementById('cat-sheet-overlay').classList.add('open');
  document.getElementById('cat-sheet').classList.add('open');
  haptic(10);
}
function closeCatSheet() {
  document.getElementById('cat-sheet-overlay').classList.remove('open');
  document.getElementById('cat-sheet').classList.remove('open');
}
function selectSheetCat(cat) { setCategory(cat); closeCatSheet(); updateNavActive('menu'); }

/* ─── ITEM DETAIL MODAL ─── */
function openItemDetail(idx) {
  const item = allItems[idx]; if (!item) return;
  modalItem = {...item, _idx:idx}; modalQty = 1; haptic(8);
  const img = document.getElementById('item-modal-img');
  if (item.imageUrl) { img.src=item.imageUrl; img.alt=item.name; img.classList.add('has-img'); }
  else img.classList.remove('has-img');
  document.getElementById('item-modal-name').textContent = item.name || '';
  document.getElementById('item-modal-desc').textContent = item.description || '';
  const price = parseFloat(item.price);
  document.getElementById('item-modal-price').textContent = (!isNaN(price)&&price>0) ? menuCurrency+price.toFixed(2).replace('.00','') : '';
  let metaHtml = '';
  if (item.size) metaHtml += `<span class="modal-tag">${esc(item.size)}</span>`;
  (Array.isArray(item.tags)?item.tags:[]).forEach(t => { metaHtml += `<span class="modal-tag">${esc(t)}</span>`; });
  document.getElementById('item-modal-meta').innerHTML = metaHtml;
  document.getElementById('qty-count').textContent = '1';

  // Stars
  const existing = document.getElementById('item-modal-stars');
  if (existing) existing.remove();
  const rf = document.getElementById('rate-feedback'); if (rf) rf.remove();
  const starsEl = document.createElement('div'); starsEl.id='item-modal-stars';
  const cr = parseFloat(item.rating)||0;
  for (let s=1;s<=5;s++) {
    const btn = document.createElement('button');
    btn.className = 'modal-star-btn material-symbols-outlined' + (s<=Math.round(cr)?' selected':'');
    btn.dataset.star = s; btn.textContent = 'star';
    btn.addEventListener('click', (star => e => { e.stopPropagation(); haptic(12); submitRating(star); })(s));
    starsEl.appendChild(btn);
  }
  const feedEl = document.createElement('div'); feedEl.id='rate-feedback';
  feedEl.textContent = cr > 0 ? `Avg: ${cr.toFixed(1)} ★` : 'Tap to rate';
  const body = document.getElementById('item-modal-body');
  const priceEl = document.getElementById('item-modal-price');
  body.insertBefore(feedEl, priceEl); body.insertBefore(starsEl, feedEl);
  document.getElementById('item-modal-overlay').classList.add('open');
  document.getElementById('item-modal').classList.add('open');
}

async function submitRating(stars) {
  if (!modalItem) return;
  const feedEl = document.getElementById('rate-feedback');
  try {
    const res = await fetch('/api/items/'+encodeURIComponent(modalItem.id)+'/rate',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({rating:stars})
    });
    const d = await res.json(); if (!res.ok) throw new Error(d.error||'Failed');
    allItems[modalItem._idx].rating = d.avgRating; modalItem.rating = d.avgRating;
    document.querySelectorAll('#item-modal-stars .modal-star-btn').forEach(b => {
      b.classList.toggle('selected', parseInt(b.dataset.star) <= stars);
    });
    if (feedEl) feedEl.textContent = `Avg: ${d.avgRating.toFixed(1)} ★ (${d.ratingCount} votes)`;
  } catch(_) { if (feedEl) feedEl.textContent = 'Could not submit rating.'; }
}

function closeItemDetail() {
  document.getElementById('item-modal-overlay').classList.remove('open');
  document.getElementById('item-modal').classList.remove('open');
  modalItem = null;
}
function adjustQty(d) { modalQty = Math.max(1, modalQty+d); document.getElementById('qty-count').textContent = modalQty; haptic(6); }

/* ─── CART ─── */
function quickAddToCart(idx, e) {
  e.stopPropagation(); haptic(15);
  const item = allItems[idx]; if (!item) return;
  const existing = cart.find(c => c._idx === idx);
  if (existing) { existing.qty++; showToast('Updated quantity'); }
  else { cart.push({...item, _idx:idx, qty:1}); showToast('Added to order ✓'); }
  updateCartUI();
  // Animate the add button
  const btn = e.currentTarget; btn.classList.add('in-cart');
  btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px">check</span>';
}

function addToCart() {
  if (!modalItem) return; haptic(20);
  const existing = cart.find(c => c._idx === modalItem._idx);
  if (existing) existing.qty += modalQty;
  else cart.push({...modalItem, qty:modalQty});
  updateCartUI(); closeItemDetail();
  showToast(`Added ${modalQty > 1 ? modalQty+'×' : ''} ${modalItem.name} ✓`);
}

function removeFromCart(idx) { cart = cart.filter(c => c._idx !== idx); updateCartUI(); renderCartSheet(); if (!cart.length) closeCart(); }

function updateCartQty(idx, delta) {
  for (let i=0;i<cart.length;i++) {
    if (cart[i]._idx === idx) { cart[i].qty += delta; if (cart[i].qty<=0) { removeFromCart(idx); return; } break; }
  }
  updateCartUI(); renderCartSheet();
}

function updateCartUI() {
  let totalItems=0, totalPrice=0;
  cart.forEach(c => { totalItems+=c.qty; totalPrice+=(parseFloat(c.price)||0)*c.qty; });
  const fab = document.getElementById('cart-fab');
  // Bottom nav badge
  const badge = document.getElementById('bnav-cart-badge');
  if (totalItems > 0) {
    fab.classList.add('visible');
    document.getElementById('cart-fab-count').textContent = totalItems;
    document.getElementById('cart-fab-total').textContent = menuCurrency + totalPrice.toFixed(2).replace('.00','');
    badge.textContent = totalItems > 9 ? '9+' : totalItems;
    badge.classList.add('show');
  } else {
    fab.classList.remove('visible');
    badge.classList.remove('show');
  }
}

function renderCartSheet() {
  const list = document.getElementById('cart-items-list');
  const footer = document.getElementById('cart-footer');
  const empty = document.getElementById('cart-empty');
  if (!cart.length) { list.innerHTML=''; footer.style.display='none'; empty.style.display='block'; return; }
  empty.style.display='none'; footer.style.display='block';
  list.innerHTML = cart.map(c => {
    const p = (parseFloat(c.price)||0) * c.qty;
    const imgHtml = c.imageUrl ? `<img class="cart-item-img" src="${esc(c.imageUrl)}" alt=""/>` : `<div class="cart-item-img"></div>`;
    return `<div class="cart-item">${imgHtml}
      <div class="cart-item-info" style="flex:1;min-width:0">
        <div class="cart-item-name">${esc(c.name)}</div>
        <div class="cart-item-price">${menuCurrency}${p.toFixed(2).replace('.00','')}</div>
      </div>
      <div class="cart-item-qty">
        <button class="cart-qty-btn" onclick="updateCartQty(${c._idx},-1)">−</button>
        <span class="cart-qty-num">${c.qty}</span>
        <button class="cart-qty-btn" onclick="updateCartQty(${c._idx},1)">+</button>
      </div></div>`;
  }).join('');
  let total = 0; cart.forEach(c => { total += (parseFloat(c.price)||0)*c.qty; });
  document.getElementById('cart-total-value').textContent = menuCurrency + total.toFixed(2).replace('.00','');
}

function openCart() { renderCartSheet(); document.getElementById('cart-overlay').classList.add('open'); document.getElementById('cart-sheet').classList.add('open'); updateNavActive('cart'); haptic(10); }
function closeCart() { document.getElementById('cart-overlay').classList.remove('open'); document.getElementById('cart-sheet').classList.remove('open'); updateNavActive('menu'); }
function clearCart() { cart=[]; updateCartUI(); closeCart(); haptic(15); }

function placeOrder() {
  if (!cart.length) return;
  const custName = (document.getElementById('cart-cust-name').value||'').trim();
  const custPhone = (document.getElementById('cart-cust-phone').value||'').trim();
  const phoneErr = document.getElementById('cart-phone-error');
  const phoneStat = document.getElementById('cart-phone-status');
  const nameField = document.getElementById('cart-cust-name');
  if (!custName) { nameField.classList.add('err'); nameField.focus(); return; }
  nameField.classList.remove('err');
  const phoneDigits = custPhone.replace(/[\s\-().]/g,'');
  const valid = /^\+?\d{7,15}$/.test(phoneDigits);
  if (!custPhone || !valid) {
    document.getElementById('cart-cust-phone').classList.add('err');
    phoneErr.textContent = !custPhone ? 'Phone number is required' : 'Enter a valid phone number';
    phoneErr.style.display='block'; phoneStat.textContent='✗'; phoneStat.style.color=getComputedStyle(document.documentElement).getPropertyValue('--danger').trim(); phoneStat.style.display='inline';
    document.getElementById('cart-cust-phone').focus(); return;
  }
  document.getElementById('cart-cust-phone').classList.remove('err');
  phoneErr.style.display='none'; phoneStat.textContent='✓'; phoneStat.style.color='#22c55e'; phoneStat.style.display='inline';
  const lines = cart.map(c => `${c.name} ×${c.qty} — ${menuCurrency}${((parseFloat(c.price)||0)*c.qty).toFixed(2)}`);
  let total=0; cart.forEach(c=>{total+=(parseFloat(c.price)||0)*c.qty;});
  const rname = menuData?.restaurantName || '';
  const tableNote = currentTableLabel ? `\nTable: ${currentTableLabel}` : '';
  const msg = `${rname?'Order from '+rname+':\n':'Order:\n'}Customer: ${custName} (${phoneDigits})\n${lines.join('\n')}${tableNote}\n\nTotal: ${menuCurrency}${total.toFixed(2)}`;
  const items = cart.map(c => ({name:c.name,qty:c.qty,price:parseFloat(c.price)||0}));
  fetch('/api/menus/'+encodeURIComponent(menuData.id)+'/orders',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({items,table:currentTableLabel,currency:menuData.currency||'USD',customer_name:custName,customer_phone:phoneDigits})
  }).catch(()=>{});
  const phone = menuData?.phone?.replace(/[^\d+]/g,'');
  if (phone) window.open('https://wa.me/'+phone+'?text='+encodeURIComponent(msg),'_blank');
  else alert(msg);
}

/* ─── SWIPE-TO-DISMISS (sheets) ─── */
function makeSwipeable(sheetId, closeFn) {
  const sheet = document.getElementById(sheetId);
  if (!sheet) return;
  let startY=0, startTrans=0, dragging=false;
  sheet.addEventListener('touchstart', e => {
    const t = e.touches[0];
    const scrollable = sheet.querySelector('[style*="overflow-y"]') || sheet;
    if (scrollable.scrollTop > 0) return;
    startY = t.clientY; dragging = true; startTrans = 0;
  }, {passive:true});
  sheet.addEventListener('touchmove', e => {
    if (!dragging) return;
    const dy = e.touches[0].clientY - startY;
    if (dy < 0) return;
    sheet.style.transform = `translateY(${dy}px)`;
    sheet.style.transition = 'none';
  }, {passive:true});
  sheet.addEventListener('touchend', e => {
    if (!dragging) return; dragging = false;
    const dy = e.changedTouches[0].clientY - startY;
    sheet.style.transition = '';
    if (dy > 100) { closeFn(); sheet.style.transform = ''; }
    else { sheet.style.transform = 'translateY(0)'; }
  }, {passive:true});
}
document.addEventListener('DOMContentLoaded', () => {
  makeSwipeable('item-modal', closeItemDetail);
  makeSwipeable('cat-sheet', () => { closeCatSheet(); updateNavActive('menu'); });
  makeSwipeable('cart-sheet', closeCart);

  // Phone validation
  const phoneInput = document.getElementById('cart-cust-phone');
  if (phoneInput) {
    phoneInput.addEventListener('input', function() {
      const val = this.value.replace(/[\s\-().]/g,'');
      const phoneStat = document.getElementById('cart-phone-status');
      const phoneErr = document.getElementById('cart-phone-error');
      if (!val) { phoneStat.style.display='none'; phoneErr.style.display='none'; this.classList.remove('err'); return; }
      const ok = /^\+?\d{7,15}$/.test(val);
      phoneStat.textContent = ok ? '✓' : '✗'; phoneStat.style.color = ok ? '#22c55e' : getComputedStyle(document.documentElement).getPropertyValue('--danger').trim(); phoneStat.style.display='inline';
      this.classList.toggle('err', !ok);
      phoneErr.style.display = ok ? 'none' : 'block';
      phoneErr.textContent = ok ? '' : 'Enter a valid phone number (7–15 digits)';
    });
  }
});

/* ─── CALL WAITER ─── */
async function callWaiter() {
  if (!menuData || !currentTableLabel) return;
  const btn = document.getElementById('call-waiter-btn');
  const sentMsg = document.getElementById('waiter-sent-msg');
  btn.disabled = true; haptic([40,30,40]);
  try {
    const res = await fetch('/api/menus/'+encodeURIComponent(menuData.id)+'/alerts',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({table:currentTableLabel,message:'Service requested at '+currentTableLabel})
    });
    if (!res.ok) throw new Error();
    btn.style.display='none'; sentMsg.style.display='block';
    showToast('Waiter has been notified ✓');
    setTimeout(() => { btn.style.display=''; sentMsg.style.display='none'; btn.disabled=false; }, 8000);
  } catch(_) { btn.disabled=false; }
}
