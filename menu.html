<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#fdf9f4"/>
<title>Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}

/*  Design tokens — light (pale white + dark charcoal)  */
:root {
  --brand:  #222222;
  --bg:     #fafafa;
  --surf:   #eeeeee;
  --text:   #595959;
  --head:   #1a1a1a;
  --price:  #222222;
  --border: rgba(0,0,0,.1);
  --shadow: rgba(0,0,0,.07);
  --safe-t: env(safe-area-inset-top,    0px);
  --safe-b: env(safe-area-inset-bottom, 0px);
  --topbar-bg: rgba(250,250,250,.97);
  --hero-grad: #e4e4e4;
  --sk-mid: #d8d8d8;
  --outside-bg: #dcdcdc;
}

/* Base dark-mode vars — dark (dark grey + pale white)  */
html[data-theme="dark"] {
  --brand:  #d8d8d8;
  --bg:     #1e1e1e;
  --surf:   #272727;
  --text:   #909090;
  --head:   #e8e8e8;
  --price:  #d8d8d8;
  --border: rgba(255,255,255,.1);
  --shadow: rgba(0,0,0,.4);
  --topbar-bg: rgba(30,30,30,.97);
  --hero-grad: #232323;
  --sk-mid: #303030;
  --outside-bg: #141414;
}

/* Smooth theme transitions */
body, #app, #topbar, #search-drawer, #hero, #cat-nav,
.items-group, .item-row, .tab-pill, .icon-btn, #footer {
  transition: background-color .25s, border-color .2s, color .18s, box-shadow .2s;
}

html   { height: 100%; }
body   {
  min-height: 100%;
  font-family: 'Work Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: none;
}

/*  App shell  */
#app {
  width: 100%;
  max-width: 1120px;
  margin: 0 auto;
  min-height: 100dvh;
  background: var(--bg);
}

/*  Topbar  */
#topbar {
  position: sticky;
  top: 0;
  z-index: 50;
  height: calc(58px + var(--safe-t));
  padding: calc(var(--safe-t) + 10px) 16px 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(253,249,244,.97);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  background: var(--topbar-bg);
}
#topbar-name {
  flex: 1;
  font-size: 15px;
  font-weight: 700;
  color: var(--head);
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding: 0 4px;
  letter-spacing: -.2px;
}
.icon-btn {
  flex-shrink: 0;
  width: 38px; height: 38px;
  border-radius: 50%;
  border: none;
  background: rgba(0,0,0,.06);
  color: var(--text);
  font-family: inherit;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, color .15s, transform .08s;
}
.icon-btn:active { transform: scale(.9); }
.icon-btn.lit    { background: var(--brand); color: #fff; }

/*  Search slide-in  */
#search-drawer {
  overflow: hidden;
  max-height: 0;
  background: var(--topbar-bg);
  border-bottom: 1px solid transparent;
  transition: max-height .26s cubic-bezier(.4,0,.2,1), border-color .26s;
}
#search-drawer.open {
  max-height: 68px;
  border-bottom-color: var(--border);
}
#search-inner { position: relative; padding: 9px 16px; }
#search-input {
  width: 100%;
  padding: 9px 14px 9px 40px;
  border-radius: 50px;
  border: 1.5px solid rgba(0,0,0,.1);
  background: var(--surf);
  color: var(--head);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  -webkit-appearance: none;
  transition: border-color .2s, box-shadow .2s;
}
#search-input:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(0,0,0,.1);
}
#search-input::placeholder { color: #aaaaaa; }
.s-icon {
  position: absolute; left: 28px; top: 50%;
  transform: translateY(-50%);
  font-size: 18px; color: #aaaaaa;
  pointer-events: none;
}

/*  Hero  */
#hero {
  padding: 28px 16px 24px;
  background: linear-gradient(160deg, var(--hero-grad) 0%, var(--bg) 75%);
  border-bottom: 1px solid var(--border);
}

/*  Category nav  */
#cat-nav {
  position: sticky;
  top: calc(58px + var(--safe-t));
  z-index: 40;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  transition: top .26s cubic-bezier(.4,0,.2,1);
}
#cat-nav.s-open { top: calc(58px + var(--safe-t) + 68px); }
#cat-tabs {
  display: flex; gap: 7px;
  overflow-x: auto;
  padding: 10px 16px;
  -ms-overflow-style: none; scrollbar-width: none;
}
#cat-tabs::-webkit-scrollbar { display: none; }

.tab-pill {
  flex-shrink: 0;
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 14px 6px 10px;
  border-radius: 50px;
  font-size: 13px; font-weight: 600; letter-spacing: -.1px;
  border: none; cursor: pointer; white-space: nowrap;
  font-family: inherit;
  transition: background .14s, color .14s, box-shadow .14s, transform .07s;
}
.tab-pill:active { transform: scale(.94); }
.tab-active   { background: var(--brand); color: var(--bg); box-shadow: 0 2px 8px rgba(0,0,0,.18); }
.tab-inactive { background: rgba(0,0,0,.07); color: #555555; }
.tab-inactive:hover { background: rgba(0,0,0,.11); }
.t-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/*  Count bar  */
#count-bar {
  padding: 10px 16px 0;
  font-size: 11px; font-weight: 600;
  color: #aaaaaa; letter-spacing: .05em;
  text-transform: uppercase;
}

/*  Items container  */
#items-container {
  padding-bottom: calc(48px + var(--safe-b));
}

/*  Category section  */
.cat-section { animation: fadeUp .28s ease both; }

.cat-header {
  display: flex; align-items: center; gap: 10px;
  padding: 22px 16px 10px;
}
.cat-icon {
  width: 34px; height: 34px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.cat-label {
  flex: 1; font-size: 11px; font-weight: 800;
  letter-spacing: .16em; text-transform: uppercase;
  color: var(--head);
}
.cat-count {
  font-size: 10px; font-weight: 700;
  padding: 3px 10px; border-radius: 50px;
}

/*  Items group card  */
.items-group {
  margin: 0 12px 4px;
  border-radius: 16px; overflow: hidden;
  border: 1px solid rgba(0,0,0,.07);
  background: var(--surf);
  box-shadow: 0 1px 4px rgba(0,0,0,.05), 0 4px 20px rgba(0,0,0,.05);
}

/*  Item row  */
.item-row {
  display: flex; align-items: flex-start;
  padding: 14px 16px 14px 20px;
  border-bottom: 1px solid rgba(0,0,0,.06);
  position: relative; min-height: 60px;
  transition: background .1s;
}
.item-row:last-child { border-bottom: none; }
.item-row:hover   { background: rgba(0,0,0,.018); }
.item-row:active  { background: rgba(0,0,0,.032); }

/* Colored left bar */
.item-accent {
  position: absolute; left: 0; top: 11px; bottom: 11px;
  width: 3px; border-radius: 0 3px 3px 0;
}
.item-body { flex: 1; min-width: 0; }
.item-top  {
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 10px;
}
.item-name {
  flex: 1; min-width: 0;
  font-size: 15px; font-weight: 700;
  color: var(--head); line-height: 1.3; word-break: break-word;
}
.item-price {
  flex-shrink: 0; font-size: 13px; font-weight: 800;
  padding: 3px 10px; border-radius: 8px;
  white-space: nowrap; letter-spacing: -.2px;
  font-variant-numeric: tabular-nums; align-self: flex-start;
}
.item-size {
  display: inline-block; font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 5px; margin-top: 5px;
}
.item-desc {
  font-size: 12.5px; line-height: 1.55; color: var(--text); margin-top: 5px;
  display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.item-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px; }
.tag-chip  {
  font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 50px;
}

/*  Skeleton  */
@keyframes shimmer {
  0%   { background-position: -800px 0; }
  100% { background-position:  800px 0; }
}
.sk {
  border-radius: 6px;
  background: linear-gradient(90deg, var(--surf) 25%, var(--sk-mid) 50%, var(--surf) 75%);
  background-size: 1600px 100%;
  animation: shimmer 1.5s infinite linear;
}

/*  Animations  */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: none; }
}
@keyframes ringPop {
  0%   { box-shadow: 0 0 0 0    rgba(0,0,0,.3); }
  70%  { box-shadow: 0 0 0 12px rgba(0,0,0,0); }
  100% { box-shadow: 0 0 0 0    rgba(0,0,0,0); }
}

/*  Footer  */
#footer {
  display: flex; align-items: center; justify-content: center; gap: 5px;
  padding: 22px 16px calc(20px + var(--safe-b));
  font-size: 11px; color: #aaaaaa;
  border-top: 1px solid var(--border);
}

/*  Error overlay  */
#error-state {
  display: none; position: fixed; inset: 0;
  background: var(--bg); z-index: 100;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; padding: 32px; text-align: center;
}

/* 
   RESPONSIVE LAYOUT
 */

/* Tablet: 640px+  */
@media (min-width: 640px) {
  #hero      { padding: 32px 32px 28px; }
  #cat-tabs  { padding: 12px 32px; gap: 8px; }
  #count-bar { padding: 12px 32px 0; }
  .cat-header  { padding: 24px 32px 12px; }
  .items-group { margin: 0 32px 8px; border-radius: 18px; }
  .item-row    { padding: 16px 20px 16px 22px; }
  .item-name   { font-size: 15.5px; }
}

/* Desktop: 1024px+  */
@media (min-width: 1024px) {
  #topbar    { padding: calc(var(--safe-t) + 10px) 60px 10px; }
  #hero      { padding: 40px 60px 32px; }
  #cat-tabs  { padding: 12px 60px; }
  #count-bar { padding: 14px 60px 0; }

  /* 2-column grid of category sections */
  #items-container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0;
    align-items: start;
    padding: 0 48px;
  }
  .cat-section:nth-child(odd)  { padding-right: 12px; }
  .cat-section:nth-child(even) { padding-left:  12px; }
  .cat-header  { padding: 24px 16px 12px; }
  .items-group { margin: 0 0 8px; }
}

/* Wide: 1300px+  */
@media (min-width: 1300px) {
  #items-container {
    grid-template-columns: repeat(3, 1fr);
    padding: 0 60px;
  }
  .cat-section:nth-child(odd)  { padding-right: 0; }
  .cat-section:nth-child(even) { padding-left:  0; }
  .cat-section { padding: 0 10px; }
}
</style>
</head>
<body>
<div id="app">

  <!--  Topbar  -->
  <div id="topbar">
    <button class="icon-btn" id="theme-btn" onclick="toggleTheme()" aria-label="Toggle theme">
      <span class="material-symbols-outlined" id="theme-icon" style="font-size:20px">dark_mode</span>
    </button>
    <div id="topbar-name">Menu</div>
    <button class="icon-btn" id="search-btn" onclick="toggleSearch()" aria-label="Search">
      <span class="material-symbols-outlined" style="font-size:20px">search</span>
    </button>
  </div>

  <!--  Search drawer  -->
  <div id="search-drawer">
    <div id="search-inner">
      <span class="s-icon material-symbols-outlined">search</span>
      <input id="search-input" type="search" placeholder="Search items..."
             autocomplete="off" spellcheck="false" oninput="renderItems()"/>
    </div>
  </div>

  <!--  Hero  -->
  <div id="hero">
    <div id="header-layout-wrap">
      <!-- Loading skeleton -->
      <div style="display:flex;align-items:center;gap:16px">
        <div class="sk" style="width:72px;height:72px;border-radius:20px;flex-shrink:0"></div>
        <div style="flex:1;display:flex;flex-direction:column;gap:9px">
          <div class="sk" style="height:10px;width:60px;border-radius:4px"></div>
          <div class="sk" style="height:21px;width:160px;border-radius:5px"></div>
          <div class="sk" style="height:13px;width:120px;border-radius:4px"></div>
        </div>
      </div>
    </div>
  </div>

  <!--  Category nav  -->
  <nav id="cat-nav">
    <div id="cat-tabs"></div>
  </nav>

  <!--  Count bar  -->
  <div id="count-bar"></div>

  <!--  Items  -->
  <div id="items-container"></div>

  <!--  Footer  -->
  <div id="footer">
    <span class="material-symbols-outlined" style="font-size:14px">qr_code_2</span>
    Powered by MenuAdmin
  </div>

</div><!-- #app -->

<!--  Error state  -->
<div id="error-state">
  <div style="width:72px;height:72px;border-radius:50%;background:rgba(239,68,68,.08);
              display:flex;align-items:center;justify-content:center">
    <span class="material-symbols-outlined" style="font-size:34px;color:#ef4444">error</span>
  </div>
  <p style="font-size:18px;font-weight:700;color:var(--head)">Menu Not Found</p>
  <p id="error-msg" style="font-size:13px;color:var(--text);line-height:1.6;max-width:280px"></p>
</div>

<script>
//  Currency map 
const CURRENCIES = {
  USD:'$',    EUR:'€',    GBP:'£',    BRL:'R$',   CAD:'CA$',  AUD:'A$',
  AED:'AED ', SAR:'SAR ', QAR:'QR ',  KWD:'KD ',  BHD:'BD ',  OMR:'OMR ',
  INR:'',    PKR:'',    BDT:'',    JPY:'¥',    CNY:'¥',
  KRW:'',    MYR:'RM',   SGD:'S$',   THB:'',    PHP:'',    IDR:'Rp',   TRY:'',
  NGN:'',    GHS:'',    XOF:'CFA',  XAF:'FCFA', GMD:'D',
  GNF:'FG',   SLE:'Le',   LRD:'L$',   CVE:'CV$',
  KES:'KSh',  ETB:'Br',   TZS:'TSh',  UGX:'USh',  RWF:'RF',
  BIF:'Fr',   SOS:'Sh',   SSP:'SS£',  ERN:'Nfk',  DJF:'Fdj',
  KMF:'CF',   SCR:'Sr',   MUR:'Rs',   MGA:'Ar',   EGP:'E£',
  MAD:'MAD',  DZD:'DA',   TND:'DT',   LYD:'LD',   SDG:'SDG',
  ZAR:'R',    NAD:'N$',   BWP:'P',    LSL:'L',    SZL:'L',
  ZWL:'Z$',   ZMW:'K',    MWK:'MK',   MZN:'MT',   AOA:'Kz',   CDF:'FC',   STN:'Db',
};

//  Category palette  WCAG AA on both light and dark 
// Light palette — charcoal shades on pale white (good contrast, no harsh black)
const PALETTE_LIGHT = [
  { hex:'#222222', icon:'lunch_dining'  },
  { hex:'#303030', icon:'soup_kitchen'  },
  { hex:'#444444', icon:'set_meal'      },
  { hex:'#1e1e1e', icon:'eco'           },
  { hex:'#383838', icon:'kebab_dining'  },
  { hex:'#282828', icon:'local_pizza'   },
  { hex:'#3a3a3a', icon:'local_cafe'    },
  { hex:'#1a1a1a', icon:'cake'          },
  { hex:'#2c2c2c', icon:'fastfood'      },
  { hex:'#404040', icon:'restaurant'    },
];
// Dark palette — light grays on black (all ≥ 9:1 contrast on #0a0a0a)
const PALETTE_DARK = [
  { hex:'#eeeeee', icon:'lunch_dining'  },
  { hex:'#cccccc', icon:'soup_kitchen'  },
  { hex:'#b8b8b8', icon:'set_meal'      },
  { hex:'#e4e4e4', icon:'eco'           },
  { hex:'#d0d0d0', icon:'kebab_dining'  },
  { hex:'#dcdcdc', icon:'local_pizza'   },
  { hex:'#c4c4c4', icon:'local_cafe'    },
  { hex:'#f0f0f0', icon:'cake'          },
  { hex:'#c8c8c8', icon:'fastfood'      },
  { hex:'#b4b4b4', icon:'restaurant'    },
];
// catMap stores numeric index per category so it stays stable across theme switches
const catMap = {}; let catIdx = 0;
function catColor(c) {
  if (!(c in catMap)) catMap[c] = catIdx++;
  const PAL = document.documentElement.dataset.theme === 'dark' ? PALETTE_DARK : PALETTE_LIGHT;
  return PAL[catMap[c] % PAL.length];
}

//  State 
let allItems = [], activeCategory = 'All', menuCurrency = '$', searchOpen = false;
let menuData = null;   // stored after fetch, needed for theme re-apply
let userTheme = null;  // 'light' | 'dark' | null (follow server setting)

//  XSS-safe escape 
function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

//  Search toggle 
function toggleSearch() {
  searchOpen = !searchOpen;
  document.getElementById('search-drawer').classList.toggle('open',  searchOpen);
  document.getElementById('cat-nav').classList.toggle('s-open',      searchOpen);
  document.getElementById('search-btn').classList.toggle('lit',      searchOpen);
  if (searchOpen) {
    setTimeout(() => document.getElementById('search-input').focus(), 270);
  } else {
    document.getElementById('search-input').value = '';
    renderItems();
  }
}

//  Init user theme from localStorage, fall back to OS preference 
(function initTheme() {
  const saved = localStorage.getItem('menuTheme');
  if (saved === 'dark' || saved === 'light') {
    userTheme = saved;
  } else {
    // Respect OS preference as default before branding loads
    userTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  document.documentElement.dataset.theme = userTheme;
  const icon = document.getElementById('theme-icon');
  if (icon) icon.textContent = userTheme === 'dark' ? 'light_mode' : 'dark_mode';
})();

//  Boot 
(async () => {
  const id = new URLSearchParams(location.search).get('id');
  if (!id) { showError('No menu ID provided in the URL.'); return; }
  showSkeleton();
  try {
    const res = await fetch('/api/menus/' + encodeURIComponent(id));
    if (!res.ok) throw new Error('Menu not found (HTTP ' + res.status + ')');
    const data = await res.json();
    menuData = data;
    document.title = (data.restaurantName || 'Menu') + ' - Menu';
    applyBranding(data);
    allItems = data.items || [];
    buildTabs();
    renderItems();
  } catch (err) { showError(err.message); }
})();

//  Theme toggle 
function toggleTheme() {
  const isDark = document.documentElement.dataset.theme === 'dark';
  userTheme = isDark ? 'light' : 'dark';
  localStorage.setItem('menuTheme', userTheme);
  if (menuData) {
    applyBranding(menuData);
  } else {
    // branding not loaded yet — apply minimal token swap immediately
    document.documentElement.dataset.theme = userTheme;
    const icon = document.getElementById('theme-icon');
    if (icon) icon.textContent = userTheme === 'dark' ? 'light_mode' : 'dark_mode';
  }
}

//  Branding 
const FONT_URLS = {
  modern:  'Work+Sans:wght@400;600;700;800',
  elegant: 'Playfair+Display:wght@400;600;700;800',
  casual:  'Poppins:wght@400;600;700;800',
  bold:    'Oswald:wght@400;500;600;700',
  minimal: 'Inter:wght@400;500;600;700;800',
};
const FONT_FAMILY = {
  modern:  '"Work Sans", sans-serif',
  elegant: '"Playfair Display", serif',
  casual:  '"Poppins", sans-serif',
  bold:    '"Oswald", sans-serif',
  minimal: '"Inter", sans-serif',
};

const BG_PAL = {
  light:  { bg:'#fafafa', surf:'#eeeeee', hero:'#e4e4e4', dark:false },  // pale white
  pale:   { bg:'#f2f2f2', surf:'#fafafa', hero:'#e0e0e0', dark:false },  // soft off-white
  dark:   { bg:'#1e1e1e', surf:'#272727', hero:'#232323', dark:true  },  // dark grey
  ocean:  { bg:'#0d1b2a', surf:'#132639', hero:'#0f2236', dark:true  },  // navy
  darker: { bg:'#121212', surf:'#1c1c1c', hero:'#171717', dark:true  },  // deep dark grey
  cafe:   { bg:'#1c1108', surf:'#2a1a0e', hero:'#231408', dark:true  },  // cafe
  warm:   { bg:'#1a1008', surf:'#241808', hero:'#1e130a', dark:true  },  // warm dark
};

function lightenHex(hex, amt) {
  if (!hex || hex.length < 7) return hex;
  const r = Math.min(255, parseInt(hex.slice(1,3),16) + Math.round(255*amt));
  const g = Math.min(255, parseInt(hex.slice(3,5),16) + Math.round(255*amt));
  const b = Math.min(255, parseInt(hex.slice(5,7),16) + Math.round(255*amt));
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}

function applyBranding(data) {
  if (!data) return;

  // Determine effective bg palette — user toggle can override server setting
  let bgKey = data.bgStyle || 'light';
  const serverPal = BG_PAL[bgKey] || BG_PAL.light;
  if      (userTheme === 'dark'  && !serverPal.dark) bgKey = 'dark';
  else if (userTheme === 'light' &&  serverPal.dark) bgKey = 'light';

  const fontKey = data.fontStyle || 'modern';
  const pal     = BG_PAL[bgKey]  || BG_PAL.light;
  const isDark  = pal.dark;

  // Sync html attribute + toggle icon
  document.documentElement.dataset.theme = isDark ? 'dark' : 'light';
  const themeIcon = document.getElementById('theme-icon');
  if (themeIcon) themeIcon.textContent = isDark ? 'light_mode' : 'dark_mode';

  const color    = data.brandColor   || (isDark ? '#d8d8d8' : '#222222');
  const bgCol    = data.bgColor      || pal.bg;
  const surfCol  = data.cardBg       || pal.surf;
  const heroCol  = data.bgColor      ? lightenHex(data.bgColor, .06) : pal.hero;
  const headCol  = data.headingColor || (isDark ? '#e8e8e8' : '#1a1a1a');
  const textCol  = data.textColor    || (isDark ? '#909090' : '#666666');
  const priceCol = data.priceColor   || color;
  const topBg    = bgCol + (isDark ? 'f7' : 'f9');
  menuCurrency   = CURRENCIES[data.currency] || '$';

  const dv  = isDark ? 'rgba(255,255,255,.08)' : 'rgba(0,0,0,.07)';
  const dvL = isDark ? 'rgba(255,255,255,.05)' : 'rgba(0,0,0,.05)';
  const inactiveBg  = isDark ? 'rgba(255,255,255,.09)' : 'rgba(0,0,0,.06)';
  const inactiveCol = isDark ? 'rgba(255,255,255,.6)' : '#78716c';
  const hoverBg     = isDark ? 'rgba(255,255,255,.03)' : 'rgba(0,0,0,.018)';
  const activeBg    = isDark ? 'rgba(255,255,255,.05)' : 'rgba(0,0,0,.032)';
  const skMid       = isDark ? lightenHex(surfCol,.07) : lightenHex(surfCol,-.04);
  const shadowCol   = isDark ? 'rgba(0,0,0,.3)' : 'rgba(0,0,0,.06)';
  const bodyOutside = isDark ? '#141414' : '#dcdcdc';

  let styleEl = document.getElementById('branding-overrides');
  if (!styleEl) {
    styleEl = document.createElement('style');
    styleEl.id = 'branding-overrides';
    document.head.appendChild(styleEl);
  }
  styleEl.textContent = `
    :root{
      --brand:${color};--bg:${bgCol};--surf:${surfCol};
      --text:${textCol};--head:${headCol};--price:${priceCol};
      --border:${dv};--shadow:${shadowCol};
    }
    body,#app{background:${bgCol}!important;}
    #topbar{background:${topBg}!important;border-bottom-color:${dv}!important;}
    #search-drawer{background:${topBg}!important;border-bottom-color:${dv}!important;}
    #search-input{background:${surfCol}!important;color:${headCol}!important;border-color:${dv}!important;}
    #search-input:focus{border-color:${color}!important;box-shadow:0 0 0 3px ${color}20!important;}
    #hero{background:linear-gradient(160deg,${heroCol} 0%,${bgCol} 75%)!important;border-bottom-color:${dvL}!important;}
    #cat-nav{background:${bgCol}!important;border-bottom-color:${dv}!important;}
    .tab-active{background:${color}!important;color:${isDark?'#1e1e1e':'#fafafa'}!important;box-shadow:0 2px 8px ${color}35!important;}
    .tab-inactive{background:${inactiveBg}!important;color:${inactiveCol}!important;}
    .items-group{background:${surfCol}!important;border-color:${dv}!important;box-shadow:0 1px 4px ${shadowCol},0 4px 20px ${shadowCol}!important;}
    .item-row{border-bottom-color:${dvL}!important;}
    .item-row:hover{background:${hoverBg}!important;}
    .item-row:active{background:${activeBg}!important;}
    .sk{background:linear-gradient(90deg,${surfCol} 25%,${skMid} 50%,${surfCol} 75%)!important;background-size:1600px 100%!important;animation:shimmer 1.5s infinite linear!important;}
    #topbar-name{color:${headCol}!important;}
    .icon-btn{background:${inactiveBg}!important;color:${textCol}!important;}
    .icon-btn.lit{background:${color}!important;color:${isDark?'#1e1e1e':'#fafafa'}!important;}
    #count-bar{color:${isDark?'#707070':'#a0a0a0'}!important;}
    #footer{color:${isDark?'#626262':'#a0a0a0'}!important;border-top-color:${dvL}!important;}
    @media(min-width:1024px){body{background:${bodyOutside}!important;}}
    /* keep CSS var tokens in sync so skeleton uses correct colours before next paint */
    html{--topbar-bg:${topBg};--hero-grad:${heroCol};--sk-mid:${skMid};--outside-bg:${bodyOutside};}
  `;

  if (fontKey !== 'modern') {
    let lk = document.getElementById('brand-font');
    if (!lk) { lk = document.createElement('link'); lk.id='brand-font'; lk.rel='stylesheet'; document.head.appendChild(lk); }
    lk.href = 'https://fonts.googleapis.com/css2?family=' + FONT_URLS[fontKey] + '&display=swap';
  }
  document.body.style.fontFamily = FONT_FAMILY[fontKey] || FONT_FAMILY.modern;
  document.querySelector('meta[name=theme-color]').content = bgCol;
  buildHeader(data, color, headCol);
  document.getElementById('topbar-name').textContent = data.restaurantName || '';
  // Rebuild category tabs and items so accent colours flip for the new theme
  if (allItems.length) { buildTabs(); renderItems(); }
}

//  Header builder 
function buildHeader(data, color, headCol) {
  const wrap = document.getElementById('header-layout-wrap');
  if (!wrap) return;
  const showLogo = data.showLogo !== 0;
  const showName = data.showName !== 0;
  const layout   = data.headerLayout || 'logo-left';
  const isCenter = layout === 'stacked' || layout === 'logo-center';
  const sz = isCenter ? '88px' : '72px';
  const fs = isCenter ? '32px' : '28px';
  const words    = (data.restaurantName || '').trim().split(/\s+/).filter(Boolean);
  const initials = words.length >= 2
    ? (words[0][0] + words[1][0]).toUpperCase()
    : (data.restaurantName || 'MN').substring(0, 2).toUpperCase();

  const logoHtml = showLogo ? `
    <div style="width:${sz};height:${sz};min-width:${sz};border-radius:22px;overflow:hidden;
                border:2px solid ${color}40;background:${color}15;flex-shrink:0;
                display:flex;align-items:center;justify-content:center;
                animation:ringPop 1.2s ease .4s both;box-shadow:0 6px 28px ${color}20">
      <img src="${esc(data.logoUrl||'')}" alt="" style="width:100%;height:100%;object-fit:cover;${data.logoUrl?'':'display:none'}"/>
      <span style="font-size:${fs};font-weight:800;color:${color};letter-spacing:-1px;${data.logoUrl?'display:none':''}">${esc(initials)}</span>
    </div>` : '';

  const nameHtml = showName ? `
    <div style="${isCenter?'text-align:center;':''}flex:1;min-width:0">
      <p style="font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;margin-bottom:5px;color:${color}">Digital Menu</p>
      <h1 style="font-size:${isCenter?'22px':'19px'};font-weight:800;color:${headCol};line-height:1.2;word-break:break-word;letter-spacing:-.3px">${esc(data.restaurantName||'')}</h1>
      ${data.tagline?`<p style="font-size:13px;font-weight:500;margin-top:5px;color:${color}bb;line-height:1.4">${esc(data.tagline)}</p>`:''}
    </div>` : '';

  const layouts = {
    'stacked':     `<div style="display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center">${logoHtml}${nameHtml}</div>`,
    'logo-center': `<div style="display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center">${logoHtml}${nameHtml}</div>`,
    'logo-right':  `<div style="display:flex;align-items:center;gap:16px">${nameHtml}<div style="flex:1"></div>${logoHtml}</div>`,
    'logo-only':   `<div style="display:flex;justify-content:center">${logoHtml}</div>`,
    'name-only':   nameHtml || '',
    'logo-left':   `<div style="display:flex;align-items:center;gap:16px">${logoHtml}${nameHtml}</div>`,
  };
  wrap.innerHTML = layouts[layout] || layouts['logo-left'];
}

//  Category tabs 
function buildTabs() {
  const cats = ['All', ...new Set(allItems.map(it => it.category || 'Other'))];
  document.getElementById('cat-tabs').innerHTML = cats.map((c, i) => {
    const col = c === 'All' ? null : catColor(c);
    return `<button onclick="setCategory('${esc(c)}')" data-cat="${esc(c)}"
              class="tab-pill ${i === 0 ? 'tab-active' : 'tab-inactive'}">
        ${col ? `<span class="t-dot" style="background:${col.hex}"></span>` : ''}
        ${esc(c)}</button>`;
  }).join('');
}

function setCategory(cat) {
  activeCategory = cat;
  document.querySelectorAll('.tab-pill').forEach(btn => {
    const on = btn.dataset.cat === cat;
    btn.classList.toggle('tab-active',   on);
    btn.classList.toggle('tab-inactive', !on);
  });
  const btn = document.querySelector('.tab-pill[data-cat="' + CSS.escape(cat) + '"]');
  if (btn) btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  renderItems();
}

//  Render 
function renderItems() {
  const q = (document.getElementById('search-input').value || '').toLowerCase().trim();
  const filtered = allItems.filter(it => {
    const cat   = it.category || 'Other';
    const inCat = activeCategory === 'All' || cat === activeCategory;
    const inQ   = !q
      || (it.name        || '').toLowerCase().includes(q)
      || (it.description || '').toLowerCase().includes(q)
      || cat.toLowerCase().includes(q);
    return inCat && inQ;
  });

  const n = filtered.length;
  document.getElementById('count-bar').textContent = n + (n === 1 ? ' item' : ' items');

  const container = document.getElementById('items-container');
  if (!n) {
    container.innerHTML = `
      <div style="grid-column:1/-1;padding:72px 24px;text-align:center;
                  display:flex;flex-direction:column;align-items:center;gap:14px">
        <div style="width:60px;height:60px;border-radius:50%;background:rgba(0,0,0,.05);
                    display:flex;align-items:center;justify-content:center">
          <span class="material-symbols-outlined" style="font-size:28px;color:#b8b0a8">search_off</span>
        </div>
        <p style="font-size:15px;font-weight:700;color:var(--head)">No items found</p>
        <p style="font-size:13px;color:var(--text);max-width:240px;line-height:1.5">
          Try a different keyword or browse another category.
        </p>
      </div>`;
    return;
  }

  const groups = {};
  for (const it of filtered) {
    const cat = it.category || 'Other';
    (groups[cat] = groups[cat] || []).push(it);
  }
  container.innerHTML = Object.entries(groups)
    .map(([cat, items], i) => buildSection(cat, items, i))
    .join('');
}

//  Section 
function buildSection(cat, items, idx) {
  const c = catColor(cat);
  return `
    <div class="cat-section" style="animation-delay:${idx * 45}ms">
      <div class="cat-header">
        <div class="cat-icon" style="background:${c.hex}18">
          <span class="material-symbols-outlined" style="color:${c.hex};font-size:18px">${c.icon}</span>
        </div>
        <span class="cat-label">${esc(cat)}</span>
        <span class="cat-count" style="background:${c.hex}15;color:${c.hex}">${items.length}</span>
      </div>
      <div class="items-group">${items.map(it => buildItem(it, c)).join('')}</div>
    </div>`;
}

//  Item 
function buildItem(item, c) {
  const price = parseFloat(item.price);
  const hasPx = !isNaN(price) && price > 0;
  const pxStr = hasPx ? menuCurrency + price.toFixed(2) : '';
  const tags  = Array.isArray(item.tags) ? item.tags.slice(0, 4) : [];
  const desc  = (item.description || '').trim();
  const size  = (item.size || '').trim();
  const alpha = c.hex + '16';
  return `
    <div class="item-row">
      <div class="item-accent" style="background:${c.hex}"></div>
      <div class="item-body">
        <div class="item-top">
          <span class="item-name">${esc(item.name)}</span>
          ${hasPx ? `<span class="item-price" style="background:${alpha};color:${c.hex}">${esc(pxStr)}</span>` : ''}
        </div>
        ${size ? `<div class="item-size" style="background:${alpha};color:${c.hex}">${esc(size)}</div>` : ''}
        ${desc ? `<div class="item-desc">${esc(desc)}</div>` : ''}
        ${tags.length ? `<div class="item-tags">${tags.map(t => `<span class="tag-chip" style="background:${alpha};color:${c.hex}">${esc(t)}</span>`).join('')}</div>` : ''}
      </div>
    </div>`;
}

//  Skeleton 
function showSkeleton() {
  document.getElementById('items-container').innerHTML = [0, 1, 2].map(i => `
    <div class="cat-section" style="animation-delay:${i * 80}ms">
      <div class="cat-header">
        <div class="sk" style="width:34px;height:34px;border-radius:10px;flex-shrink:0"></div>
        <div class="sk" style="height:11px;width:90px;border-radius:4px;flex:1;margin-left:10px"></div>
        <div class="sk" style="height:22px;width:28px;border-radius:50px"></div>
      </div>
      <div class="items-group">
        ${[0, 1, 2].map(() => `
          <div class="item-row">
            <div style="position:absolute;left:0;top:11px;bottom:11px;width:3px;
                        border-radius:0 3px 3px 0;background:rgba(0,0,0,.06)"></div>
            <div style="flex:1;display:flex;flex-direction:column;gap:8px">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
                <div class="sk" style="height:15px;width:50%;border-radius:5px"></div>
                <div class="sk" style="height:26px;width:58px;border-radius:8px;flex-shrink:0"></div>
              </div>
              <div class="sk" style="height:12px;width:70%;border-radius:4px"></div>
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

//  Error 
function showError(msg) {
  document.getElementById('app').style.display = 'none';
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error-state').style.display = 'flex';
}
</script>
</body>
