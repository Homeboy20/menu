<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#ffffff"/>
<title>Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}

/*  Design tokens — clean light base  */
:root {
  --brand:  #ea580c;
  --bg:     #f5f5f5;
  --surf:   #ffffff;
  --text:   #444444;
  --head:   #1a1a1a;
  --price:  #ea580c;
  --border: rgba(0,0,0,.07);
  --shadow: rgba(0,0,0,.06);
  --safe-t: env(safe-area-inset-top,    0px);
  --safe-b: env(safe-area-inset-bottom, 0px);
  --topbar-bg: rgba(255,255,255,.96);
  --hero-grad: #f0f0f0;
  --sk-mid: #e8e8e8;
  --outside-bg: #eeeeee;
  --accent-light: rgba(234,88,12,.07);
  --accent: #ea580c;
}

/* Dark mode override (if toggled) */
html[data-theme="dark"] {
  --brand:  #fb923c;
  --bg:     #121212;
  --surf:   #1a1a1a;
  --text:   #cccccc;
  --head:   #ffffff;
  --price:  #fb923c;
  --border: rgba(255,255,255,.08);
  --shadow: rgba(0,0,0,.4);
  --topbar-bg: rgba(18,18,18,.97);
  --hero-grad: #1a1a1a;
  --sk-mid: #2a2a2a;
  --outside-bg: #0a0a0a;
  --accent-light: rgba(251,146,60,.1);
  --accent: #fb923c;
}

/* Smooth theme transitions */
body, #app, #topbar, #search-drawer, #cat-nav,
.items-group, .item-row, .tab-pill, .icon-btn, #footer,
#bottom-nav, .bnav-item, #cat-sheet,
#item-modal, #cart-sheet, #cart-fab {
  transition: background-color .25s, border-color .2s, color .18s, box-shadow .2s;
}

html   { height: 100%; }
body   {
  min-height: 100%;
  font-family: 'Work Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: none;
}

/*  App shell  */
#app {
  width: 100%;
  margin: 0 auto;
  min-height: 100dvh;
  background: var(--bg);
}

/*  Topbar — pro app header  */
#topbar {
  position: sticky;
  top: 0;
  z-index: 50;
  height: calc(60px + var(--safe-t));
  padding: calc(var(--safe-t) + 0px) 16px 0;
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--topbar-bg);
  backdrop-filter: blur(32px) saturate(1.8);
  -webkit-backdrop-filter: blur(32px) saturate(1.8);
  border-bottom: 1px solid var(--border);
}

/* Logo — brand-ringed squircle */
#topbar-logo {
  width: 40px; height: 40px;
  border-radius: 12px;
  overflow: hidden;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  background: var(--surf);
  border: 1.5px solid var(--brand);
  box-shadow:
    0 0 0 3px rgba(201,162,39,.08),
    0 2px 6px rgba(0,0,0,.12);
  animation: logoReveal .6s cubic-bezier(.16,1,.3,1) .1s both;
}
@keyframes logoReveal {
  from { opacity:0; transform: scale(.6) rotate(-6deg); }
  to   { opacity:1; transform: scale(1) rotate(0); }
}
#topbar-logo img {
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 10px;
}
#topbar-logo .topbar-initials {
  font-size: 15px; font-weight: 900;
  color: var(--brand);
  letter-spacing: -.5px;
  line-height: 1;
}

/* Info column — name, tagline, powered */
#topbar-info {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  justify-content: center;
  gap: 0;
}
#topbar-name {
  font-size: 16px;
  font-weight: 800;
  color: var(--head);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: -.2px;
  line-height: 1.3;
}
#topbar-tagline {
  font-size: 11px;
  font-weight: 500;
  color: var(--text);
  opacity: .55;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.35;
}
#topbar-tagline:empty { display: none; }

/* Powered — sits inside info, only visible on mobile */
#topbar-powered {
  display: none;
  font-size: 8px; font-weight: 600;
  color: var(--text);
  opacity: .3;
  letter-spacing: .05em;
  text-transform: uppercase;
  line-height: 1;
  margin-top: 1px;
}

/* Action buttons */
.icon-btn {
  flex-shrink: 0;
  width: 34px; height: 34px;
  border-radius: 10px;
  border: none;
  background: transparent;
  color: var(--text);
  opacity: .7;
  font-family: inherit;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, color .15s, opacity .15s, transform .08s;
}
.icon-btn:hover { opacity: 1; background: var(--accent-light); }
.icon-btn:active { transform: scale(.9); }
.icon-btn.lit { background: var(--brand); color: #121212; opacity: 1; }

/*  Contact / Social bar  */
#contact-bar {
  display: none;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 6px 16px;
  background: var(--topbar-bg);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
#contact-bar.visible { display: flex; }
#contact-bar a {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 30px; height: 30px;
  border-radius: 8px;
  background: var(--brand-dim, rgba(201,162,39,.08));
  color: var(--brand);
  text-decoration: none;
  transition: background .15s, transform .1s;
  flex-shrink: 0;
}
#contact-bar a:hover { background: var(--brand-dim-hover, rgba(201,162,39,.16)); transform: scale(1.08); }
#contact-bar a:active { transform: scale(.94); }
#contact-bar a svg { width: 16px; height: 16px; fill: currentColor; }
#contact-bar .cb-divider {
  width: 1px; height: 18px;
  background: var(--border);
  margin: 0 2px;
  flex-shrink: 0;
}

/*  Search slide-in  */
#search-drawer {
  overflow: hidden;
  max-height: 0;
  background: var(--topbar-bg);
  border-bottom: 1px solid transparent;
  transition: max-height .26s cubic-bezier(.4,0,.2,1), border-color .26s;
}
#search-drawer.open {
  max-height: 68px;
  border-bottom-color: var(--border);
}
#search-inner { position: relative; padding: 9px 16px; }
#search-input {
  width: 100%;
  padding: 9px 14px 9px 40px;
  border-radius: 50px;
  border: 1.5px solid var(--border);
  background: var(--surf);
  color: var(--head);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  -webkit-appearance: none;
  transition: border-color .2s, box-shadow .2s;
}
#search-input:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(201,162,39,.2);
}
#search-input::placeholder { color: #aaaaaa; }
.s-icon {
  position: absolute; left: 28px; top: 50%;
  transform: translateY(-50%);
  font-size: 18px; color: #aaaaaa;
  pointer-events: none;
}

/*  Category nav  */
#cat-nav {
  position: sticky;
  top: calc(60px + var(--safe-t));
  z-index: 40;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  transition: top .26s cubic-bezier(.4,0,.2,1);
}
#cat-nav.s-open { top: calc(60px + var(--safe-t) + 68px); }
#cat-tabs {
  display: flex; gap: 7px;
  overflow-x: auto;
  padding: 10px 16px;
  -ms-overflow-style: none; scrollbar-width: none;
}
#cat-tabs::-webkit-scrollbar { display: none; }

#subcat-tabs {
  display: none; gap: 6px;
  overflow-x: auto;
  padding: 0 16px 10px;
  -ms-overflow-style: none; scrollbar-width: none;
}
#subcat-tabs::-webkit-scrollbar { display: none; }
#subcat-tabs.visible { display: flex; }
.subcat-pill {
  flex-shrink: 0;
  display: inline-flex; align-items: center;
  padding: 5px 14px;
  border-radius: 50px;
  font-size: 12px; font-weight: 600;
  border: none; cursor: pointer; white-space: nowrap;
  font-family: inherit;
  transition: background .14s, color .14s, transform .07s;
}
.subcat-pill:active { transform: scale(.94); }
.subcat-active { background: var(--brand); color: #fff; }
.subcat-inactive { background: transparent; color: #999; border: 1px solid var(--border); }

.tab-pill {
  flex-shrink: 0;
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 14px 6px 10px;
  border-radius: 50px;
  font-size: 13px; font-weight: 600; letter-spacing: -.1px;
  border: none; cursor: pointer; white-space: nowrap;
  font-family: inherit;
  transition: background .14s, color .14s, box-shadow .14s, transform .07s;
}
.tab-pill:active { transform: scale(.94); }
.tab-active   { background: var(--brand); color: #fff; box-shadow: none; }
.tab-inactive { background: transparent; color: #999999; border: 1px solid var(--border); }
.tab-inactive:hover { background: rgba(234,88,12,.08); }
.tab-icon { font-size: 16px; line-height: 1; flex-shrink: 0; }

/*  Count bar  */
#count-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px 0;
  font-size: 11px; font-weight: 600;
  color: #777777; letter-spacing: .05em;
  text-transform: uppercase;
}

/*  Items container  */
#items-container {
  padding-bottom: calc(24px + var(--safe-b));
}

/*  Category section  */
.cat-section { animation: fadeUp .28s ease both; margin-bottom: 4px; }

.cat-header {
  display: flex; align-items: center; gap: 10px;
  padding: 24px 16px 10px;
}
.cat-label {
  flex: 1; font-size: 12px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
  color: var(--brand);
}

/*  Items group card  */
.items-group {
  margin: 0 12px;
  border-radius: 16px;
  background: var(--surf);
  overflow: hidden;
  border: 1px solid var(--border);
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
}

/*  Item row  */
.item-row {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  position: relative;
  cursor: pointer;
  transition: background .15s;
}
.item-row:last-child { border-bottom: none; }
.item-row:hover   { background: rgba(0,0,0,.02); }
.item-row:active  { background: rgba(0,0,0,.04); }

.item-body { flex: 1; min-width: 0; }

.item-name {
  font-size: 15px; font-weight: 600;
  color: var(--head); line-height: 1.3;
}
.item-price {
  font-size: 15px; font-weight: 700;
  color: var(--price);
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
}
.item-desc {
  font-size: 13px; line-height: 1.5; color: var(--text);
  margin-top: 3px;
  display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.item-image {
  width: 68px; height: 68px;
  border-radius: 12px;
  object-fit: cover;
  flex-shrink: 0;
  background: var(--accent-light);
  border: 1px solid var(--border);
}

/* Size and tags */
.item-size {
  display: inline-block; font-size: 11px; font-weight: 500;
  padding: 2px 8px; border-radius: 4px; margin-top: 4px;
  background: var(--accent-light); color: var(--text);
}
.item-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.tag-chip  {
  font-size: 10px; font-weight: 500;
  padding: 3px 8px; border-radius: 4px;
  background: var(--accent-light); color: var(--text);
}

/*  Skeleton  */
@keyframes shimmer {
  0%   { background-position: -800px 0; }
  100% { background-position:  800px 0; }
}
.sk {
  border-radius: 6px;
  background: linear-gradient(90deg, var(--surf) 25%, var(--sk-mid) 50%, var(--surf) 75%);
  background-size: 1600px 100%;
  animation: shimmer 1.5s infinite linear;
}

/*  Animations  */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: none; }
}
@keyframes ringPop {
  0%   { box-shadow: 0 0 0 0    rgba(201,162,39,.4); }
  70%  { box-shadow: 0 0 0 12px rgba(201,162,39,0); }
  100% { box-shadow: 0 0 0 0    rgba(201,162,39,0); }
}

/* Checkout bar hidden by default */
#checkout-bar { display: none; }

/*  Footer (desktop only)  */
#footer {
  display: flex; align-items: center; justify-content: center; gap: 5px;
  padding: 22px 16px calc(20px + var(--safe-b));
  font-size: 11px; color: #999999;
  border-top: 1px solid var(--border);
}

/*  Powered-by watermark above bottom nav (mobile)  */
#powered-watermark {
  display: none;
  text-align: center;
  font-size: 9px;
  font-weight: 500;
  color: #bbbbbb;
  letter-spacing: .04em;
  padding: 6px 0 2px;
  position: fixed;
  bottom: calc(56px + var(--safe-b));
  left: 0; right: 0;
  z-index: 59;
  pointer-events: none;
}

/*  Error overlay  */
#error-state {
  display: none; position: fixed; inset: 0;
  background: var(--bg); z-index: 100;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; padding: 32px; text-align: center;
}

/*  Bottom Navigation Bar (mobile app)  */
@keyframes slideUpNav {
  from { opacity: 0; transform: translate(-50%, 20px); }
  to   { opacity: 1; transform: translate(-50%, 0); }
}

#bottom-nav {
  display: flex;
  position: fixed;
  bottom: calc(12px + var(--safe-b));
  left: 50%;
  transform: translateX(-50%);
  z-index: 60;
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-radius: 28px;
  border: 1px solid rgba(0,0,0,.06);
  padding: 4px 6px;
  gap: 2px;
  box-shadow: 0 4px 24px rgba(0,0,0,.1);
  animation: slideUpNav .45s cubic-bezier(.32,.72,0,1) .3s both;
}
html[data-theme="dark"] #bottom-nav {
  background: rgba(20,20,20,.88);
  border-color: rgba(201,162,39,.12);
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
}

.bnav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
  padding: 7px 14px 5px;
  border: none;
  background: transparent;
  border-radius: 22px;
  cursor: pointer;
  color: #aaaaaa;
  font-family: inherit;
  transition: background .2s, color .2s, transform .1s;
  -webkit-tap-highlight-color: transparent;
}
.bnav-item .material-symbols-outlined { font-size: 22px; }
.bnav-label { font-size: 9px; font-weight: 600; letter-spacing: .03em; }
.bnav-item:active { transform: scale(.88); }
.bnav-active {
  color: var(--brand);
  background: rgba(201,162,39,.1);
}
html[data-theme="dark"] .bnav-item { color: #666666; }
html[data-theme="dark"] .bnav-active { background: rgba(201,162,39,.12); }

/*  Category Bottom Sheet  */
#cat-sheet-overlay {
  position: fixed; inset: 0; z-index: 70;
  background: rgba(0,0,0,.6);
  opacity: 0; pointer-events: none;
  transition: opacity .3s;
}
#cat-sheet-overlay.open { opacity: 1; pointer-events: auto; }

#cat-sheet {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 71;
  background: var(--surf);
  border-radius: 20px 20px 0 0;
  padding: 8px 16px calc(20px + var(--safe-b));
  max-height: 65vh;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform .38s cubic-bezier(.32,.72,0,1);
  box-shadow: 0 -4px 32px rgba(0,0,0,.3);
}
#cat-sheet.open { transform: translateY(0); }
#cat-sheet-handle {
  width: 36px; height: 4px;
  background: rgba(0,0,0,.12);
  border-radius: 2px;
  margin: 4px auto 14px;
}
html[data-theme="dark"] #cat-sheet-handle { background: rgba(255,255,255,.15); }
#cat-sheet-title {
  font-size: 15px; font-weight: 700;
  color: var(--head);
  padding: 0 4px 12px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
}
.cat-sheet-item {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 8px;
  border-radius: 12px;
  cursor: pointer;
  transition: background .15s;
  border: none;
  background: transparent;
  width: 100%;
  font-family: inherit;
  text-align: left;
  -webkit-tap-highlight-color: transparent;
}
.cat-sheet-item:active { background: rgba(201,162,39,.08); }
.cs-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.cs-name { font-size: 15px; font-weight: 600; color: var(--head); flex: 1; }
.cs-count {
  font-size: 12px; font-weight: 500; color: var(--text);
  background: var(--accent-light); padding: 2px 8px; border-radius: 10px;
}
.cs-active { background: rgba(201,162,39,.08); }
.cs-active .cs-name { color: var(--brand); }
.cs-active .cs-count { background: rgba(201,162,39,.15); color: var(--brand); }

/* 
   RESPONSIVE LAYOUT
 */

/* Mobile: <768px */
@media (max-width: 767px) {
  #topbar .icon-btn { display: none; }
  #topbar { gap: 10px; padding-left: 14px; padding-right: 14px; }
  #topbar-logo { width: 36px; height: 36px; border-radius: 10px; }
  #topbar-logo .topbar-initials { font-size: 13px; }
  #topbar-name { font-size: 15px; }
  #topbar-tagline { font-size: 10px; }
  #topbar-powered { display: block; }
  #items-container { padding-bottom: calc(100px + var(--safe-b)); }
  #footer { display: none; }
  #powered-watermark { display: block; }
}

/* Desktop: 768px+ */
@media (min-width: 768px) {
  #app { max-width: 720px; margin: 0 auto; }
  body { background: var(--outside-bg); }
  #topbar { gap: 14px; padding: calc(var(--safe-t) + 0px) 24px 0; height: calc(64px + var(--safe-t)); }
  #topbar-logo { width: 42px; height: 42px; border-radius: 13px; }
  #topbar-logo .topbar-initials { font-size: 16px; }
  #topbar-name { font-size: 17px; }
  #topbar-tagline { font-size: 11px; }
  #cat-tabs  { padding: 12px 24px; gap: 8px; }
  #subcat-tabs { padding: 0 24px 12px; gap: 8px; }
  #count-bar { padding: 12px 24px 0; }
  .cat-header  { padding: 24px 24px 10px; }
  .item-row    { padding: 14px 24px; }
  .items-group { border-radius: 0; }
  #contact-bar { padding: 6px 24px; }
  #bottom-nav, #cat-sheet-overlay, #cat-sheet, #powered-watermark { display: none !important; }
}

/* Large desktop: 1024px+ */
@media (min-width: 1024px) {
  #app { max-width: 800px; box-shadow: 0 0 40px rgba(0,0,0,.08); }
  html[data-theme="dark"] #app { box-shadow: 0 0 40px rgba(0,0,0,.3); }
  #topbar { padding: calc(var(--safe-t) + 0px) 28px 0; }
  #topbar-logo { width: 44px; height: 44px; border-radius: 14px; }
  #topbar-name { font-size: 18px; }
  #contact-bar { padding: 6px 28px; }
  #cat-tabs  { padding: 12px 28px; }
  #subcat-tabs { padding: 0 28px 12px; }
  #count-bar { padding: 12px 28px 0; }
  .cat-header { padding: 24px 28px 10px; }
  .item-row   { padding: 14px 28px; }
}

/* === VIEW TOGGLE === */
.view-toggle {
  display: flex; gap: 2px;
  background: rgba(0,0,0,.06);
  border-radius: 8px; padding: 2px;
}
html[data-theme="dark"] .view-toggle { background: rgba(255,255,255,.08); }
.view-btn {
  padding: 5px 8px; border: none; background: transparent;
  border-radius: 6px; color: var(--text); opacity: .5;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-family: inherit; transition: all .15s;
}
.view-btn.active {
  background: var(--surf); color: var(--head); opacity: 1;
  box-shadow: 0 1px 3px var(--shadow);
}

/* === GRID MODE === */
.grid-mode .items-group {
  display: grid; grid-template-columns: repeat(2, 1fr);
}
.grid-mode .item-row {
  flex-direction: column; align-items: stretch; gap: 0;
  padding: 0; cursor: pointer;
  border-bottom: 1px solid var(--border);
}
.grid-mode .item-row:nth-child(odd):not(:only-child) {
  border-right: 1px solid var(--border);
}
.grid-mode .item-row:last-child { border-bottom: none; }
.grid-mode .item-row:nth-last-child(2):nth-child(odd) { border-bottom: none; }
.grid-mode .item-image {
  width: 100%; height: 130px; border-radius: 0; border: none;
}
.grid-mode .item-body { padding: 10px 12px 14px; }
.grid-mode .item-name {
  font-size: 14px;
  display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.grid-mode .item-desc { display: none; }

const CURRENCIES = {

//  Category palette — premium dining (gold / warm tones)
// Light palette — deep tones on white bg
const PALETTE_LIGHT = [
  { hex:'#8E2430', icon:'lunch_dining'  },

];
// Dark palette — gold / cream on black (good contrast)
const PALETTE_DARK = [
  { hex:'#C9A227', icon:'lunch_dining'  },
  { hex:'#D4B84A', icon:'soup_kitchen'  },
  { hex:'#E0C97A', icon:'set_meal'      },

// catMap stores numeric index per category so it stays stable across theme switches
const catMap = {}; let catIdx = 0;
function catColor(c) {
  if (!(c in catMap)) catMap[c] = catIdx++;
  const PAL = document.documentElement.dataset.theme === 'light' ? PALETTE_LIGHT : PALETTE_DARK;
  return PAL[catMap[c] % PAL.length];
}

//  State

let menuData = null;   // stored after fetch, needed for theme re-apply
let userTheme = null;  // 'light' | 'dark' | null (follow server setting)

  'food':'lunch_dining','drinks':'local_bar','beverages':'local_bar',

function getCatIcon(cat) { return CAT_ICONS[(cat||'').toLowerCase()] || 'restaurant_menu'; }

//  XSS-safe escape 
function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

//  Search toggle 
function toggleSearch() {
  searchOpen = !searchOpen;
  document.getElementById('search-drawer').classList.toggle('open',  searchOpen);
  document.getElementById('cat-nav').classList.toggle('s-open',      searchOpen);
  document.getElementById('search-btn').classList.toggle('lit',      searchOpen);
  if (searchOpen) {
    setTimeout(() => document.getElementById('search-input').focus(), 270);
  } else {
    document.getElementById('search-input').value = '';
    renderItems();
  }
}

//  Init user theme from localStorage, fall back to OS preference 
(function initTheme() {
  const saved = localStorage.getItem('menuTheme');
  if (saved === 'dark' || saved === 'light') {
    userTheme = saved;
  } else {
    // Default to light — user can toggle to dark
    userTheme = 'light';
  }
  document.documentElement.dataset.theme = userTheme;
  const icon = document.getElementById('theme-icon');
  if (icon) icon.textContent = userTheme === 'dark' ? 'light_mode' : 'dark_mode';
  syncBnavThemeIcon();
})();

//  Boot 
(async () => {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  currentTableLabel = params.get('table') || '';
  if (!id) { showError('No menu ID provided in the URL.'); return; }
  showSkeleton();
  try {
    const res = await fetch('/api/menus/' + encodeURIComponent(id));
    if (!res.ok) throw new Error('Menu not found (HTTP ' + res.status + ')');
    const data = await res.json();
    menuData = data;
    document.title = (data.restaurantName || 'Menu') + ' - Menu';
    applyBranding(data);
    allItems = data.items || [];
    buildTabs();
    renderItems();
    setView(viewMode);
    // Show table banner if table QR codes are enabled and we have a table param
    if (currentTableLabel && data.tablesEnabled) {
      const banner = document.getElementById('table-banner');
      document.getElementById('table-banner-label').textContent = '\uD83D\uDCCD ' + currentTableLabel;
      banner.classList.add('visible');
    }
  } catch (err) { showError(err.message); }
})();

//  Theme toggle 
function toggleTheme() {
  const isDark = document.documentElement.dataset.theme === 'dark';
  userTheme = isDark ? 'light' : 'dark';
  localStorage.setItem('menuTheme', userTheme);
  if (menuData) {
    applyBranding(menuData);
  } else {
    // branding not loaded yet — apply minimal token swap immediately
    document.documentElement.dataset.theme = userTheme;
    const icon = document.getElementById('theme-icon');
    if (icon) icon.textContent = userTheme === 'dark' ? 'light_mode' : 'dark_mode';
    syncBnavThemeIcon();
  }
}

//  Branding 
const FONT_URLS = {
  modern:  'Work+Sans:wght@400;600;700;800',
  elegant: 'Playfair+Display:wght@400;600;700;800',
  casual:  'Poppins:wght@400;600;700;800',
  bold:    'Oswald:wght@400;500;600;700',
  minimal: 'Inter:wght@400;500;600;700;800',
};
const FONT_FAMILY = {
  modern:  '"Work Sans", sans-serif',
  elegant: '"Playfair Display", serif',
  casual:  '"Poppins", sans-serif',
  bold:    '"Oswald", sans-serif',
  minimal: '"Inter", sans-serif',
};

const BG_PAL = {
  light:  { bg:'#fafafa', surf:'#ffffff', hero:'#f0f0f0', dark:false },  // light (toggle)
  pale:   { bg:'#f2f2f2', surf:'#fafafa', hero:'#e0e0e0', dark:false },  // soft off-white
  dark:   { bg:'#121212', surf:'#1a1a1a', hero:'#1a1a1a', dark:true  },  // premium dark (default)
  ocean:  { bg:'#0d1b2a', surf:'#132639', hero:'#0f2236', dark:true  },  // navy
  darker: { bg:'#0e0e0e', surf:'#161616', hero:'#141414', dark:true  },  // deep black
  cafe:   { bg:'#1c1108', surf:'#2a1a0e', hero:'#231408', dark:true  },  // cafe
  warm:   { bg:'#1a1008', surf:'#241808', hero:'#1e130a', dark:true  },  // warm dark
};

function lightenHex(hex, amt) {
  if (!hex || hex.length < 7) return hex;
  const r = Math.min(255, parseInt(hex.slice(1,3),16) + Math.round(255*amt));
  const g = Math.min(255, parseInt(hex.slice(3,5),16) + Math.round(255*amt));
  const b = Math.min(255, parseInt(hex.slice(5,7),16) + Math.round(255*amt));
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}

function applyBranding(data) {
  if (!data) return;

  // Determine effective bg palette — user toggle can override server setting
  let bgKey = data.bgStyle || 'light';
  const serverPal = BG_PAL[bgKey] || BG_PAL.light;
  if      (userTheme === 'dark'  && !serverPal.dark) bgKey = 'dark';
  else if (userTheme === 'light' &&  serverPal.dark) bgKey = 'light';

  const fontKey = data.fontStyle || 'modern';
  const pal     = BG_PAL[bgKey]  || BG_PAL.light;
  const isDark  = pal.dark;

  // Sync html attribute + toggle icon
  document.documentElement.dataset.theme = isDark ? 'dark' : 'light';
  const themeIcon = document.getElementById('theme-icon');
  if (themeIcon) themeIcon.textContent = isDark ? 'light_mode' : 'dark_mode';
  syncBnavThemeIcon();

  const color    = data.brandColor   || '#ea580c';
  const bgCol    = data.bgColor      || pal.bg;
  const surfCol  = data.cardBg       || pal.surf;
  const heroCol  = data.bgColor      ? lightenHex(data.bgColor, .06) : pal.hero;
  const headCol  = data.headingColor || (isDark ? '#ffffff' : '#121212');
  const textCol  = data.textColor    || (isDark ? '#cccccc' : '#444444');
  const priceCol = data.priceColor   || (isDark ? '#fb923c' : '#ea580c');
  const topBg    = bgCol + (isDark ? 'f7' : 'f9');
  menuCurrency   = CURRENCIES[data.currency] || '$';

  const dv  = isDark ? 'rgba(255,255,255,.08)' : 'rgba(0,0,0,.08)';
  const dvL = isDark ? 'rgba(255,255,255,.05)' : 'rgba(0,0,0,.05)';
  const inactiveBg  = isDark ? 'rgba(255,255,255,.09)' : 'rgba(0,0,0,.06)';
  const inactiveCol = isDark ? '#999999' : '#78716c';
  const hoverBg     = isDark ? 'rgba(201,162,39,.04)' : 'rgba(201,162,39,.06)';
  const activeBg    = isDark ? 'rgba(201,162,39,.07)' : 'rgba(201,162,39,.1)';
  const skMid       = isDark ? lightenHex(surfCol,.07) : lightenHex(surfCol,-.04);
  const shadowCol   = isDark ? 'rgba(0,0,0,.4)' : 'rgba(0,0,0,.06)';
  const bodyOutside = isDark ? '#0a0a0a' : '#e8e8e8';

  let styleEl = document.getElementById('branding-overrides');
  if (!styleEl) {
    styleEl = document.createElement('style');
    styleEl.id = 'branding-overrides';
    document.head.appendChild(styleEl);
  }
  styleEl.textContent = `
    :root{
      --brand:${color};--bg:${bgCol};--surf:${surfCol};
      --text:${textCol};--head:${headCol};--price:${priceCol};
      --border:${dv};--shadow:${shadowCol};
    }
    body,#app{background:${bgCol}!important;}
    #topbar{background:${topBg}!important;border-bottom-color:${dv}!important;}
    #search-drawer{background:${topBg}!important;border-bottom-color:${dv}!important;}
    #search-input{background:${surfCol}!important;color:${headCol}!important;border-color:${dv}!important;}
    #search-input:focus{border-color:${color}!important;box-shadow:0 0 0 3px ${color}30!important;}
    #cat-nav{background:${bgCol}!important;border-bottom-color:${dv}!important;}
    .tab-active{background:${color}!important;color:#fff!important;box-shadow:none!important;}
    .tab-inactive{background:transparent!important;color:${inactiveCol}!important;border-color:${dv}!important;}
    .subcat-active{background:${color}!important;color:#fff!important;}
    .subcat-inactive{color:${inactiveCol}!important;border-color:${dv}!important;}
    .items-group{background:${surfCol}!important;}
    .item-row{border-bottom-color:${dvL}!important;}
    .item-row:hover{background:${hoverBg}!important;}
    .item-row:active{background:${activeBg}!important;}
    .sk{background:linear-gradient(90deg,${surfCol} 25%,${skMid} 50%,${surfCol} 75%)!important;background-size:1600px 100%!important;animation:shimmer 1.5s infinite linear!important;}
    #topbar-name{color:${headCol}!important;}
    #topbar-logo{background:${surfCol}!important;border-color:${color}!important;box-shadow:0 0 0 3px ${color}14,0 2px 6px ${isDark?'rgba(0,0,0,.2)':'rgba(0,0,0,.06)'}!important;}
    .icon-btn:hover{background:${color}10!important;}

  `;

  if (fontKey !== 'modern') {

    lk.href = 'https://fonts.googleapis.com/css2?family=' + FONT_URLS[fontKey] + '&display=swap';
  }
  document.body.style.fontFamily = FONT_FAMILY[fontKey] || FONT_FAMILY.modern;
  document.querySelector('meta[name=theme-color]').content = bgCol;
  document.getElementById('topbar-name').textContent = data.restaurantName || '';

  // Populate topbar tagline
  const tbTagline = document.getElementById('topbar-tagline');
  if (tbTagline) tbTagline.textContent = data.tagline || '';

  // Populate topbar logo (initials or image)
  const tbLogo = document.getElementById('topbar-logo');
  const tbImg  = document.getElementById('topbar-logo-img');
  const tbInit = document.getElementById('topbar-initials');
  if (tbLogo) {
    const rName = data.restaurantName || '';
    if (data.logoUrl) {
      tbImg.src = data.logoUrl;
      tbImg.alt = rName;
      tbImg.style.display = 'block';
      tbInit.style.display = 'none';
    } else if (rName) {
      const words = rName.trim().split(/\s+/);
      tbInit.textContent = words.length >= 2

      tbInit.style.display = 'flex';

    }

//  Category tabs 
function buildTabs() {
  const cats = [...new Set(allItems.map(it => it.category || 'Other'))];
  if (!cats.length) return;
  const isAllActive = activeCategory === 'All';
  let html = `<button onclick="setCategory('All')" data-cat="All"
                class="tab-pill ${isAllActive ? 'tab-active' : 'tab-inactive'}">
                <span class="material-symbols-outlined tab-icon">restaurant</span>
                All</button>`;
  html += cats.map(c => {
    const icon = getCatIcon(c);
    const isActive = c === activeCategory;
    return `<button onclick="setCategory('${esc(c)}')" data-cat="${esc(c)}"
              class="tab-pill ${isActive ? 'tab-active' : 'tab-inactive'}">
        <span class="material-symbols-outlined tab-icon">${icon}</span>
        ${esc(c)}</button>`;
  }).join('');
  document.getElementById('cat-tabs').innerHTML = html;
  buildSubcatPills();
}

function setCategory(cat) {
  activeCategory = cat;
  activeSubcategory = 'All';
  document.querySelectorAll('.tab-pill').forEach(btn => {
    const on = btn.dataset.cat === cat;
    btn.classList.toggle('tab-active',   on);
    btn.classList.toggle('tab-inactive', !on);
  });
  const btn = document.querySelector('.tab-pill[data-cat="' + CSS.escape(cat) + '"]');
  if (btn) btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  buildSubcatPills();
  renderItems();
}

function buildSubcatPills() {
  const subcatDiv = document.getElementById('subcat-tabs');
  if (activeCategory === 'All') {
    subcatDiv.classList.remove('visible');
    return;
  }
  const catItems = allItems.filter(it => (it.category || 'Other') === activeCategory);
  const subs = [...new Set(catItems.map(it => it.subcategory || '').filter(Boolean))];
  if (!subs.length) {
    subcatDiv.classList.remove('visible');
    return;
  }
  const allLabel = 'All ' + activeCategory;
  let html = `<button onclick="setSubcategory('All')" data-sub="All"
                class="subcat-pill ${activeSubcategory === 'All' ? 'subcat-active' : 'subcat-inactive'}">
                ${esc(allLabel)}</button>`;
  html += subs.map(s => {
    const isActive = s === activeSubcategory;
    return `<button onclick="setSubcategory('${esc(s)}')" data-sub="${esc(s)}"
              class="subcat-pill ${isActive ? 'subcat-active' : 'subcat-inactive'}">
              ${esc(s)}</button>`;
  }).join('');
  subcatDiv.innerHTML = html;
  subcatDiv.classList.add('visible');
}

function setSubcategory(sub) {
  activeSubcategory = sub;
  document.querySelectorAll('.subcat-pill').forEach(btn => {
    const on = btn.dataset.sub === sub;
    btn.classList.toggle('subcat-active', on);
    btn.classList.toggle('subcat-inactive', !on);
  });
  renderItems();
}

//  Render 
function renderItems() {
  const q = (document.getElementById('search-input').value || '').toLowerCase().trim();
  const filtered = [];
  allItems.forEach(function(it, i) {
    const cat   = it.category || 'Other';
    const sub   = it.subcategory || '';
    const inCat = activeCategory === 'All' || cat === activeCategory;
    const inSub = activeSubcategory === 'All' || sub === activeSubcategory;
    const inQ   = !q
      || (it.name        || '').toLowerCase().includes(q)
      || (it.description || '').toLowerCase().includes(q)
      || cat.toLowerCase().includes(q)
      || sub.toLowerCase().includes(q);
    if (inCat && inSub && inQ) filtered.push(Object.assign({}, it, {_idx: i}));
  });

  const n = filtered.length;
  document.getElementById('count-label').textContent = n + (n === 1 ? ' item' : ' items');

  const container = document.getElementById('items-container');
  if (!n) {
    container.innerHTML = `
      <div style="grid-column:1/-1;padding:72px 24px;text-align:center;
                  display:flex;flex-direction:column;align-items:center;gap:14px">
        <div style="width:60px;height:60px;border-radius:50%;background:rgba(0,0,0,.05);
                    display:flex;align-items:center;justify-content:center">
          <span class="material-symbols-outlined" style="font-size:28px;color:#b8b0a8">search_off</span>
        </div>
        <p style="font-size:15px;font-weight:700;color:var(--head)">No items found</p>
        <p style="font-size:13px;color:var(--text);max-width:240px;line-height:1.5">
          Try a different keyword or browse another category.
        </p>
      </div>`;
    return;
  }

  // Group by subcategory (empty subcategory comes first as ungrouped)
  const subGroups = {};
  for (const it of filtered) {
    const sub = it.subcategory || '';
    (subGroups[sub] = subGroups[sub] || []).push(it);
  }
  container.innerHTML = Object.entries(subGroups)
    .map(([sub, items], i) => buildSection(sub, items, i))
    .join('');
}

//  Section 
function buildSection(sub, items, idx) {
  const c = catColor(activeCategory);
  // If subcategory is empty, render items without a section header
  const header = sub
    ? `<div class="cat-header"><span class="cat-label">${esc(sub)}</span></div>`
    : '';
  return `
    <div class="cat-section" style="animation-delay:${idx * 45}ms">
      ${header}
      <div class="items-group">${items.map(it => buildItem(it, c)).join('')}</div>
    </div>`;
}

//  Item 
function buildItem(item, c) {
  var idx = item._idx != null ? item._idx : 0;
  const price = parseFloat(item.price);
  const hasPx = !isNaN(price) && price > 0;
  const pxStr = hasPx ? menuCurrency + price.toFixed(2).replace('.00', '') : '';
  const desc  = (item.description || '').trim();
  const size  = (item.size || '').trim();
  const tags  = Array.isArray(item.tags) ? item.tags : [];
  const img   = (item.imageUrl || '').trim();
  const rating = parseFloat(item.rating) || 0;

  // Build star strip (read-only, 1 decimal shown)
  let starsHtml = '';
  if (rating > 0) {
    let stars = '';
    for (let i = 1; i <= 5; i++) {
      stars += '<span class="material-symbols-outlined star-icon' + (i <= Math.round(rating) ? ' filled' : '') + '" aria-hidden="true">star</span>';
    }
    starsHtml = '<div class="item-stars">' + stars + '<span class="star-score">' + rating.toFixed(1) + '</span></div>';
  }

  return `
    <div class="item-row" onclick="openItemDetail(${idx})">
      ${img ? `<img class="item-image" src="${esc(img)}" alt="${esc(item.name)}" loading="lazy"/>`
            : `<div class="item-no-img"><span class="material-symbols-outlined">restaurant</span></div>`}
      <div class="item-body">
        <div style="display:flex;align-items:baseline;justify-content:space-between;gap:8px">
          <div class="item-name">${esc(item.name)}</div>
          ${hasPx ? `<div class="item-price">${esc(pxStr)}</div>` : ''}
        </div>
        ${desc ? `<div class="item-desc">${esc(desc)}</div>` : ''}
        ${size ? `<span class="item-size">${esc(size)}</span>` : ''}
        ${tags.length ? `<div class="item-tags">${tags.map(t => `<span class="tag-chip">${esc(t)}</span>`).join('')}</div>` : ''}
        ${starsHtml}
      </div>
    </div>`;
}

//  Skeleton 
function showSkeleton() {
  document.getElementById('items-container').innerHTML = [0, 1, 2].map(i => `
    <div class="cat-section" style="animation-delay:${i * 80}ms">
      <div class="cat-header">
        <div class="sk" style="height:11px;width:90px;border-radius:4px"></div>
      </div>
      <div class="items-group">
        ${[0, 1, 2].map(() => `
          <div class="item-row">
            <div style="flex:1;display:flex;flex-direction:column;gap:6px">
              <div style="display:flex;justify-content:space-between;gap:16px">
                <div class="sk" style="height:15px;width:55%;border-radius:4px"></div>
                <div class="sk" style="height:15px;width:50px;border-radius:4px"></div>
              </div>
              <div class="sk" style="height:13px;width:75%;border-radius:4px"></div>
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

//  Error 
function showError(msg) {
  document.getElementById('app').style.display = 'none';
  const bnav = document.getElementById('bottom-nav');
  if (bnav) bnav.style.display = 'none';
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error-state').style.display = 'flex';
}

//  Bottom Navigation 
function navTo(tab) {
  if (tab === 'menu') {
    closeCatSheet();
    if (searchOpen) toggleSearch();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    updateNavActive('menu');
  } else if (tab === 'categories') {
    if (searchOpen) toggleSearch();
    openCatSheet();
    updateNavActive('categories');
  } else if (tab === 'search') {
    closeCatSheet();
    toggleSearch();
    updateNavActive(searchOpen ? 'search' : 'menu');
  } else if (tab === 'theme') {
    toggleTheme();
  }
}

function updateNavActive(tab) {
  document.querySelectorAll('.bnav-item').forEach(b => {
    b.classList.toggle('bnav-active', b.dataset.nav === tab);
  });
}

function syncBnavThemeIcon() {
  const i = document.getElementById('bnav-theme-icon');
  if (i) i.textContent = document.documentElement.dataset.theme === 'dark' ? 'light_mode' : 'dark_mode';
}

function openCatSheet() {
  const cats = [...new Set(allItems.map(it => it.category || 'Other'))];
  const list = document.getElementById('cat-sheet-list');
  if (list) {
    let html = `<button class="cat-sheet-item${activeCategory==='All'?' cs-active':''}" onclick="selectSheetCat('All')">
        <span class="cs-dot" style="background:var(--brand)"></span>
        <span class="cs-name">All</span>
        <span class="cs-count">${allItems.length}</span>
      </button>`;
    html += cats.map(c => {
      const col = catColor(c);
      const count = allItems.filter(it => (it.category || 'Other') === c).length;
      const isActive = c === activeCategory;
      return `<button class="cat-sheet-item${isActive?' cs-active':''}" onclick="selectSheetCat('${esc(c)}')">
        <span class="cs-dot" style="background:${col ? col.hex : 'var(--brand)'}"></span>
        <span class="cs-name">${esc(c)}</span>
        <span class="cs-count">${count}</span>
      </button>`;
    }).join('');
    list.innerHTML = html;
  }
  document.getElementById('cat-sheet-overlay')?.classList.add('open');
  document.getElementById('cat-sheet')?.classList.add('open');
}

function closeCatSheet() {
  document.getElementById('cat-sheet-overlay')?.classList.remove('open');
  document.getElementById('cat-sheet')?.classList.remove('open');
}

function selectSheetCat(cat) {
  setCategory(cat);
  closeCatSheet();
  updateNavActive('menu');
}

//  View toggle
function setView(mode) {
  viewMode = mode;
  document.getElementById('items-container').classList.toggle('grid-mode', mode === 'grid');
  document.querySelectorAll('.view-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.view === mode);
  });
  localStorage.setItem('menuViewMode', mode);
}

//  Item Detail Modal
function openItemDetail(idx) {
  var item = allItems[idx];
  if (!item) return;
  modalItem = Object.assign({}, item, {_idx: idx});
  modalQty = 1;
  var img = document.getElementById('item-modal-img');
  if (item.imageUrl) { img.src = item.imageUrl; img.style.display = 'block'; }
  else { img.style.display = 'none'; }
  document.getElementById('item-modal-name').textContent = item.name || '';
  document.getElementById('item-modal-desc').textContent = item.description || '';
  var price = parseFloat(item.price);
  document.getElementById('item-modal-price').textContent =
    (!isNaN(price) && price > 0) ? menuCurrency + price.toFixed(2).replace('.00','') : '';
  var metaHtml = '';
  if (item.size) metaHtml += '<span class="modal-size-badge">' + esc(item.size) + '</span>';
  var tags = Array.isArray(item.tags) ? item.tags : [];
  tags.forEach(function(t) { metaHtml += '<span class="modal-tag">' + esc(t) + '</span>'; });
  document.getElementById('item-modal-meta').innerHTML = metaHtml;
  document.getElementById('qty-count').textContent = '1';

  // Star rating UI
  var existingStars = document.getElementById('item-modal-stars');
  if (existingStars) existingStars.remove();
  var rateFeedback = document.getElementById('rate-feedback');
  if (rateFeedback) rateFeedback.remove();
  var starsEl = document.createElement('div');
  starsEl.id = 'item-modal-stars';
  var currentRating = parseFloat(item.rating) || 0;
  for (var s = 1; s <= 5; s++) {
    var btn = document.createElement('button');
    btn.className = 'modal-star-btn material-symbols-outlined' + (s <= Math.round(currentRating) ? ' selected' : '');
    btn.dataset.star = s;
    btn.textContent = 'star';
    btn.setAttribute('aria-label', s + ' star');
    btn.addEventListener('click', (function(star) {
      return function(e) { e.stopPropagation(); submitRating(star); };
    })(s));
    starsEl.appendChild(btn);
  }
  var feedbackEl = document.createElement('div');
  feedbackEl.id = 'rate-feedback';
  feedbackEl.textContent = currentRating > 0 ? 'Avg: ' + currentRating.toFixed(1) + ' ★' : 'Tap to rate';
  var modalBody = document.getElementById('item-modal-body');
  var priceEl = document.getElementById('item-modal-price');
  modalBody.insertBefore(feedbackEl, priceEl);
  modalBody.insertBefore(starsEl, feedbackEl);

  document.getElementById('item-modal-overlay').classList.add('open');
  document.getElementById('item-modal').classList.add('open');
}

async function submitRating(stars) {
  if (!modalItem) return;
  var feedbackEl = document.getElementById('rate-feedback');
  try {
    var res = await fetch('/api/items/' + encodeURIComponent(modalItem.id) + '/rate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rating: stars }),
    });
    var d = await res.json();
    if (!res.ok) throw new Error(d.error || 'Failed');
    // Update local data and star UI
    allItems[modalItem._idx].rating = d.avgRating;
    modalItem.rating = d.avgRating;
    document.querySelectorAll('#item-modal-stars .modal-star-btn').forEach(function(btn) {
      btn.classList.toggle('selected', parseInt(btn.dataset.star) <= stars);
    });
    if (feedbackEl) feedbackEl.textContent = 'Avg: ' + d.avgRating.toFixed(1) + ' ★  (' + d.ratingCount + ' votes)';
  } catch (err) {
    if (feedbackEl) feedbackEl.textContent = 'Could not submit rating.';
  }
}

function closeItemDetail() {
  document.getElementById('item-modal-overlay').classList.remove('open');
  document.getElementById('item-modal').classList.remove('open');
  modalItem = null;
}

function adjustQty(delta) {
  modalQty = Math.max(1, modalQty + delta);
  document.getElementById('qty-count').textContent = modalQty;
}

//  Cart
function addToCart() {
  if (!modalItem) return;
  var idx = modalItem._idx;
  var existing = null;
  for (var i = 0; i < cart.length; i++) { if (cart[i]._idx === idx) { existing = cart[i]; break; } }
  if (existing) { existing.qty += modalQty; }
  else { cart.push(Object.assign({}, modalItem, {qty: modalQty})); }
  updateCartUI();
  closeItemDetail();
}

function removeFromCart(idx) {
  cart = cart.filter(function(c) { return c._idx !== idx; });
  updateCartUI();
  renderCartSheet();
  if (!cart.length) closeCart();
}

function updateCartQty(idx, delta) {
  for (var i = 0; i < cart.length; i++) {
    if (cart[i]._idx === idx) {
      cart[i].qty += delta;
      if (cart[i].qty <= 0) { removeFromCart(idx); return; }
      break;
    }
  }
  updateCartUI();
  renderCartSheet();
}

function updateCartUI() {
  var fab = document.getElementById('cart-fab');
  var totalItems = 0, totalPrice = 0;
  cart.forEach(function(c) { totalItems += c.qty; totalPrice += (parseFloat(c.price) || 0) * c.qty; });
  if (totalItems > 0) {
    fab.classList.add('visible');
    document.getElementById('cart-fab-count').textContent = totalItems;
    document.getElementById('cart-fab-total').textContent = menuCurrency + totalPrice.toFixed(2).replace('.00','');
  } else {
    fab.classList.remove('visible');
  }
}

function renderCartSheet() {
  var list = document.getElementById('cart-items-list');
  var footer = document.getElementById('cart-footer');
  var empty = document.getElementById('cart-empty');
  if (!cart.length) {
    list.innerHTML = '';
    footer.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  footer.style.display = 'block';
  list.innerHTML = cart.map(function(c) {
    var price = parseFloat(c.price) || 0;
    var imgHtml = c.imageUrl
      ? '<img class="cart-item-img" src="' + esc(c.imageUrl) + '" alt=""/>'
      : '<div class="cart-item-img"></div>';
    return '<div class="cart-item">' + imgHtml +
      '<div class="cart-item-info"><div class="cart-item-name">' + esc(c.name) + '</div>' +
      '<div class="cart-item-price">' + menuCurrency + (price * c.qty).toFixed(2).replace('.00','') + '</div></div>' +
      '<div class="cart-item-qty">' +
      '<button class="cart-qty-btn" onclick="updateCartQty(' + c._idx + ',-1)">&minus;</button>' +
      '<span class="cart-qty-num">' + c.qty + '</span>' +
      '<button class="cart-qty-btn" onclick="updateCartQty(' + c._idx + ',1)">+</button>' +
      '</div></div>';
  }).join('');
  var total = 0;
  cart.forEach(function(c) { total += (parseFloat(c.price) || 0) * c.qty; });
  document.getElementById('cart-total-value').textContent = menuCurrency + total.toFixed(2).replace('.00','');
}

function openCart() {
  renderCartSheet();
  document.getElementById('cart-overlay').classList.add('open');
  document.getElementById('cart-sheet').classList.add('open');
}

function closeCart() {
  document.getElementById('cart-overlay').classList.remove('open');
  document.getElementById('cart-sheet').classList.remove('open');
}

function clearCart() {
  cart = [];
  updateCartUI();
  closeCart();
}

function placeOrder() {
  if (!cart.length) return;
  var lines = [];
  cart.forEach(function(c) {
    var p = (parseFloat(c.price) || 0) * c.qty;
    lines.push(c.name + ' x' + c.qty + ' - ' + menuCurrency + p.toFixed(2));
  });
  var total = 0;
  cart.forEach(function(c) { total += (parseFloat(c.price) || 0) * c.qty; });
  var rname = (menuData && menuData.restaurantName) || '';
  var tableNote = currentTableLabel ? '\nTable: ' + currentTableLabel : '';
  var msg = (rname ? 'Order from ' + rname + ':\n' : 'Order:\n') + lines.join('\n') + tableNote + '\n\nTotal: ' + menuCurrency + total.toFixed(2);
  var phone = menuData && menuData.phone ? menuData.phone.replace(/[^\d+]/g, '') : '';
  if (phone) {
    window.open('https://wa.me/' + phone + '?text=' + encodeURIComponent(msg), '_blank');
  } else {
    alert(msg);
  }
}

function printReceipt() {
  if (!cart.length) return;
  var rname = (menuData && menuData.restaurantName) || 'Restaurant';
  var tableNote = currentTableLabel ? 'Table: ' + currentTableLabel : '';
  var now = new Date();
  var dateStr = now.toLocaleDateString() + ' ' + now.toLocaleTimeString();
  var itemsHtml = '', total = 0;
  cart.forEach(function(c) {
    var p = (parseFloat(c.price) || 0) * c.qty;
    total += p;
    itemsHtml += '<tr><td style="text-align:left">' + esc(c.name) + '</td><td style="text-align:center">' + c.qty + '</td><td style="text-align:right">' + menuCurrency + p.toFixed(2) + '</td></tr>';
  });
  var html = '<!DOCTYPE html><html><head><title>Receipt</title>' +
    '<style>' +
    '*{margin:0;padding:0;box-sizing:border-box}' +
    'body{font-family:"Courier New",monospace;width:280px;margin:0 auto;padding:12px;font-size:12px;color:#000}' +
    '.center{text-align:center}' +
    '.bold{font-weight:bold}' +
    '.line{border-top:1px dashed #000;margin:8px 0}' +
    'table{width:100%;border-collapse:collapse}' +
    'th,td{padding:3px 0;font-size:12px}' +
    'th{border-bottom:1px solid #000;text-align:left}' +
    '.total{font-size:14px;font-weight:bold;display:flex;justify-content:space-between}' +
    '@media print{@page{size:80mm auto;margin:2mm}body{width:auto;padding:0}}' +
    '</style></head><body>' +
    '<div class="center bold" style="font-size:16px">' + esc(rname) + '</div>' +
    (tableNote ? '<div class="center" style="margin-top:4px">' + esc(tableNote) + '</div>' : '') +
    '<div class="center" style="margin-top:2px;font-size:11px">' + dateStr + '</div>' +
    '<div class="line"></div>' +
    '<table><thead><tr><th>Item</th><th style="text-align:center">Qty</th><th style="text-align:right">Price</th></tr></thead>' +
    '<tbody>' + itemsHtml + '</tbody></table>' +
    '<div class="line"></div>' +
    '<div class="total"><span>TOTAL</span><span>' + menuCurrency + total.toFixed(2) + '</span></div>' +
    '<div class="line"></div>' +
    '<div class="center" style="margin-top:10px">Thank you for your order!</div>' +
    '<div class="center" style="font-size:10px;color:#666;margin-top:6px">Powered by MenuAdmin</div>' +
    '<script>window.onload=function(){window.print()}<\/script>' +
    '</body></html>';
  var w = window.open('', '_blank', 'width=320,height=600');
  if (w) { w.document.write(html); w.document.close(); }
}

async function callWaiter() {
  if (!menuData || !currentTableLabel) return;
  var btn = document.getElementById('call-waiter-btn');
  var sentMsg = document.getElementById('waiter-sent-msg');
  btn.disabled = true;
  try {
    var res = await fetch('/api/menus/' + encodeURIComponent(menuData.id) + '/alerts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ table: currentTableLabel, message: 'Service requested at ' + currentTableLabel }),
    });
    if (!res.ok) throw new Error('Failed');
    btn.style.display = 'none';
    sentMsg.style.display = 'block';
    setTimeout(function() {
      btn.style.display = '';
      sentMsg.style.display = 'none';
      btn.disabled = false;
    }, 8000);
  } catch (_) {
    btn.disabled = false;
  }
}
</script>
</body>
